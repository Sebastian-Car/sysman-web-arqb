<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html >
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:pt="http://java.sun.com/jsf/passthrough"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                template="/template.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pe="http://primefaces.org/ui/extensions"
                >
    <ui:define name="titulo">
        <title>Tipos División</title>
    </ui:define>
    <ui:define name="contenido">
        <section class="radius" >
            <f:event type="preRenderView" listener="#{frmtiposdivisionsControlador.cargarForma}" />
            <div  id="FR217"  style="height: 615px;">
                <h:form style="height: 100%;"   id="FRFR217"  >
                    <p:growl id="alert" showDetail="true" sticky="false" widgetVar="alert" life="5000"  autoUpdate="false" escape="false"/>
                    <div id="PL462" style="position: relative; height: 69px; ">
                        <h:outputLabel id="LB5478" value="TIPOS DIVISIÓN MUNICIPAL"       style="position: absolute; width:267px; height: 25px; left: 188px;   top: 4px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 16px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;"   />
                    </div>
                    <p:dialog dynamic="true" header="Nuevo registro" id="dlg" widgetVar="dlg" resizable="false" modal="true"   rendered="#{frmtiposdivisionsControlador.permisos[0]}"  onHide="restaurarCampos(['CP7007','CP7008'])"  >
                        <h:panelGrid columns="2" cellpadding="2">
                            <h:outputLabel  value="Código:" id="LCP7007"      />
                            <p:inputText id="CP7007"    widgetVar="CP7007"  styleClass="inputTab"      value="#{frmtiposdivisionsControlador.registro.campos['CODIGO']}"  label="LCP7007"   style=" width: 95%; float: left;"  maxlength="12"  >
                            </p:inputText>
                            <h:outputLabel  value="Nombre:" id="LCP7008"      />
                            <p:inputText id="CP7008"    widgetVar="CP7008"  styleClass="inputTab"      value="#{frmtiposdivisionsControlador.registro.campos['NOMBRE']}"  label="LCP7008"   style=" width: 95%; float: left;"  maxlength="128"  >
                            </p:inputText>
                            <h:outputLabel  value="Ubicación:" id="LCP7009"      />
                            <p:inputText id="CP7009"    widgetVar="CP7009"  styleClass="inputTab"      value="#{frmtiposdivisionsControlador.registro.campos['UBICACION']}"  label="LCP7009"   style=" width: 95%; float: left;"  maxlength="128"  >
                            </p:inputText>
							<h:outputLabel value="#{idm.TC_CK2381}:" id="LCK2381"
								style="display:block"
								rendered="#{frmtiposdivisionsControlador.manejaRecursosNat}"
								class="cont-inst-element" />
							<p:selectBooleanCheckbox id="CK2381" widgetVar="CK2381"
								value="#{frmtiposdivisionsControlador.registro.campos['ES_CUENCA']}"
								rendered="#{frmtiposdivisionsControlador.manejaRecursosNat}"
								label="LCK2381" style="min-width: 90px; display:block"
								class="cont-inst-element">
							</p:selectBooleanCheckbox>
							<f:facet name="footer">
                                <center>
                                    <p:commandButton value="Guardar"  style="padding:10px;"  update="FRFR217," actionListener="#{frmtiposdivisionsControlador.agregarRegistroNuevo}"
                                                     oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"  onclick="     if (!validarVaciosModal(['CP7007', 'CP7008'])) {
                                                                 PF('alert').renderMessage({'summary': 'Error de validación',
                                                                     'detail': 'Por favor ingrese los campos obligatorios',
                                                                     'severity': 'error'});
                                                                 return false;
                                                             }
                                                             PF('blockGuardar').show();" />
                                    <p:button value="Cancelar"  style="padding:10px;" href="#"    onclick="PF('dlg').hide();"/>
                                </center>
                            </f:facet>
                        </h:panelGrid>
                    </p:dialog>
                    <p:confirmDialog global="true" showEffect="fade" >
                        <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
                        <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
                    </p:confirmDialog>
                    <div id="PL463" style="position: relative; height: 22px; ">
                        <p:remoteCommand name="refreshTab" update="TBFR217"/>
                        <p:dataTable id="TBFR217" var="reg" value="#{frmtiposdivisionsControlador.listaInicial}" editable="true" widgetVar="TBFR217"
                                     emptyMessage="No se encontraron registros"
                                     paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
                                     currentPageReportTemplate="Registros: {startRecord} - {endRecord} de {totalRecords}, Página: {currentPage}/{totalPages}"
                                     rows="10"
                                     rowIndexVar="rowNun"
                                     paginator="true"
                                     scrollable="true" scrollWidth="100%"
                                     lazy="true">
                            <f:facet name="{Exporters}" rendered="#{frmtiposdivisionsControlador.permisos[4] }" >
                                <h:commandLink rendered="#{frmtiposdivisionsControlador.permisos[4] }" title="Ver en excel">
                                    <p:graphicImage name="/images/general/excel.png" width="24"/>
                                    <p:dataExporter type="xls" target="TBFR217" fileName="Datos"  encoding="ISO-8859-1"  />
                                </h:commandLink>
                                <h:commandLink rendered="#{frmtiposdivisionsControlador.permisos[4] }" title="Ver en pdf">
                                    <p:graphicImage name="/images/general/pdf.png" width="24"/>
                                    <p:dataExporter type="pdf" target="TBFR217" fileName="Datos"  encoding="ISO-8859-1"/>
                                </h:commandLink>
                            </f:facet>
                            <p:ajax event="rowEdit" update=":FRFR217:alert," listener="#{frmtiposdivisionsControlador.editar}"  oncomplete="refreshTab(); PF('blockGuardar').hide(); mostarEditor();"  onstart="PF('blockGuardar').show();" />
                            <p:ajax event="rowEditCancel" listener="#{frmtiposdivisionsControlador.cancelarEdicion}"  oncomplete="  mostarEditor();"  />
                            <p:ajax event="rowEditInit"   oncomplete="ocultarEditor(); "/>
                            <f:facet name="header">
                                <div style="position: relative; height: 50px">
                                    <h:panelGroup class="acme" rendered="#{frmtiposdivisionsControlador.permisos[0]  }">
                                        <h:outputLink value="javascript:void(0)" onclick="
                                                PF('dlg').show();
                                                      " title="Nuevo Registro" style="padding-top: 10px;" >
                                            <center><p:graphicImage name="/images/menus/32/add.png"/>
                                                <div>Nuevo</div>
                                            </center>
                                        </h:outputLink>
                                    </h:panelGroup>
                                    <div class="acme">
                                        <h:outputLink value="#{request.contextPath}/menu.sysman"  title="Volver al menú" style="padding-top: 10px;" >
                                            <center><p:graphicImage name="/images/menus/32/close.png"/>
                                                <div>Cerrar</div>
                                            </center>
                                        </h:outputLink>
                                    </div>
                                </div>
                                Tipos División
                            </f:facet>
                            <p:column headerText="Código"  filterBy="#{reg.campos['CODIGO']}"  filterStyle="width:100%"   filterMatchMode="contains" width="63"   style="" >
                                <p:cellEditor>
                                    <f:facet name="output"><h:outputText value="#{reg.campos['CODIGO']}"   style="text-align:  left; float:  left"  /></f:facet>
                                    <f:facet name="input">
                                        <p:inputText id="CP7007"    styleClass="inputTab"    value="#{reg.campos['CODIGO']}" style="width:100%"   maxlength="12"  >
                                        </p:inputText>
                                    </f:facet>
                                </p:cellEditor>
                            </p:column>
                            <p:column headerText="Nombre"  filterBy="#{reg.campos['NOMBRE']}"  filterStyle="width:100%"   filterMatchMode="contains" width="345"   style="" >
                                <p:cellEditor>
                                    <f:facet name="output"><h:outputText value="#{reg.campos['NOMBRE']}"   style="text-align:  left; float:  left"  /></f:facet>
                                    <f:facet name="input">
                                        <p:inputText id="CP7008"    styleClass="inputTab"    value="#{reg.campos['NOMBRE']}" style="width:100%"   maxlength="128"  >
                                        </p:inputText>
                                    </f:facet>
                                </p:cellEditor>
                            </p:column>
                            <p:column headerText="Ubicación"  filterBy="#{reg.campos['UBICACION']}"  filterStyle="width:100%"   filterMatchMode="contains" width="212"   style="" >
                                <p:cellEditor>
                                    <f:facet name="output"><h:outputText value="#{reg.campos['UBICACION']}"   style="text-align:  left; float:  left"  /></f:facet>
                                    <f:facet name="input">
                                        <p:inputText id="CP7009"    styleClass="inputTab"    value="#{reg.campos['UBICACION']}" style="width:100%"   maxlength="128"  >
                                        </p:inputText>
                                    </f:facet>
                                </p:cellEditor>
                            </p:column>
							<p:column headerText="#{idm.TC_CK2381}"
								filterBy="#{reg.campos['ES_CUENCA']}" filterMatchMode="exact"
								width="60"
								rendered="#{frmtiposdivisionsControlador.manejaRecursosNat}"
								style="
" styleClass="
">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR217').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText
											value="#{reg.campos['ES_CUENCA']=='false'? 'No':'Si'}" />
									</f:facet>
									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK2381"
												value="#{reg.campos['ES_CUENCA']}">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30"  exportable="false" rendered="#{frmtiposdivisionsControlador.permisos[2] }">
                                <p:rowEditor />
                            </p:column>
                            <p:column width="30"  exportable="false"  rendered="#{frmtiposdivisionsControlador.permisos[1] }">
                                <p:commandButton icon="ui-icon-trash"   title="Eliminar registro"
                                                 onclick="PF('blockGuardar').show()"
                                                 action="#{frmtiposdivisionsControlador.eliminarReg(reg)}"
                                                 oncomplete="refreshTab(); PF('blockGuardar').hide();"
                                                 update=":FRFR217:alert,"
                                                 style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
                                    <p:confirm header="#{sessionBean.tituloMensajes}" message="¿Esta seguro que desea eliminar este registro?" icon="ui-icon-alert" />
                                </p:commandButton>
                            </p:column>
                        </p:dataTable>
                        <p:blockUI block="FRFR217" widgetVar="blockGuardar">
                            Guardando cambios<br/>
                            <p:graphicImage name="/images/general/loading.gif"/>
                        </p:blockUI>
                        <p:blockUI block="FRFR217" widgetVar="blockCarga"  trigger="TBFR217,">
                            Cargando<br/>
                            <p:graphicImage name="/images/general/loading.gif"/>
                        </p:blockUI>
                    </div>
                </h:form>
            </div>
        </section>
    </ui:define>
</ui:composition>
