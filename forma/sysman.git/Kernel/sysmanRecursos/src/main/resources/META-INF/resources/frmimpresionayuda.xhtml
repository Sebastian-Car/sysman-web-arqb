<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR2410}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{imprimirayudaControlador.cargarForma}" />
			<div id="FR2410" style="height: 600px;">
				<h:form style="height: 100%;" id="FRFR2410">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL4650" class="
"
						style="position: relative; height: 53px;">
						<h:outputLabel id="LB56732" value="#{idm.TT_LB56732}"
							style="position: absolute; width:750px; height: 23px; left: 0px;   top: 13px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 20px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL4651" class="
"
						style="position: relative; height: 40px;">
						<p:remoteCommand name="refreshTab" update="TBFR2410"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR2410" var="reg"
							value="#{imprimirayudaControlador.listaInicial}" editable="true"
							widgetVar="TBFR2410" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{imprimirayudaControlador.permisos[4] and false}">
								<h:commandLink
									rendered="#{imprimirayudaControlador.permisos[4] and false}"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR2410" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{imprimirayudaControlador.permisos[4] and false}"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR2410" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{imprimirayudaControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{idm.TT_FR2410}
                            </f:facet>
							<p:column headerText="#{idm.TG_ID2}"
								filterBy="#{reg.campos['ID_PROCESO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="30" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['ID_PROCESO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CP71689}"
								filterBy="#{reg.campos['NOMBRE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="500" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['NOMBRE']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_IMPRIMIR}" exportable="false"
								width="50px" rendered="true">
								<p:commandButton id="BT4165" widgetVar="BT4165"
									icon="ui-iconImprimir" rendered="true" ajax="false"
									tabindex="3" value=""
									actionListener="#{imprimirayudaControlador.oprimirImprimir(reg,rowNun)}"
									style="width:100%; height:30px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 10px;    border:#AAAAAA  none  1px ;">
									<p:fileDownload
										value="#{imprimirayudaControlador.archivoDescarga}" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR2410" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR2410" widgetVar="blockCarga"
							trigger="TBFR2410,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
