<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>

	<ui:define name="script">
		<script>

            }

	<ui:define name="titulo">
		<title>#{idm.TT_FR1765}</title>
	</ui:define>
	<ui:define name="contenido">

			<f:event type="preRenderView"
				listener="#{tiposControlador.cargarForma}" />

					<p:growl id="alert" showDetail="true" sticky="false"

					<div id="PL3402" class="

						style="position: relative; height: 67px;">
						<p:commandButton id="BT3091" widgetVar="BT3091" tabindex="1"
							value="#{idm.TT_BT3091}"
							actionListener="#{tiposControlador.oprimirBtCategorias}"
							style="position: absolute; width:144px; height: 30px; left: 0px;   top: 30px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:block;  color:#0000FF; border:#AAAAAA  solid  1px;">
							<p:ajax event="dialogReturn"
								listener="#{tiposControlador.retornarFormularioBtCategorias}"
								update="@([id$=CB5886])" />
						</p:commandButton>
						<h:outputLabel id="LB45025" value="#{idm.TT_LB45025}"
							style="position: absolute; width:255px; height: 25px; left: 481px;   top: 0px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 16px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{tiposControlador.permisos[0]}"

							<h:outputLabel value="#{idm.TG_CATEGORIA}:" id="LCB5886"
								class="cont-inst-element" />
							<p:selectOneMenu filter="true" effect="fade" id="CB5886"
								panelStyle="width:300px; " editable="false" widgetVar="CB5886"
								value="#{tiposControlador.registro.campos['CATEGORIA']}"
								onchange="" style="width:300px;" class="cont-inst-element">
								<f:selectItem />
								<f:selectItems value="#{tiposControlador.listaCategoria}"
									var="regc" itemLabel="#{regc.campos['NOMBRE']}"
									itemValue="#{regc.campos['ID']}" />
							</p:selectOneMenu>
							<h:outputLabel value="#{idm.TG_CODIGO7}:" id="LCP55190"
								class="cont-inst-element" />
							<p:inputText id="CP55190" widgetVar="CP55190"
								styleClass="inputTab"
								value="#{tiposControlador.registro.campos['CODIGO']}"

								class="cont-inst-element" maxlength="100">
								<pe:keyFilter mask="alphanum" />
							</p:inputText>
							<h:outputLabel value="#{idm.TG_NOMBRE3}:" id="LCP55191"
								class="cont-inst-element" />
							<p:inputText id="CP55191" widgetVar="CP55191"

									var="regc" itemLabel="#{regc.campos['NOMBRE']}"
									itemValue="#{regc.campos['ID']}" />

							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"
										style="padding:10px;" update="FRFR1765,"
										actionListener="#{tiposControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"
										onclick="     if (!validarVaciosModal(['CB5886','CP55190','CP55191'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>

							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL3403" class="

							widgetVar="TBFR1765" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"

							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{tiposControlador.permisos[4] }">
								<h:commandLink rendered="#{tiposControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1765" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{tiposControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1765" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR1765:alert,"
								listener="#{tiposControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{tiposControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />

								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{tiposControlador.permisos[0] and true }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR1765}

								filterStyle="width:100%" filterMatchMode="contains" width="144"
								rendered="true">

									<f:facet name="output">
										<h:outputText value="#{reg.campos['CATEGORIA_NOM']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB5886"
											value="#{reg.campos['CATEGORIA']}" panelStyle="width:300px; "

											<f:selectItem />
											<f:selectItems value="#{tiposControlador.listaCategoria}"
												var="regc" itemLabel="#{regc.campos['NOMBRE']}"
												itemValue="#{regc.campos['ID']}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_CODIGO7}"
								filterBy="#{reg.campos['CODIGO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="200" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGO']}"
											style="text-align:  left; float:  left" />

									<f:facet name="input">
										<p:inputText id="CP55190" styleClass="inputTab"
											value="#{reg.campos['CODIGO']}" style="width:100%"
											maxlength="100">
											<pe:keyFilter mask="alphanum" />
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_NOMBRE3}"
								filterBy="#{reg.campos['NOMBRE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="400" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRE']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP55191" styleClass="inputTab"
											value="#{reg.campos['NOMBRE']}" style="width:100%"
											maxlength="100">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CB5885}"
								filterBy="#{reg.campos['TIPO_PADRE_NOM']}"
								filterStyle="width:100%" filterMatchMode="contains" width="200"
								rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['TIPO_PADRE_NOM']}" />

									<f:facet name="input">

											<f:selectItem />
											<f:selectItems value="#{tiposControlador.listaIdTipoPadre}"
												var="regc" itemLabel="#{regc.campos['NOMBRE']}"
												itemValue="#{regc.campos['ID']}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{tiposControlador.permisos[2] and true}">

							<p:graphicImage name="/images/general/loading.gif" />

							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
