<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	
	<!-- No usar generador JSF ¡Modificar manualmente! Los calendar son personalizados -->
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR1421}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{eventosCalendariosControlador.cargarForma}" />
			<div id="FR1421" style="height: 775px;">
				<h:form style="height: 100%;" id="FRFR1421">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL2737" class="
"
						style="position: relative; height: 82px;">
						<h:outputLabel id="LB36814" value="#{idm.TT_LB36814}"
							style="position: absolute; width:482px; height: 47px; left: 144px;   top: 24px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#7F7F7F  none  1px ;" />
					</div>
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{eventosCalendariosControlador.permisos[0]}"
						onHide="restaurarCampos(['CP45130','CP45131','CP45132'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_FECHA_INICIAL}:" id="LCP45130"
								class="cont-inst-element" />
							<p:calendar locale="es" navigator="true" mask="true"
								pattern="dd/MM/yyyy HH:mm" title="#{idm.AL_CP45130}"
								id="CP45130" widgetVar="CP45130" stepMinute="15"
								value="#{eventosCalendariosControlador.registro.campos['FECHA_INICIAL']}"
								label="LCP45130" style="float: left;" class="cont-inst-element">
							</p:calendar>
							<h:outputLabel value="#{idm.TG_FECHA_FINAL2}:" id="LCP45131"
								class="cont-inst-element" />
							<p:calendar locale="es" navigator="true" mask="true"
								pattern="dd/MM/yyyy HH:mm" title="#{idm.AL_CP45131}"
								id="CP45131" widgetVar="CP45131" stepMinute="15"
								value="#{eventosCalendariosControlador.registro.campos['FECHA_FINAL']}"
								label="LCP45131" style="float: left;" class="cont-inst-element">
							</p:calendar>
							<h:outputLabel value="#{idm.TC_CP45132}:" id="LCP45132"
								class="cont-inst-element" />
							<p:inputText id="CP45132" widgetVar="CP45132"
								styleClass="inputTab" title="#{idm.AL_CP45132}"
								value="#{eventosCalendariosControlador.registro.campos['DESCRIPCION']}"
								label="LCP45132" style=" width: 95%; float: left;"
								class="cont-inst-element" maxlength="255">
							</p:inputText>
							<h:outputLabel value="#{idm.TC_CK2363}:" id="LCK2363"
								style="display:true" class="cont-inst-element" />
							<p:selectBooleanCheckbox id="CK2363" widgetVar="CK2363"
								value="#{eventosCalendariosControlador.registro.campos['BANNER']}"
								label="LCK2363" style="min-width: 80px; display:true"
								class="cont-inst-element">
							</p:selectBooleanCheckbox>
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"
										style="padding:10px;" update="FRFR1421,"
										actionListener="#{eventosCalendariosControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"
										onclick="     if (!validarVaciosModal(['CP45130','CP45131','CP45132'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL2738" class="
"
						style="position: relative; height: 28px;">
						<p:remoteCommand name="refreshTab" update="TBFR1421"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR1421" var="reg"
							value="#{eventosCalendariosControlador.listaInicial}"
							editable="true" widgetVar="TBFR1421"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{eventosCalendariosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{eventosCalendariosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1421" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{eventosCalendariosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1421" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR1421:alert,"
								listener="#{eventosCalendariosControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{eventosCalendariosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{eventosCalendariosControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR1421}
                            </f:facet>
							<p:column headerText="#{idm.TG_FECHA_INICIAL}"
								filterBy="#{reg.campos['FECHA_INICIAL']}"
								filterStyle="width:100%" filterMatchMode="contains" width="157"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHA_INICIAL']}">
											<f:convertDateTime pattern="dd/MM/yyyy HH:mm"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true"
											title="#{idm.AL_CP45130}" mask="true"
											pattern="dd/MM/yyyy HH:mm" id="CP45130"
											widgetVar="CP45130" stepMinute="15"
											value="#{reg.campos['FECHA_INICIAL']}" style="width:100%">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_FECHA_FINAL2}"
								filterBy="#{reg.campos['FECHA_FINAL']}" filterStyle="width:100%"
								filterMatchMode="contains" width="157" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHA_FINAL']}">
											<f:convertDateTime pattern="dd/MM/yyyy HH:mm"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true"
											title="#{idm.AL_CP45131}" mask="true"
											pattern="dd/MM/yyyy HH:mm" id="CP45131"
											widgetVar="CP45131" stepMinute="15"
											value="#{reg.campos['FECHA_FINAL']}" style="width:100%">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP45132}"
								filterBy="#{reg.campos['DESCRIPCION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="446" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['DESCRIPCION']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP45132" styleClass="inputTab"
											title="#{idm.AL_CP45132}"
											value="#{reg.campos['DESCRIPCION']}" style="width:100%"
											maxlength="255">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
								<p:column headerText="#{idm.TC_CK2363}"
								filterBy="#{reg.campos['BANNER']}" filterMatchMode="exact"
								width="50" rendered="true" styleClass="
">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR1421').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText
											value="#{reg.campos['BANNER']=='false'? 'No':'Si'}" />
									</f:facet>
									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK2363"
												value="#{reg.campos['BANNER']}">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{eventosCalendariosControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{eventosCalendariosControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{eventosCalendariosControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR1421:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1421" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1421" widgetVar="blockCarga"
							trigger="TBFR1421,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
