<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TG_NOVEDADES}</title>
		<f:metadata>
			<f:viewParam name="numeroOrden"
				value="#{subnovedadpcontratosControlador.numeroOrden}" />
			<f:viewParam name="claseOrden"
				value="#{subnovedadpcontratosControlador.claseOrden}" />
		</f:metadata>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{subnovedadpcontratosControlador.cargarForma}" />
			<div id="FR368" style="height: 500px;">
				<h:form style="height: 100%;" id="FRFR368">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL803" class="scrollVertical"
						style="position: relative; height: 500px;">
						<p:remoteCommand name="refreshTab" update="TBFR368"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR368" var="reg"
							value="#{subnovedadpcontratosControlador.listaInicial}"
							editable="true" widgetVar="TBFR368"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{subnovedadpcontratosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{subnovedadpcontratosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR368" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{subnovedadpcontratosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR368" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{subnovedadpcontratosControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{idm.TG_NOVEDADES}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP11857}"
								filterBy="#{reg.campos['NOVEDAD']}" filterStyle="width:100%"
								filterMatchMode="contains" width="10%" style="
"
								styleClass="
">
								<h:outputText value="#{reg.campos['NOVEDAD']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_TIPO3}"
								filterBy="#{reg.campos['TIPOT']}" filterStyle="width:100%"
								filterMatchMode="contains" width="10%" style="
"
								styleClass="
">
								<h:outputText value="#{reg.campos['TIPOT']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_NUMERO7}"
								filterBy="#{reg.campos['NUMERO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="15%" style="
"
								styleClass="
">
								<h:outputText value="#{reg.campos['NUMERO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_FECHA4}"
								filterBy="#{reg.campos['FECHA']}" filterStyle="width:100%"
								filterMatchMode="contains" width="15%" style="
"
								styleClass="
">
								<h:outputText value="#{reg.campos['FECHA']}"
									style="text-align:  center; float:  center" />
							</p:column>
							<p:column headerText="#{idm.TG_OBSERVACIONES3}"
								filterBy="#{reg.campos['OBSERVACIONES']}"
								filterStyle="width:100%" filterMatchMode="contains" width="35%"
								style="
" styleClass="
">
								<h:outputText value="#{reg.campos['OBSERVACIONES']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_VALOR_TOTAL3}"
								filterBy="#{reg.campos['VALORTOTAL']}" filterStyle="width:100%"
								filterMatchMode="contains" width="25%" style="
"
								styleClass="
">
								<h:outputText value="#{reg.campos['VALORTOTAL']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR368" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR368" widgetVar="blockCarga"
							trigger="TBFR368,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
