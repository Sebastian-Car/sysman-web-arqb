<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>

            function loadDetalle() {
            }

					</p:confirmDialog>
					<div id="PL3517" class="
"

						<p:remoteCommand name="refreshTab" update="TBFR1816"
							oncomplete="PF('blockGuardar').hide();" />

							scrollWidth="100%" lazy="true">

									title="#{idm.TI_VER_EXCEL}">

									<p:dataExporter type="xls" target="TBFR1816" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{tablasauditarsControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">

										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR1816:alert,"
								listener="#{tablasauditarsControlador.editar}"

								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{tablasauditarsControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />

								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR1816}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP56338}"
								filterBy="#{reg.campos['NOMBRE_BD']}" filterStyle="width:100%"
								filterMatchMode="contains" width="20%" rendered="true"
								style="display:none;" styleClass="
">

										<h:outputText value="#{reg.campos['NOMBRE_BD']}"
											style="text-align:  left; float:  left" />

									<f:facet name="input">
										<p:inputText id="CP56338" styleClass="inputTab"
											value="#{reg.campos['NOMBRE_BD']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP56339}"
								filterBy="#{reg.campos['NOMBRE_TABLA']}"
								filterStyle="width:100%" filterMatchMode="contains" width="25%"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRE_TABLA']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP56339" styleClass="inputTab"
											value="#{reg.campos['NOMBRE_TABLA']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CK1587}"
								filterBy="#{reg.campos['IND_INSERTAR']}" filterMatchMode="exact"
								width="15%" rendered="true" styleClass="
">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR1816').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText
											value="#{reg.campos['IND_INSERTAR']=='false'? 'No':'Si'}" />
									</f:facet>
									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK1587"
												value="#{reg.campos['IND_INSERTAR']}">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_ACTUALIZAR}"
								filterBy="#{reg.campos['IND_EDITAR']}" filterMatchMode="exact"
								width="15%" rendered="true" styleClass="
">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR1816').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>

											<h:selectBooleanCheckbox id="CK1588"
												value="#{reg.campos['IND_EDITAR']}">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_ELIMINAR}"
								filterBy="#{reg.campos['IND_ELIMINAR']}" filterMatchMode="exact"
								width="15%" rendered="true" styleClass="
">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR1816').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />

											</h:selectBooleanCheckbox>
										</center>
									</f:facet>

							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1816" widgetVar="blockCarga"
							trigger="TBFR1816,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
