<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR1964}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{monitorinControlador.cargarForma}" />
			<div id="FR1964" style="height: auto;">
				<h:form style="height: 100%;" id="FRFR1964">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL3822" class="
"
						style="position: relative; height: Auto;"></div>
					<div id="PL3823" class="
"
						style="position: relative; height: auto;"></div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL3819" class="
"
						style="position: relative; height: auto;">
						<p:remoteCommand name="refreshTab" update="TBFR1964"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR1964" var="reg"
							value="#{monitorinControlador.listaInicial}" editable="true"
							widgetVar="TBFR1964" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{monitorinControlador.permisos[4] }">
								<h:commandLink rendered="#{monitorinControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1964" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{monitorinControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1964" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR1964}
                            </f:facet>
							<p:column headerText="#{idm.TG_ANIO3}"
								filterBy="#{reg.campos['ANO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="2" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['ANO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_MES3}"
								filterBy="#{reg.campos['MES']}" filterStyle="width:100%"
								filterMatchMode="contains" width="5" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['MES']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CP60591}"
								filterBy="#{reg.campos['DIA']}" filterStyle="width:100%"
								filterMatchMode="contains" width="5" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['DIA']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_INDICADOR}"
								filterBy="#{reg.campos['CODIGO_INDICADOR']}"
								filterStyle="width:100%" filterMatchMode="contains" width="40"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['CODIGO_INDICADOR']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CP60593}"
								filterBy="#{reg.campos['ULTIMA_FECHA']}"
								filterStyle="width:100%" filterMatchMode="contains" width="150"
								rendered="true" style="display:none;" styleClass="
">
								<h:outputText value="#{reg.campos['ULTIMA_FECHA']}">
									<f:convertDateTime pattern="dd/MM/yyyy"
										timeZone="#{sessionBean.timeZone}" />
								</h:outputText>
							</p:column>
							<p:column headerText="#{idm.TG_DESCRIPCION7}"
								filterBy="#{reg.campos['DESCRIPCION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="120" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['DESCRIPCION']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_VALOR4}"
								filterBy="#{reg.campos['VALOR']}" filterStyle="width:100%"
								filterMatchMode="contains" width="30" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['VALOR']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CP60608}"
								filterBy="#{reg.campos['TIPO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="50" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['TIPO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{monitorinControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{monitorinControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR1964:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1964" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1964" widgetVar="blockCarga"
							trigger="TBFR1964,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
