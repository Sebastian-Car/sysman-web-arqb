<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR1818}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{columnasAuditarsControlador.cargarForma}" />
			<div id="FR1818" style="height: 450px;">
				<h:form style="height: 100%;" id="FRFR1818">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL3519" class="
"
						style="position: relative; height: 25px;">
						<p:remoteCommand name="refreshTab" update="TBFR1818"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR1818" var="reg"
							value="#{columnasAuditarsControlador.listaInicial}"
							editable="true" widgetVar="TBFR1818"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{columnasAuditarsControlador.permisos[4] }">
								<h:commandLink
									rendered="#{columnasAuditarsControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1818" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{columnasAuditarsControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1818" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{columnasAuditarsControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{idm.TT_FR1818}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP56346}"
								filterBy="#{reg.campos['NOMBRE_TABLA']}"
								filterStyle="width:100%" filterMatchMode="contains" width="40%"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['NOMBRE_TABLA']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CP56347}"
								filterBy="#{reg.campos['NOMBRE_COLUMNA']}"
								filterStyle="width:100%" filterMatchMode="contains" width="40%"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['NOMBRE_COLUMNA']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CK1590}"
								filterBy="#{reg.campos['IND_AUDITAR']}" filterMatchMode="exact"
								width="20%" rendered="true" style="display:none;"
								styleClass="
">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR1818').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText
											value="#{reg.campos['IND_AUDITAR']=='false'? 'No':'Si'}" />
									</f:facet>
									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK1590"
												value="#{reg.campos['IND_AUDITAR']}">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1818" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1818" widgetVar="blockCarga"
							trigger="TBFR1818,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
