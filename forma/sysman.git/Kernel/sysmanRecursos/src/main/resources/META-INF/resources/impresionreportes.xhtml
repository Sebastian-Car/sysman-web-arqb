<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR1825}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{impresionReportesControlador.cargarForma}" />
			<div id="FR1825" style="height: auto;">
				<h:form style="height: 100%;" id="FRFR1825">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL3532" class="
"
						style="position: relative; height: 53px;">
						<h:outputLabel id="LB45984" value="#{idm.TT_LB45984}"
							style="position: absolute; width:336px; height: 24px; left: 540px;   top: 5px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL3533" class="
"
						style="position: relative; height: auto;">
						<p:remoteCommand name="refreshTab" update="TBFR1825"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR1825" var="reg"
							value="#{impresionReportesControlador.listaInicial}"
							editable="true" widgetVar="TBFR1825"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{impresionReportesControlador.permisos[4] }">
								<h:commandLink
									rendered="#{impresionReportesControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1825" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{impresionReportesControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1825" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR1825}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP56525}"
								filterBy="#{reg.campos['CODIGO_REPORTE']}"
								filterStyle="width:100%" filterMatchMode="contains" width="10%"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['CODIGO_REPORTE']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CP56526}"
								filterBy="#{reg.campos['NOMBRE_REPORTE']}"
								filterStyle="width:100%" filterMatchMode="contains" width="20%"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['NOMBRE_REPORTE']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CP56527}"
								filterBy="#{reg.campos['NOMBRE_CONSULTA']}"
								filterStyle="width:100%" filterMatchMode="contains" width="20%"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['NOMBRE_CONSULTA']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_IMPRIMIR}" exportable="false"
								width="10%" rendered="true">
								<p:commandButton id="BT3197" widgetVar="BT3197"
									onclick="PrimeFaces.monitorDownload(mostrarEsperaCont,ocultarEsperaCont);
return true;"
									icon="ui-iconImprimir" rendered="true" ajax="false"
									tabindex="5" value=""
									actionListener="#{impresionReportesControlador.oprimirImprimir(reg,rowNun)}"
									style="width:100%; height:30px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 13px;    border:#aaaaaa 1px solid;">
									<p:fileDownload
										value="#{impresionReportesControlador.archivoDescarga}" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1825" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1825" widgetVar="blockCarga"
							trigger="TBFR1825,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
