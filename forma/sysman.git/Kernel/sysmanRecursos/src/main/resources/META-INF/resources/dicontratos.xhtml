<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
              asignarFileUnico();
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TG_DIGITALIZACION_CONTRATOS}</title>
		<f:metadata>
			<f:viewParam name="claseOrden"
				value="#{digitalizacionContratosControlador.claseOrden}" />
			<f:viewParam name="numeroOrden"
				value="#{digitalizacionContratosControlador.numeroOrden}" />
		</f:metadata>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{digitalizacionContratosControlador.cargarForma}" />
			<div id="FR444" style="height: 600px;">
				<h:form style="height: 100%;" id="FRFR444">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL978" class="
"
						style="position: relative; height: 50px;">
						<p:fileUpload id="LA5" widgetVar="LA5" styleClass="funico"
							label="#{idm.TG_SUBIR}"
							invalidSizeMessage="#{idm.LA_TAMANO_NO_VALIDO}"
							invalidFileMessage="#{idm.LA_ARCHIVO_NO_VALIDO}" mode="advanced"
							auto="true"
							fileUploadListener="#{digitalizacionContratosControlador.cargarArchivoSubirContrato}"
							style="position: absolute; width:100px; height: 30px; left: 5px;   top: 5px; text-align: left; font-weight: none; font-style: none; font-family: Tahoma; font-size: 13px; display:true; background:#FFFFFF; color:#000000;"
							update="@form">
						</p:fileUpload>
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL979" class="
"
						style="position: relative; height: 400px;">
						<p:remoteCommand name="refreshTab" update="TBFR444"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR444" var="reg"
							value="#{digitalizacionContratosControlador.listaInicial}"
							editable="true" widgetVar="TBFR444"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{digitalizacionContratosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{digitalizacionContratosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR444" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{digitalizacionContratosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR444" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{digitalizacionContratosControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{idm.TG_DIGITALIZACION_CONTRATOS}
                            </f:facet>
							<p:column headerText="#{idm.TG_NOMBRE_DEL_ARCHIVO}"
								filterBy="#{reg.campos['ARCHIVO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="80%" rendered="true"
								style="
" styleClass="
">
								<h:outputText value="#{reg.campos['ARCHIVO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_DESCARGAR}" exportable="false"
								width="20%" rendered="true" style="
">
								<p:commandButton id="BT871" widgetVar="BT871" rendered="true"
									ajax="false" tabindex="2" value="#{idm.TG_DESCARGAR}"
									actionListener="#{digitalizacionContratosControlador.oprimirDescargar(reg,rowNun)}"
									style="width:100%; height:30px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; 
  color:#0000FF; border:#000000  solid  1px ;">
									<p:fileDownload
										value="#{digitalizacionContratosControlador.archivoDescarga}" />
								</p:commandButton>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{digitalizacionContratosControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{digitalizacionContratosControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR444:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR444" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR444" widgetVar="blockCarga"
							trigger="TBFR444,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
