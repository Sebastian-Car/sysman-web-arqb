<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TT_FR2523}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<h:form id="FR2523_nuevo" style="margin-top: -20px;">
				<p:confirmDialog global="true" showEffect="fade" id="confFR2523"
					widgetVar="confFR2523">
					<p:commandButton value="#{idm.TI_SI}" type="button"
						styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
					<p:commandButton value="#{idm.TI_NO}" type="button"
						styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
				</p:confirmDialog>
				<p:growl id="alert" showDetail="true" sticky="false"
					widgetVar="alert" life="5000" autoUpdate="true" escape="false" />
				<p:panel id="nuevoPanel" widgetVar="nuevoPanel">
					<div
						style="position: relative; height: 50px; padding-bottom: 80px;">
						<div class="acme">
							<h:outputLink value="#{request.contextPath}/menu.sysman"
								title="#{idm.TI_VOLVER}" style="padding-top: 10px;">
								<center>
									<p:graphicImage name="/images/menus/32/close.png" />
									<div style="height: 30px">#{idm.TI_CERRAR}</div>
								</center>
							</h:outputLink>
						</div>
					</div>
					<div id="PL4869" class="
"
						style="position: relative; height: 616px;">
						<iframe id="biFrame" width="100%" height="100%" frameborder="0"
							style="border: none;"> </iframe>

						<!-- Oculta barra inferior -->
						<div
							style="position: absolute; bottom: 0; left: 0; width: 100%; height: 55px; background: white; z-index: 9;">
						</div>

						<!-- Oculta esquina inferior derecha -->
						<div
							style="position: absolute; bottom: 0; right: 0; width: 260px; height: 130px; background: white; z-index: 10;">
						</div>
						<script type="text/javascript">
//<![CDATA[
(function(){
    var ref = '#{frmTableroPowerBIControlador.urlPowerBI}';
    if(ref && ref.trim() !== '' && ref !== 'null') {
        document.getElementById('biFrame').src =
            '#{request.contextPath}/bi/view?ref=' + ref;
    }  else {
        $(document).ready(function() {
            PF('alert').renderMessage({
                summary: 'Aviso',
                detail: 'No se encontró una URL configurada para este formulario. Por favor, valide la parametrización o comuníquese con el administrador del sistema.',
                severity: 'info'
            });
        });
    }
})();
//]]>
</script>

					</div>
					<p:blockUI block="nuevoPanel" widgetVar="blockNuevo" trigger="">
#{idm.TI_CARGANDO}<br />
						<p:graphicImage name="/images/general/loading.gif" />
					</p:blockUI>
					<p:blockUI block="nuevoPanel" widgetVar="blockNuevoGuardar">
#{idm.TI_GUARDANDO_CAMBIOS}<br />
						<p:graphicImage name="/images/general/loading.gif" />
					</p:blockUI>
				</p:panel>
			</h:form>
		</section>
	</ui:define>
</ui:composition>
