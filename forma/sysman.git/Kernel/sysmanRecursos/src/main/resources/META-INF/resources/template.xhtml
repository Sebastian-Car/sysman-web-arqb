	<script type="text/javascript">
            $(document).ready(function () {
                cargaTab();
                gestionarZoom(document);
                $('body').on('keydown', '*', function (e) {
                    if ($('iframe')[0] != undefined) {
                        $('iframe')[0].contentWindow.focus();
                        return false;
                    }
                });
                inicializarMonitor();
                cargarImagen('bannerParametrizado');
            });
        </script>
	<ui:insert name="script">

	</ui:insert>
	<p:ajaxExceptionHandler
		type="javax.faces.application.ViewExpiredException"
		onexception="location.href='#{request.contextPath}/menu.sysman'" />
	<f:loadBundle basename="com.sysman.properties.esp" var="idm" />
</h:head>
