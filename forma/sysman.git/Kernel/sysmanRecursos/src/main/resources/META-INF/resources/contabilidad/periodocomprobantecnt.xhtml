<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="../templateModal.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
              asignarEventoContGrande();
validarCargaGrandes();
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.EM_FR544}</title>
	</ui:define>
	<ui:define name="contenido">
		<section
			class="radiusModal"
			style="height: auto">
			<div
				id="panelModal"
				style="position: relative; height: auto"
				class="
">
				<h:form
					id="FR544_nuevo"
					style="position: relative; width: 100%; height: 210px; margin: 0px">
					<p:growl
						id="alert"
						showDetail="true"
						sticky="false"
						widgetVar="alert"
						life="5000"
						autoUpdate="false"
						escape="false" />
					<p:growl
						id="message"
						showDetail="true"
						escape="false" />
					<p:confirmDialog
						global="true"
						showEffect="fade"
						id="confFR544"
						widgetVar="confFR544">
						<p:commandButton
							value="#{idm.TI_SI}"
							type="button"
							styleClass="ui-confirmdialog-yes"
							icon="ui-icon-check" />
						<p:commandButton
							value="#{idm.TI_NO}"
							type="button"
							styleClass="ui-confirmdialog-no"
							icon="ui-icon-close" />
					</p:confirmDialog>
					<p:selectOneMenu
						filter="true"
						editable="false"
						effect="fade"
						id="CB2043"
						widgetVar="CB2043"
						value="#{periodoComprobanteCntControlador.ano}"
						tabindex="1"
						style="position: absolute; width:70px; height: 20px; left: 160px;   top: 24px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  solid  1px ;">
						<f:selectItem />
						<f:selectItems
							value="#{periodoComprobanteCntControlador.listaAno}"
							var="regc"
							itemLabel="#{regc.campos['NUMERO']}"
							itemValue="#{regc.campos['NUMERO']}" />
					</p:selectOneMenu>
					<p:commandButton
						id="BT1073"
						widgetVar="BT1073"
						tabindex="5"
						value="#{idm.TG_CANCELAR}"
						actionListener="#{periodoComprobanteCntControlador.oprimirCancelar}"
						style="position: absolute; width:80px; height: 35px; left: 283px;   top: 116px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:block;  color:#FF0000; border:#AAAAAA  solid  1px;">
					</p:commandButton>
					<p:selectOneMenu
						filter="true"
						editable="false"
						effect="fade"
						id="CB1949"
						widgetVar="CB1949"
						value="#{periodoComprobanteCntControlador.mes}"
						tabindex="2"
						style="position: absolute; width:110px; height: 20px; left: 160px;   top: 50px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  solid  1px ;">
						<f:selectItem />
						<f:selectItem
							itemValue="1"
							itemLabel="#{idm.TG_ENERO}" />
						<f:selectItem
							itemValue="2"
							itemLabel="#{idm.TG_FEBRERO}" />
						<f:selectItem
							itemValue="3"
							itemLabel="#{idm.TG_MARZO}" />
						<f:selectItem
							itemValue="4"
							itemLabel="#{idm.TG_ABRIL}" />
						<f:selectItem
							itemValue="5"
							itemLabel="#{idm.TG_MAYO}" />
						<f:selectItem
							itemValue="6"
							itemLabel="#{idm.TG_JUNIO}" />
						<f:selectItem
							itemValue="7"
							itemLabel="#{idm.TG_JULIO}" />
						<f:selectItem
							itemValue="8"
							itemLabel="#{idm.TG_AGOSTO}" />
						<f:selectItem
							itemValue="9"
							itemLabel="#{idm.TG_SEPTIEMBRE}" />
						<f:selectItem
							itemValue="10"
							itemLabel="#{idm.TG_OCTUBRE}" />
						<f:selectItem
							itemValue="11"
							itemLabel="#{idm.TG_NOVIEMBRE}" />
						<f:selectItem
							itemValue="12"
							itemLabel="#{idm.TG_DICIEMBRE}" />
					</p:selectOneMenu>
					<h:outputLabel
						id="LB13993"
						value="#{idm.TG_TIPO_COMPROBANTE6}"
						style="position: absolute; width:143px; height: 20px; left: 5px;   top: 75px; text-align: right; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					<h:outputLabel
						id="LB13991"
						value="#{idm.TG_ANIO4}"
						style="position: absolute; width:143px; height: 20px; left: 5px;   top: 24px; text-align: right; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					<h:outputLabel
						id="LB13992"
						value="#{idm.TG_MES4}"
						style="position: absolute; width:143px; height: 20px; left: 5px;   top: 50px; text-align: right; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					<p:commandButton
						id="BT1072"
						widgetVar="BT1072"
						onclick="if (!validarVaciosViewModal(['CB2043', 'CB1949', 'CB1950'])) {
                                PF('alert').renderMessage({'summary': '#{idm.TI_TT_ERROR_VALIDACION}',
                                    'detail': '#{idm.TI_MS_ERROR_VALIDACION}',
                                    'severity': 'error'});
                                return false;
                            }"
						tabindex="4"
						value="#{idm.TG_ACEPTAR}"
						actionListener="#{periodoComprobanteCntControlador.oprimirAceptar}"
						style="position: absolute; width:80px; height: 35px; left: 197px;   top: 116px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:block;  color:#0000FF; border:#AAAAAA  solid  1px;">
					</p:commandButton>
					<p:inputText
						id="CB1950"
						widgetVar="CB1950"
						onfocus="if(!false){PF('BTCB1950').jq.focus();}"
						onclick="if(!false){PF('PLCB1950').show();}"
						value="#{periodoComprobanteCntControlador.nombreMovimiento}"
						tabindex="-1"
						style="cursor:pointer; position: absolute; width:205px; height: 20px; left: 160px;   top: 75px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  solid  1px ; padding-bottom: 0; padding-left: 2px; padding-top: 0;" />
					<p:commandButton
						id="BTCB1950"
						onblur="PF('CB1950').jq.blur();"
						onfocus="PF('CB1950').jq.addClass('ui-state-focus');"
						widgetVar="BTCB1950"
						type="button"
						icon="ui-icon ui-icon-triangle-1-s ui-c"
						style="position: absolute; width:25px; height:  20px; left: 363px;   top: 75px; display:block; "
						tabindex="3" />
					<p:overlayPanel
						widgetVar="PLCB1950"
						id="PLCB1950"
						onShow="if(PF('TBCB1950').nuevo){ PF('TBCB1950').filter(); PF('TBCB1950').nuevo=false;}"
						onHide="if(document.activeElement.id=='' || document.activeElement.id.indexOf('filter')>-1){PF('CB1950').jq.focus();}"
						my="left"
						at="left"
						for="BTCB1950"
						hideEffect="fade"
						style="width: 500px">
						<p:dataTable
							id="TBCB1950"
							widgetVar="TBCB1950"
							var="reg"
							value="#{periodoComprobanteCntControlador.listaTipo}"
							editable="true"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="11"
							rowIndexVar="rowIndex"
							selectionMode="single"
							rowKey="#{reg.campos['CODIGO']}"
							paginator="true"
							lazy="true">
							<p:ajax
								event="rowSelect"
								listener="#{periodoComprobanteCntControlador.seleccionarFilaTipo}"
								update=":FR544_nuevo:CB1950,"
								oncomplete="PF('PLCB1950').hide(); " />
							<p:column
								headerText="#{idm.TG_COD4}"
								style="text-align:center; "
								width="70"
								filterBy="#{reg.campos['CODIGO']}"
								filterMatchMode="startsWith"
								filterStyle="width:100%;">
								<h:outputText
									value="#{reg.campos['CODIGO']}"
									style="float:left;  text-align:left;  min-height: 20px;" />
							</p:column>
							<p:column
								headerText="#{idm.TG_NOMBRE3}"
								style="text-align:center; "
								width="220"
								filterBy="#{reg.campos['NOMBRE']}"
								filterMatchMode="contains"
								filterStyle="width:100%;">
								<h:outputText
									value="#{reg.campos['NOMBRE']}"
									style="float:left;  text-align:left;  min-height: 20px;" />
							</p:column>
						</p:dataTable>
					</p:overlayPanel>
					<p:blockUI
						block="FR544_nuevo"
						widgetVar="blockNuevo"
						trigger="">
#{idm.TI_CARGANDO}<br />
						<p:graphicImage name="/images/general/loading.gif" />
					</p:blockUI>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
