<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html >
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="http://java.sun.com/jsf/composite"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core">

    <!-- INTERFACE -->
    <cc:interface >
	<cc:attribute  name="tipo" required="true"  />
	<!--Area-->
	<cc:attribute  name="CODIGO_OBJETO" required="false"  />
	<cc:attribute  name="ORIGENCONTROL" required="false"  />
	<cc:attribute  name="AYUDA_CORTA" required="false"  />
	<cc:attribute  name="BLOQUEADO" required="false"  />
	<cc:attribute  name="TABINDEX" required="false"  />
	<cc:attribute  name="ANCHO" required="false"  />
	<cc:attribute  name="ALTO" required="false"  />
	<cc:attribute  name="ALINEACION_IZQ" required="false"  />
	<cc:attribute  name="ALINEACION_ARRI" required="false"  />
	<cc:attribute  name="ALINEACION" required="false"  />
	<cc:attribute  name="NEGRITA" required="false"  />
	<cc:attribute  name="CURSIVA" required="false"  />
	<cc:attribute  name="TIPO_FUENTE" required="false"  />
	<cc:attribute  name="TAMANO" required="false"  />
	<cc:attribute  name="VISIBLE" required="false"  />
	<cc:attribute  name="FONDO" required="false"  />
	<cc:attribute  name="COLOR" required="false"  />
	<cc:attribute  name="BORDE" required="false"  />
	<!--CHEACK-->
	<cc:attribute  name="AL_CAMBIAR_JS" required="false"  />
	<cc:attribute  name="EVENTO" required="false"  />
	<!--COMBO-->
	<cc:attribute  name="CONF" required="false"  />
	<cc:attribute  name="ITEMS" required="false"  />
	<cc:attribute  name="ANCHO_LISTA" required="false"  />
	<!--CAMPO-->
	<cc:attribute  name="SOLO_LECTURA" required="false"  />
	<cc:attribute  name="AYUDA_LARGA" required="false"  />
	<cc:attribute  name="MAXIMO" required="false"  />
	<cc:attribute  name="SUBRAYADA" required="false"  />
	<cc:attribute  name="VALIDACION_ENTRADA" required="false"  />
	<!--FECHA-->
	<cc:attribute  name="CLASE_ESTILO" required="false"  />



    </cc:interface>

    <!-- IMPLEMENTATION -->
    <cc:implementation>

	<!--AREA-->
	<p:inputTextarea
	    rendered="#{cc.attrs.tipo=='A'}"
	    />
	<!--COMBO-->

	<p:selectOneMenu
	    rendered="#{cc.attrs.tipo=='CB'}"
	    >

	    <f:selectItem/>
	</p:selectOneMenu>

	<!--CHECK-->
	<p:selectBooleanCheckbox
	    rendered="#{cc.attrs.tipo=='A'}"
	    >

	</p:selectBooleanCheckbox>

	<!--CAMPO-->
	<p:inputText
	    rendered="#{cc.attrs.tipo=='CP'}"
	    >

	</p:inputText>

	<!--FECHA-->
	<p:calendar
	    rendered="#{cc.attrs.tipo=='F'}"
	    >

	</p:calendar>

	<!--HORA-->
	<p:calendar

	    rendered="#{cc.attrs.tipo=='H'}"

	    />

	<!--paswoord-->
	<p:password
	    rendered="#{cc.attrs.tipo=='PW'}"
	    />

    </cc:implementation>
</html>
