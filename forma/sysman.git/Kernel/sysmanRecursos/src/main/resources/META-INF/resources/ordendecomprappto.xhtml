<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TG_RELACION_PRESUPUESTAL}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{ordendecomprapptosControlador.cargarForma}" />
			<div id="FR369" style="height: 882px;">
				<h:form style="height: 100%;" id="FRFR369">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL804" class="
"
						style="position: relative; height: 82px;">
						<h:outputLabel id="LB10061" value="#{idm.TT_LB10061}"
							style="position: absolute; width:322px; height: 25px; left: 300px;   top: 5px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL805" class="
"
						style="position: relative; height: 700px;">
						<p:remoteCommand name="refreshTab" update="TBFR369"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR369" var="reg"
							value="#{ordendecomprapptosControlador.listaInicial}"
							editable="true" widgetVar="TBFR369"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{ordendecomprapptosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{ordendecomprapptosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR369" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{ordendecomprapptosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR369" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink title="Volver al menú"
											style="padding-top: 10px;" value="javascript:void(0)"
											onclick="rcCerrar();">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
									<p:remoteCommand name="rcCerrar"
										actionListener="#{ordendecomprapptosControlador.ejecutarrcCerrar}" />
								</div>	 
                            #{idm.TG_RELACION_PRESUPUESTAL}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP11864}"
								filterBy="#{reg.campos['NUMEROPPTO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="65%" style="
"
								styleClass="
">
								<h:outputText value="#{reg.campos['NUMEROPPTO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CP11863}"
								filterBy="#{reg.campos['DESCTIPOPPTO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="15%"
								style="
" styleClass="
">
								<h:outputText value="#{reg.campos['DESCTIPOPPTO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_VER_DETALLE}" exportable="false"
								width="20%" style="
">
								<p:commandButton id="BT726" widgetVar="BT726" tabindex="3"
									value="#{idm.TG_VER_DETALLE}"
									actionListener="#{ordendecomprapptosControlador.oprimirBTDetalle(reg,rowNun)}"
									style="width:100%;  height:22px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; 
  color:#0000FF; border:#000000  solid  1px ;">
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR369" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR369" widgetVar="blockCarga"
							trigger="TBFR369,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
