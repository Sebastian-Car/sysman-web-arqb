  <script type="text/javascript" src="/sysmanWeb/js/escaner.js"></script>
    <script type="text/javascript">

  var url = window.location.href;
   console.log(url);
  url = url.replace('_25', "?");
  url = url.replace('_26', String.fromCharCode(38));
  url = url.replace('_27', '=');
  url = url.replace('_27', '=');
  url = url.replace('_27', '=');
  url = url.replace('_27', '=');
  url = url.replace('?surl:', '');  
  var urlN = new URL(url);
  var rutaArchivo = urlN.search;
  console.log(rutaArchivo);
  var directory = "";
  var narchivo="";
  if(rutaArchivo){
     directory = rutaArchivo.substring(0,rutaArchivo.lastIndexOf('/'));
     narchivo=rutaArchivo;
     document.getElementById('Destino').value = "";
     if (directory){
         narchivo = rutaArchivo.substring(directory.length +1);
         directory = directory.replace('?rutaArchivo:','');
         document.getElementById('Destino').value = directory;
     }   
     document.getElementById('fichero').value = narchivo;
//     document.getElementById('Destino').style.display = "none";
//     document.getElementById('Fichero').style.display = "none";
   document.getElementById('Destino').disabled = true;
   document.getElementById('fichero').disabled = true;
  }
 
  </script>
