<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModal.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
			function loadDetalle() {
			}
			window.onload = loadDetalle;
		</script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{frmVisualizarArchivosControlador.titulo}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal" style="height: auto">
			<div id="panelModal" style="position: relative; height: auto"
				class="">
				<img style="display: #{frmVisualizarArchivosControlador.tipoArchivo.equals('IMAGEN')?'block':'none'}" 
				     alt="" 
				     src="#{frmVisualizarArchivosControlador.codeBase}"/>
				<embed style="height: 600px; 
				              display: #{frmVisualizarArchivosControlador.tipoArchivo.equals('PDF')?'block':'none'}" 
				       src="#{frmVisualizarArchivosControlador.codeBase}" 
				       type="application/pdf" 
				       width="900px" />
			</div>
		</section>
	</ui:define>
</ui:composition>
