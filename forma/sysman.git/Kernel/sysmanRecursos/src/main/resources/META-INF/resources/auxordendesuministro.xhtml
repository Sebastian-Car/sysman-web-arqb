<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR371}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{auxordendesuministrosControlador.cargarForma}" />
			<div id="FR371" style="height: 500px;">
				<h:form style="height: 100%;" id="FRFR371">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL810" class="dobleScroll"
						style="position: relative; height: 100%;">
						<p:remoteCommand name="refreshTab" update="TBFR371"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR371" var="reg"
							value="#{auxordendesuministrosControlador.listaInicial}"
							editable="true" widgetVar="TBFR371"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{auxordendesuministrosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{auxordendesuministrosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR371" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{auxordendesuministrosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR371" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR371:alert,"
								listener="#{auxordendesuministrosControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{auxordendesuministrosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{auxordendesuministrosControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{idm.TT_FR371}
                            </f:facet>
							<p:column headerText="#{idm.TG_NUMERO7}"
								filterBy="#{reg.campos['NUMERO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="10%" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NUMERO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP11874" styleClass="inputTab"
											value="#{reg.campos['NUMERO']}" style="width:100%"
											readonly="true" maxlength="22">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_FECHA4}"
								filterBy="#{reg.campos['FECHA']}" filterStyle="width:100%"
								filterMatchMode="contains" width="10%" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHA']}">
											<f:convertDateTime pattern="dd/MM/yyyy"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true" mask="true"
											pattern="dd/MM/yyyy" id="CP11872" widgetVar="CP11872"
											value="#{reg.campos['FECHA']}" style="width:100%"
											disabled="true">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_DESCRIPCION7}"
								filterBy="#{reg.campos['DESCRIPCION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="65%" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['DESCRIPCION']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP11873" styleClass="inputTab"
											value="#{reg.campos['DESCRIPCION']}" style="width:100%"
											readonly="true" maxlength="255">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CK271}"
								filterBy="#{reg.campos['SELECCIONADA']}" filterMatchMode="exact"
								width="10%" styleClass="
">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR371').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText
											value="#{reg.campos['SELECCIONADA']=='false'? 'No':'Si'}" />
									</f:facet>
									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK271"
												value="#{reg.campos['SELECCIONADA']}">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{auxordendesuministrosControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR371" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR371" widgetVar="blockCarga"
							trigger="TBFR371,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
