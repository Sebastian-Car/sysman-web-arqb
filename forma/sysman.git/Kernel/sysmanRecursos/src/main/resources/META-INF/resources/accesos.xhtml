<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR1787}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{accesosControlador.cargarForma}" />
			<div id="FR1787" style="height: auto;">
				<h:form style="height: 100%;" id="FRFR1787">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL3450" class="
"
						style="position: relative; height: 87px;">
						<p:commandButton id="BT3150" widgetVar="BT3150" tabindex="1"
							value="#{idm.TT_BT3150}"
							actionListener="#{accesosControlador.oprimirExcepcion}"
							style="position: absolute; width:120px; height: 25px; left: 800px;   top: 18px; text-align: left; font-weight: bolder; font-style: normal; font-family: Tahoma; font-size: 13px; display:block;   border:#aaaaaa  Solid  1px;">
						</p:commandButton>
						<h:outputLabel id="LB45183" value="#{idm.TT_LB45183}"
							style="position: absolute; width:255px; height: 27px; left: 500px;   top: 19px; text-align: left; font-weight: bolder; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#404040; border:#A6A6A6  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL3451" class="
"
						style="position: relative; height: auto;">
						<p:remoteCommand name="refreshTab" update="TBFR1787"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR1787" var="reg"
							value="#{accesosControlador.listaInicial}" editable="true"
							widgetVar="TBFR1787" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{accesosControlador.permisos[4] }">
								<h:commandLink rendered="#{accesosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1787" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{accesosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1787" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR1787:alert,"
								listener="#{accesosControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{accesosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR1787}
                            </f:facet>
							<p:column headerText="#{idm.TG_DIA3}"
								filterBy="#{reg.campos['DIA']}" filterStyle="width:100%"
								filterMatchMode="contains" width="30%" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['DIA']}"
											style="text-align:  center; float:  center" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP55379" styleClass="inputTab"
											value="#{reg.campos['DIA']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_HORA_INICIAL}"
								filterBy="#{reg.campos['HORA_INICIAL']}"
								filterStyle="width:100%" filterMatchMode="contains" width="15%"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['HORA_INICIAL']}">
											<f:convertDateTime pattern="HH:mm"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true" mask="true"
											pattern="HH:mm" timeOnly="true" id="CP55380"
											widgetVar="CP55380" value="#{reg.campos['HORA_INICIAL']}"
											style="width:100%">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_HORA_FINAL}"
								filterBy="#{reg.campos['HORA_FINAL']}" filterStyle="width:100%"
								filterMatchMode="contains" width="15%" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['HORA_FINAL']}">
											<f:convertDateTime pattern="HH:mm"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true" mask="true"
											pattern="HH:mm" timeOnly="true" id="CP55381"
											widgetVar="CP55381" value="#{reg.campos['HORA_FINAL']}"
											style="width:100%">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CK1573}"
								filterBy="#{reg.campos['INCLUYE_FESTIVO']}"
								filterMatchMode="exact" width="15%" rendered="true"
								styleClass="
">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR1787').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText
											value="#{reg.campos['INCLUYE_FESTIVO']=='false'? 'No':'Si'}" />
									</f:facet>
									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK1573"
												value="#{reg.campos['INCLUYE_FESTIVO']}">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{accesosControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1787" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1787" widgetVar="blockCarga"
							trigger="TBFR1787,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
