<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR1690}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{solicitudesAutsControlador.cargarForma}" />
			<div id="FR1690" style="height: auto;">
				<h:form style="height: 100%;" id="FRFR1690">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL3252" class="
"
						style="position: relative; height: 75px;">
						<p:commandButton id="BT3497" widgetVar="BT3497" update="@form"
							tabindex="1" value="#{idm.TT_BT3497}"
							actionListener="#{solicitudesAutsControlador.oprimirbtnHistorico}"
							style="position: absolute; width:120px; height: 27px; left: 260px;   top: 25px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:#{solicitudesAutsControlador.verBotonHistorico?'block':'none'};  color:#0000FF; border:#AAAAAA  solid  1px;">
						</p:commandButton>
						<p:commandButton id="BT2957" widgetVar="BT2957" update="@form"
							tabindex="2" value="#{idm.TT_BT2957}"
							actionListener="#{solicitudesAutsControlador.oprimirPorTramitar}"
							style="position: absolute; width:120px; height: 27px; left: 0px;   top: 25px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:block;  color:#0000FF; border:#AAAAAA  solid  1px;">
						</p:commandButton>
						<p:commandButton id="BT2956" widgetVar="BT2956" tabindex="4"
							value="#{idm.TI_NUEVO}"
							actionListener="#{solicitudesAutsControlador.oprimirNuevo}"
							style="position: absolute; width:100px; height: 27px; left: 1200px;   top: 25px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:block;  color:#0000FF; border:#AAAAAA  solid  1px;">
						</p:commandButton>
						<p:commandButton id="BT2958" widgetVar="BT2958" update="@form"
							tabindex="3" value="#{idm.TT_BT2958}"
							actionListener="#{solicitudesAutsControlador.oprimirMisSolicitudes}"
							style="position: absolute; width:120px; height: 27px; left: 130px;   top: 25px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:block;  color:#0000FF; border:#AAAAAA  solid  1px;">
						</p:commandButton>
						<h:outputLabel id="LB42982" value="#{idm.TT_LB42982}"
							style="position: absolute; width:930px; height: 25px; left: 350px;   top: 0px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL3253" class="
"
						style="position: relative; height: auto;">
						<p:remoteCommand name="refreshTab" update="TBFR1690"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR1690" var="reg"
							value="#{solicitudesAutsControlador.listaInicial}"
							editable="true" widgetVar="TBFR1690"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{solicitudesAutsControlador.permisos[4] }">
								<h:commandLink
									rendered="#{solicitudesAutsControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1690" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{solicitudesAutsControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1690" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR1690}
                            </f:facet>
							<p:column headerText="#{idm.TG_NUMERO7}"
								filterBy="#{reg.campos['CONSECUTIVO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="10%" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['CONSECUTIVO']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CP61766}"
								filterBy="#{reg.campos['NOMBRESOLICITANTE']}"
								filterStyle="width:100%" filterMatchMode="contains" width="25%"
								rendered="#{solicitudesAutsControlador.porTramitar==1 || solicitudesAutsControlador.porTramitar==3 ?true:false}"
								styleClass="
">
								<h:outputText value="#{reg.campos['NOMBRESOLICITANTE']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_SOLICITUD}"
								filterBy="#{reg.campos['NOMBRESOLICITUD']}"
								filterStyle="width:100%" filterMatchMode="contains" width="20%"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['NOMBRESOLICITUD']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CP52122}"
								filterBy="#{reg.campos['NOMBREPERMISO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="25%"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['NOMBREPERMISO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TC_CP52123}"
								filterBy="#{reg.campos['ESTADO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="14%" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['ESTADO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_VER}" exportable="false"
								width="6%" rendered="true">
								<p:commandButton id="BT2959" widgetVar="BT2959"
									icon="ui-icon-search" rendered="true" tabindex="6" value=""
									actionListener="#{solicitudesAutsControlador.oprimirVer(reg,rowNun)}"
									style="width:100%;  height:25px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 13px;   color:#000000; border:#AAAAAA  solid  1px;">
								</p:commandButton>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{solicitudesAutsControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{solicitudesAutsControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR1690:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1690" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1690" widgetVar="blockCarga"
							trigger="TBFR1690,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
