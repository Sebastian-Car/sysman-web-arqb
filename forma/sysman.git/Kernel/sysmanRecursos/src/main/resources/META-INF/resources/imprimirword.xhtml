<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR281}</title>
		<f:metadata>
			<f:viewParam name="codigoPlantilla"
				value="#{imprimirwordsControlador.codigoPlantilla}" />
		</f:metadata>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{imprimirwordsControlador.cargarForma}" />
			<div id="FR281" style="height: 545px;">
				<h:form style="height: 100%;" id="FRFR281">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL676" class="
"
						style="position: relative; height: 30px;"></div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL610" class="
"
						style="position: relative; height: 450px;">
						<p:remoteCommand name="refreshTab" update="TBFR281"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR281" var="reg"
							value="#{imprimirwordsControlador.listaInicial}" editable="true"
							widgetVar="TBFR281" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{imprimirwordsControlador.permisos[4] and false}">
								<h:commandLink
									rendered="#{imprimirwordsControlador.permisos[4] and false}"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR281" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{imprimirwordsControlador.permisos[4] and false}"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR281" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR281:alert,"
								listener="#{imprimirwordsControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{imprimirwordsControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{imprimirwordsControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{idm.TT_FR281}
                            </f:facet>
							<p:column headerText="#{idm.TG_ETIQUETA}"
								filterBy="#{reg.campos['ETIQUETA']}" filterStyle="width:100%"
								filterMatchMode="contains" width="115" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['ETIQUETA']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP8842" styleClass="inputTab"
											value="#{reg.campos['ETIQUETA']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_VALOR4}"
								filterBy="#{reg.campos['valorEtiqueta']}"
								filterStyle="width:100%" filterMatchMode="contains" width="115"
								style="
" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['valorEtiqueta']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP8843" styleClass="inputTab"
											value="#{reg.campos['valorEtiqueta']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{imprimirwordsControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR281" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR281" widgetVar="blockCarga"
							trigger="TBFR281,BT601,BT3444,BT3871">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
					<div id="PL675" class="
"
						style="position: relative; height: 65px;">
						<p:commandButton id="BT3444" widgetVar="BT3444" ajax="false"
							tabindex="0" value="#{idm.TG_GENERAR_DOCUMENTO}"
							actionListener="#{imprimirwordsControlador.oprimirBtGenerarMasivo}"
							style="position: absolute; width:188px; height: 48px; left: 277px;   top: 10px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:#{imprimirwordsControlador.descargaMasiva?'block':'none'};  color:#000FE0; border:#95B3D7  solid  1px;">
							<p:fileDownload
								value="#{imprimirwordsControlador.archivoDescarga}" />
						</p:commandButton>
						<p:commandButton id="BT3871" widgetVar="BT3871" ajax="false"
							tabindex="0" value="#{idm.TG_GENERAR_DOCUMENTO}"
							actionListener="#{imprimirwordsControlador.oprimirGenerarPdf}"
							style="position: absolute; width:188px; height: 48px; left: 277px;   top: 10px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:#{imprimirwordsControlador.descargaPdf?'block':'none'};  color:#000FE0; border:#95B3D7  solid  1px;">
							<p:fileDownload
								value="#{imprimirwordsControlador.archivoDescarga}" />
						</p:commandButton>
						<p:commandButton id="BT601" widgetVar="BT601" ajax="false"
							tabindex="0" value="#{idm.TG_GENERAR_DOCUMENTO}"
							actionListener="#{imprimirwordsControlador.oprimirBtnGenerarDocumento}"
							style="position: absolute; width:188px; height: 48px; left: 277px;   top: 10px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:#{imprimirwordsControlador.descargaNormal?'block':'none'};  color:#000FE0; border:#95B3D7  solid  1px ;">
							<p:fileDownload
								value="#{imprimirwordsControlador.archivoDescarga}" />
						</p:commandButton>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
