<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html >
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:cc="http://java.sun.com/jsf/composite"
      xmlns:p="http://primefaces.org/ui"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets">

    <!-- INTERFACE -->
    <cc:interface componentType="MultipleList">
        <cc:attribute  name="value" required="true"  type="com.sysman.services.RegistroDataModelImpl"  />
        <cc:attribute  name="rowKey" required="true"  default="" />
        <cc:attribute  name="idForm" required="true"  default="" />
        <cc:attribute  name="idF" required="true"  />
        <cc:attribute  name="style" required="false"  default="" />
        <cc:attribute  name="disabled" required="true"  default="false" />

     <cc:clientBehavior name="rowSelect" event="rowSelect"  targets="#{cc.attrs.idF}"  />

    </cc:interface>

    <cc:implementation>
        <h:panelGroup id="PL#{cc.attrs.idF}"  style="#{cc.attrs.style}; "   >
            <p:dataTable id="#{cc.attrs.idF}" widgetVar="#{cc.attrs.idF}"  var="reg" value="#{cc.attrs.value}"
                           selection="#{cc.attrs.value.seleccionadosAux}"
                         emptyMessage="No se encontraron registros"
                         currentPageReportTemplate="Registros: {startRecord} - {endRecord} de {totalRecords}, Página: {currentPage}/{totalPages}"
                         rows="10"
                         rowIndexVar="rowIndex" 
                         rowKey="#{reg.llave}"
                         paginator="true"
                         selectionMode="multiple"
                         lazy="true"
                         rowStyleClass="#{reg.campos['SELECCIONADO_EN_PARTE_GRAFICA'] ? 'fila-selecionada' : null}"
                         scrollHeight="60%"
                         scrollWidth="100%"
                         scrollable="true"
                         disabledSelection="#{cc.attrs.disabled}"
                         >

                <cc:insertChildren />
            </p:dataTable>
            <div style=" margin-bottom: 10px;    margin-top: 10px; font-weight: bolder;">
                <h:outputText value="Registros seleccionados:" style="padding: 10px"/>
            </div>
            <cc:renderFacet name="seleccionados" id="sel#{cc.attrs.idF}" />
        </h:panelGroup>

    </cc:implementation>
</html>
