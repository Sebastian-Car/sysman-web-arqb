<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">	
	<ui:composition>
		<script>
			function inicializarMonitor(){
				setInterval(function(){ 					
					var cantidad = $("iframe").contents().find("#contenedorModal").length;
					if(cantidad>0){
							PF("cerrarSesionMonitor").reset();
						}else{
							consultarUsuario();			
							}					
				 }, 5000);
			}
		</script>		
		<h:form style="margin:0 !important;" >
			<p:remoteCommand name="cerrarSesion" actionListener="#{sessionBean.cerrarSesion}"/>
			<p:remoteCommand name="consultarUsuario" actionListener="#{sessionBean.getUser}"/>			
		</h:form>		
		<p:idleMonitor id="cerrarSesionMonitor" widgetVar="cerrarSesionMonitor" onactive="cerrarSesion();" timeout="#{sessionBean.tiempoSesion()}" />			
	</ui:composition>
</html>
