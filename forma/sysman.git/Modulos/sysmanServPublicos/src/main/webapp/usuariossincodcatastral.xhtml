<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TT_FR1051}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{usuariossincodcatastralsControlador.cargarForma}" />
			<div id="FR1051" style="height: auto;">
				<h:form style="height: 100%;" id="FRFR1051">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL2029" style="position: relative; height: 125px;">
						<h:outputLabel id="LB24798"
							value="#{usuariossincodcatastralsControlador.cicloTitulo}"
							style="position: absolute; width:986px; height: 29px; left: 0px;   top: 38px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 16px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
						<p:commandButton id="BT1929" widgetVar="BT1929" icon="ui-iconPdf"
							ajax="false" tabindex="2" value=""
							actionListener="#{usuariossincodcatastralsControlador.oprimirPDF}"
							style="position: absolute; width:50px; height: 50px; left: 10px;   top: 40px; text-align: left; font-weight: normal; font-style: normal; font-family: MS Sans Serif; font-size: 13px; display:block;  color:#000000; border:#AAAAAA  solid  1px;">
							<p:fileDownload
								value="#{usuariossincodcatastralsControlador.archivoDescarga}" />
						</p:commandButton>
						<p:commandButton id="BT1930" widgetVar="BT1930"
							icon="ui-iconExcel" ajax="false" tabindex="3" value=""
							actionListener="#{usuariossincodcatastralsControlador.oprimirEXCEL}"
							style="position: absolute; width:50px; height: 50px; left: 70px;   top: 40px; text-align: left; font-weight: normal; font-style: normal; font-family: MS Sans Serif; font-size: 13px; display:block;  color:#000000; border:#AAAAAA  solid  1px;">
							<p:fileDownload
								value="#{usuariossincodcatastralsControlador.archivoDescarga}" />
						</p:commandButton>
						<h:outputLabel id="LB24797" value="#{idm.TT_LB24797}"
							style="position: absolute; width:989px; height: 28px; left: 0px;   top: 10px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 16px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL2030" style="position: relative; height: auto;">
						<p:remoteCommand name="refreshTab" update="TBFR1051" />
						<p:dataTable id="TBFR1051" var="reg"
							value="#{usuariossincodcatastralsControlador.listaInicial}"
							editable="true" widgetVar="TBFR1051"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{usuariossincodcatastralsControlador.permisos[4] }">
								<h:commandLink
									rendered="#{usuariossincodcatastralsControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1051" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{usuariossincodcatastralsControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1051" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR1051:alert,"
								listener="#{usuariossincodcatastralsControlador.editar}"
								oncomplete="refreshTab(); PF('blockGuardar').hide(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{usuariossincodcatastralsControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR1051}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP30760}"
								filterBy="#{reg.campos['CICLO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="59" rendered="true" style="">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CICLO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP30760" styleClass="inputTab"
											value="#{reg.campos['CICLO']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP30761}"
								filterBy="#{reg.campos['CODIGORUTA']}" filterStyle="width:100%"
								filterMatchMode="contains" width="131" rendered="true" style="">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGORUTA']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP30761" styleClass="inputTab"
											value="#{reg.campos['CODIGORUTA']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP30764}"
								filterBy="#{reg.campos['CODIGOINTERNO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="116"
								rendered="true" style="">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGOINTERNO']}"
											style="text-align:  right; float:  right" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP30764" styleClass="inputTab"
											value="#{reg.campos['CODIGOINTERNO']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_NOMBRES}"
								filterBy="#{reg.campos['NOMBRES']}" filterStyle="width:100%"
								filterMatchMode="contains" width="354" rendered="true" style="">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRES']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP30762" styleClass="inputTab"
											value="#{reg.campos['NOMBRES']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP30763}"
								filterBy="#{reg.campos['CODIGOCATASTRAL']}"
								filterStyle="width:100%" filterMatchMode="contains" width="209"
								rendered="true" style="">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGOCATASTRAL']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputMask id="CP30763" styleClass="inputTab"
											value="#{reg.campos['CODIGOCATASTRAL']}" style="width:100%"
											mask="99-99-9999-9999-999">
										</p:inputMask>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{usuariossincodcatastralsControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1051" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1051" widgetVar="blockCarga"
							trigger="TBFR1051,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
