            }

								oncomplete="  mostarEditor();" />

		PF('dlg').show();
		"

										</h:outputLink>

									<f:facet name="input">

							</p:column>

											style="text-align:  left; float:  left" />

											readonly="#{numerosdefacturaspControlador.bloqueaConsecutivo}"
											maxlength="10">
											<pe:keyFilter mask="pint" />
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>

								filterBy="#{reg.campos['USUARIO']}" filterStyle="width:100%"
