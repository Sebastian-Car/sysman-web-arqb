<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TT_FR1215}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{micromedicionhistoriasControlador.cargarForma}" />
			<div id="FR1215" style="height: 440px;">
				<h:form style="height: 100%;" id="FRFR1215">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL2331" class="
"
						style="position: relative; height: 440px;">
						<p:remoteCommand name="refreshTab" update="TBFR1215"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR1215" var="reg"
							value="#{micromedicionhistoriasControlador.listaInicial}"
							editable="true" widgetVar="TBFR1215"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{micromedicionhistoriasControlador.permisos[4] }">
								<h:commandLink
									rendered="#{micromedicionhistoriasControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1215" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{micromedicionhistoriasControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1215" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header"> 
                            #{idm.TT_FR1215}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP37046}"
								filterBy="#{reg.campos['MEDIDOR']}" filterStyle="width:100%"
								filterMatchMode="contains" width="144" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['MEDIDOR']}"
									style="text-align:  center; float:  center" />
							</p:column>
							<p:column headerText="#{idm.TC_CP37047}"
								filterBy="#{reg.campos['LECTURAINICIAL']}"
								filterStyle="width:100%" filterMatchMode="contains" width="144"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['LECTURAINICIAL']}"
									style="text-align:  center; float:  center" />
							</p:column>
							<p:column headerText="#{idm.TC_CP37048}"
								filterBy="#{reg.campos['LECTURAFINAL']}"
								filterStyle="width:100%" filterMatchMode="contains" width="144"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['LECTURAFINAL']}"
									style="text-align:  center; float:  center" />
							</p:column>
							<p:column headerText="#{idm.TC_CP37049}"
								filterBy="#{reg.campos['CONSUMO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="144" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['CONSUMO']}"
									style="text-align:  center; float:  center" />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1215" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1215" widgetVar="blockCarga"
							trigger="TBFR1215,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
