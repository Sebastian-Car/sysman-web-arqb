<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR1025}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{rangosControlador.cargarForma}" />
			<div id="FR1025" style="height: 600px;">
				<h:form style="height: 100%;" id="FRFR1025">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{rangosControlador.permisos[0]}" position="center top"
						onHide="restaurarCampos(['CP30556','CP30557','CP30558'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_CODIGO7}:" id="LCP30556" />
							<p:inputText id="CP30556" widgetVar="CP30556"
								styleClass="inputTab"
								value="#{rangosControlador.registro.campos['CODIGO']}"
								label="LCP30556" style=" width: 95%; float: left;" maxlength="2">
								<pe:keyFilter mask="pint" />
							</p:inputText>
							<h:outputLabel value="#{rangosControlador.limiteInferior}:"
								id="LCP30557" />
							<pe:inputNumber id="CP30557" widgetVar="CP30557"
								value="#{rangosControlador.registro.campos['LIMITEINFERIOR']}"
								label="LCP30557" decimalPlaces="2" thousandSeparator=","
								decimalSeparator="." styleClass="inputTab"
								maxValue="999999999999999999.99"
								minValue="-999999999999999999.99" converter="convertidorDouble"
								style=" width: 95%;float: left;">
							</pe:inputNumber>
							<h:outputLabel value="#{rangosControlador.limiteSuperior}:"
								id="LCP30558" />
							<pe:inputNumber id="CP30558" widgetVar="CP30558"
								value="#{rangosControlador.registro.campos['LIMITESUPERIOR']}"
								label="LCP30558" decimalPlaces="2" thousandSeparator=","
								decimalSeparator="." styleClass="inputTab"
								maxValue="999999999999999999.99"
								minValue="-999999999999999999.99" converter="convertidorDouble"
								style=" width: 95%;float: left;">
							</pe:inputNumber>
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"
										style="padding:10px;" update="FRFR1025,"
										actionListener="#{rangosControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"
										onclick="     if (!validarVaciosModal(['CP30556','CP30557','CP30558'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL1975" class="
"
						style="position: relative; height: 550px;">
						<p:remoteCommand name="refreshTab" update="TBFR1025"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR1025" var="reg"
							value="#{rangosControlador.listaInicial}" editable="true"
							widgetVar="TBFR1025" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{rangosControlador.permisos[4] }">
								<h:commandLink rendered="#{rangosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1025" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{rangosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1025" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR1025:alert,"
								listener="#{rangosControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{rangosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{rangosControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<h:panelGroup class="acme">
										<p:commandLink action="#{rangosControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{idm.TT_FR1025}
                            </f:facet>
							<p:column headerText="#{idm.TG_CODIGO7}"
								filterBy="#{reg.campos['CODIGO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="74" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP30556" styleClass="inputTab"
											value="#{reg.campos['CODIGO']}" style="width:100%"
											maxlength="2">
											<pe:keyFilter mask="pint" />
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{rangosControlador.limiteInferior}"
								filterBy="#{reg.campos['LIMITEINFERIOR']}"
								filterStyle="width:100%" filterMatchMode="contains"
								width="154px" rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['LIMITEINFERIOR']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  right; float:  right" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP30557" styleClass="inputTab"
											value="#{reg.campos['LIMITEINFERIOR']}" decimalPlaces="2"
											thousandSeparator="," decimalSeparator="."
											maxValue="999999999999999999.99"
											minValue="-999999999999999999.99"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{rangosControlador.limiteSuperior}"
								filterBy="#{reg.campos['LIMITESUPERIOR']}"
								filterStyle="width:100%" filterMatchMode="contains"
								width="143px" rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['LIMITESUPERIOR']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  right; float:  right" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP30558" styleClass="inputTab"
											value="#{reg.campos['LIMITESUPERIOR']}" decimalPlaces="2"
											thousandSeparator="," decimalSeparator="."
											maxValue="999999999999999999.99"
											minValue="-999999999999999999.99"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{rangosControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{rangosControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{rangosControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR1025:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1025" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1025" widgetVar="blockCarga"
							trigger="TBFR1025,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
