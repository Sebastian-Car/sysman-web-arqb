<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TT_FR1036}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{usosControlador.cargarForma}" />
			<div id="FR1036" style="height: auto;">
				<h:form style="height: 100%;" id="FRFR1036">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL2001" style="position: relative; height: 60px;">
						<h:outputLabel id="LB24689" value="#{usosControlador.tituloUsos}"
							style="position: absolute; width:100%; height: 32px; left: 0px;   top: 0px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{usosControlador.permisos[0]}"
						onHide="restaurarCampos(['CP30647'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_CODIGO7}:" id="LCP30647" />
							<p:inputText id="CP30647" widgetVar="CP30647"
								styleClass="inputTab"
								value="#{usosControlador.registro.campos['CODIGO']}"
								label="LCP30647" style=" width: 95%; float: left;" maxlength="2">
								<pe:keyFilter regEx="/[\d]/" />
							</p:inputText>
							<h:outputLabel value="#{idm.TG_NOMBRE3}:" id="LCP30648" />
							<p:inputText id="CP30648" widgetVar="CP30648"
								styleClass="inputTab"
								value="#{usosControlador.registro.campos['NOMBRE']}"
								label="LCP30648" style=" width: 95%; float: left;"
								maxlength="20">
							</p:inputText>
							<h:outputLabel value="#{idm.TC_CK892}:" id="LCK892"
								style="display:#VISIBLE#" rendered="#{usosControlador.actaSusp}" />
							<p:selectBooleanCheckbox id="CK892" widgetVar="CK892"
								value="#{usosControlador.registro.campos['ACTA_SUSPENSION']}"
								rendered="#{usosControlador.actaSusp}" label="LCK892"
								style="min-width: 80px; display:#VISIBLE#">
							</p:selectBooleanCheckbox>
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"
										style="padding:10px;" update="FRFR1036,"
										actionListener="#{usosControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"
										onclick="     if (!validarVaciosModal(['CP30647'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL2002" style="position: relative; height: auto;">
						<p:remoteCommand name="refreshTab" update="TBFR1036" />
						<p:dataTable id="TBFR1036" var="reg"
							value="#{usosControlador.listaInicial}" editable="true"
							widgetVar="TBFR1036" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{usosControlador.permisos[4] }">
								<h:commandLink rendered="#{usosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1036" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{usosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1036" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR1036:alert,"
								listener="#{usosControlador.editar}"
								oncomplete="refreshTab(); PF('blockGuardar').hide(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{usosControlador.cancelarEdicion}"
								oncomplete="refreshTab();  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{usosControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR1036}
                            </f:facet>
							<p:column headerText="#{idm.TG_CODIGO7}"
								filterBy="#{reg.campos['CODIGO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="89" rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP30647" styleClass="inputTab"
											value="#{reg.campos['CODIGO']}" style="width:100%"
											maxlength="2">
											<pe:keyFilter regEx="/[\d]/" />
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_NOMBRE3}"
								filterBy="#{reg.campos['NOMBRE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="274" rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRE']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP30648" styleClass="inputTab"
											value="#{reg.campos['NOMBRE']}" style="width:100%"
											maxlength="20">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CK892}"
								filterBy="#{reg.campos['ACTA_SUSPENSION']}"
								filterMatchMode="exact" width="5%"
								rendered="#{usosControlador.actaSusp}" style="">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR1036').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText
											value="#{reg.campos['ACTA_SUSPENSION']=='false'? 'No':'Si'}" />
									</f:facet>
									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK892"
												value="#{reg.campos['ACTA_SUSPENSION']}">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{usosControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{usosControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{usosControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR1036:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1036" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1036" widgetVar="blockCarga"
							trigger="TBFR1036,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
