<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR1635}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{natsubquinqueniosControlador.cargarForma}" />
			<div id="FR1635" style="height: 550px;">
				<h:form style="height: 100%;" id="FRFR1635">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL3148" class="
"
						style="position: relative; height: 192px;">
						<p:remoteCommand name="refreshTab" update="TBFR1635"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR1635" var="reg"
							value="#{natsubquinqueniosControlador.listaInicial}"
							editable="true" widgetVar="TBFR1635"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{natsubquinqueniosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{natsubquinqueniosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1635" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{natsubquinqueniosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1635" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink title="Volver al menú"
											style="padding-top: 10px;" value="javascript:void(0)"
											onclick="rcCerrar();">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
									<p:remoteCommand name="rcCerrar"
										actionListener="#{natsubquinqueniosControlador.ejecutarrcCerrar}" />
								</div>	 
                            #{idm.TT_FR1635}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP50982}"
								filterBy="#{reg.campos['FECHAQUINQUENIO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="151"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['FECHAQUINQUENIO']}">
									<f:convertDateTime pattern="dd/MM/yyyy"
										timeZone="#{sessionBean.timeZone}" />
								</h:outputText>
							</p:column>
							<p:column headerText="#{idm.TC_CP50983}"
								filterBy="#{reg.campos['ACTOQUINQUENIO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="151"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['ACTOQUINQUENIO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_FECHA_ACTO}"
								filterBy="#{reg.campos['FECHADELACTOQUINQUENIO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="151"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['FECHADELACTOQUINQUENIO']}">
									<f:convertDateTime pattern="dd/MM/yyyy"
										timeZone="#{sessionBean.timeZone}" />
								</h:outputText>
							</p:column>
							<p:column headerText="#{idm.TG_FECHA_PAGO2}"
								filterBy="#{reg.campos['FECHAPAGOQUINQUENIO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="151"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['FECHAPAGOQUINQUENIO']}">
									<f:convertDateTime pattern="dd/MM/yyyy"
										timeZone="#{sessionBean.timeZone}" />
								</h:outputText>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1635" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1635" widgetVar="blockCarga"
							trigger="TBFR1635,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
