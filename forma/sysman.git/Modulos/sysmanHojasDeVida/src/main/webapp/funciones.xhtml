<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"

            }

">

								</h:commandLink>
								<h:commandLink rendered="#{funcionesControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">

								listener="#{funcionesControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />

										rendered="#{funcionesControlador.permisos[0] and funcionesControlador.accion!='v' }">

											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">

												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>

										</h:outputLink>
									</h:panelGroup>
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{funcionesControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"

												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{idm.TT_FR1314}

							<p:column headerText="#{idm.TC_CB4320}"

								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['AREA']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB4320" value="#{reg.campos['AREA']}"

											<f:selectItem />
											<f:selectItems value="#{funcionesControlador.listaarea}"

										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>

								filterBy="#{reg.campos['IDFUNCION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="92" rendered="true"
								styleClass="
">

										<h:outputText value="#{reg.campos['IDFUNCION']}"
											style="text-align:  center; float:  center" />

									</f:facet>
								</p:cellEditor>
							</p:column>

								filterBy="#{reg.campos['FUNCION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="391" rendered="true"
								styleClass="
">

									<f:facet name="output">
										<h:outputText value="#{reg.campos['FUNCION']}"
											style="text-align:  left; float:  left" />

									<f:facet name="input">
										<p:inputText id="CP43111" styleClass="inputTab"
											value="#{reg.campos['FUNCION']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP43107}"
								filterBy="#{reg.campos['FECHACREACION']}"
								filterStyle="width:100%" filterMatchMode="contains" width="15%"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHACREACION']}">
											<f:convertDateTime pattern="dd/MM/yyyy"
