<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR1665}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{tiposervmedicosControlador.cargarForma}" />
			<div id="FR1665" style="height: 550px;">
				<h:form style="height: 100%;" id="FRFR1665">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{tiposervmedicosControlador.permisos[0]}"
						position="center top"
						onHide="restaurarCampos(['CP51465','CP51466'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_CODIGO7}:" id="LCP51465"
								class="cont-inst-element" />
							<p:inputText id="CP51465" widgetVar="CP51465"
								styleClass="inputTab"
								value="#{tiposervmedicosControlador.registro.campos['ID_SERV_MEDICO']}"
								label="LCP51465" style=" width: 95%; float: left;"
								class="cont-inst-element" maxlength="3">
								<pe:keyFilter mask="pint" />
							</p:inputText>
							<h:outputLabel value="#{idm.TG_NOMBRE3}:" id="LCP51466"
								class="cont-inst-element" />
							<p:inputText id="CP51466" widgetVar="CP51466"
								styleClass="inputTab"
								value="#{tiposervmedicosControlador.registro.campos['SERVICIO']}"
								label="LCP51466" style=" width: 95%; float: left;"
								class="cont-inst-element" maxlength="50">
							</p:inputText>
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"
										style="padding:10px;" update="FRFR1665,"
										actionListener="#{tiposervmedicosControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"
										onclick="     if (!validarVaciosModal(['CP51465','CP51466'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL3203" class="
"
						style="position: relative; height: 110px;">
						<p:remoteCommand name="refreshTab" update="TBFR1665"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR1665" var="reg"
							value="#{tiposervmedicosControlador.listaInicial}"
							editable="true" widgetVar="TBFR1665"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{tiposervmedicosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{tiposervmedicosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1665" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{tiposervmedicosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1665" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR1665:alert,"
								listener="#{tiposervmedicosControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{tiposervmedicosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{tiposervmedicosControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<p:remoteCommand name="rcCerrar"
										actionListener="#{tiposervmedicosControlador.ejecutarrcCerrar}" />
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{tiposervmedicosControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{idm.TT_FR1665}
                            </f:facet>
							<p:column headerText="#{idm.TG_CODIGO7}"
								filterBy="#{reg.campos['ID_SERV_MEDICO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="122"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['ID_SERV_MEDICO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP51465" styleClass="inputTab"
											value="#{reg.campos['ID_SERV_MEDICO']}" style="width:100%"
											maxlength="3">
											<pe:keyFilter mask="pint" />
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_NOMBRE3}"
								filterBy="#{reg.campos['SERVICIO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="322" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['SERVICIO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP51466" styleClass="inputTab"
											value="#{reg.campos['SERVICIO']}" style="width:100%"
											maxlength="50">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{tiposervmedicosControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{tiposervmedicosControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{tiposervmedicosControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR1665:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1665" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1665" widgetVar="blockCarga"
							trigger="TBFR1665,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
					<div id="PL3204" class="
"
						style="position: relative; height: 14px;"></div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
