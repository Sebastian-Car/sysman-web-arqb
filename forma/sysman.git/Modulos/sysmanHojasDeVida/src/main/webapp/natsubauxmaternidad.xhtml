<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"

	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"

	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{subAuxilioMControlador.titulo} -
			#{subAuxilioMControlador.nombre}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{subAuxilioMControlador.cargarForma}" />
			<div id="FR1515" style="height: 568px;">
				<h:form style="height: 100%;" id="FRFR1515">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{subAuxilioMControlador.permisos[0]}"
						position="center top" onHide="restaurarCampos(['CB5025'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TC_CB5025}:" id="LCB5025"
								class="cont-inst-element" />
							<p:selectOneMenu filter="true" effect="fade" id="CB5025"
								editable="false" widgetVar="CB5025"
								value="#{subAuxilioMControlador.registro.campos['CODIGO']}"
								onchange="" style="
" class="cont-inst-element">
								<f:selectItem />
								<f:selectItems
									value="#{subAuxilioMControlador.listaTipodocuacto}" var="regc"
									itemLabel="#{regc.campos['TIPOACTOADTIVO']}"
									itemValue="#{regc.campos['CODIGO']}" />
							</p:selectOneMenu>
							<h:outputLabel value="#{idm.TC_CP48274}:" id="LCP48274"
								class="cont-inst-element" />

								value="#{subAuxilioMControlador.registro.campos['PS_NUME']}"

								class="cont-inst-element">
							</p:inputText>
							<h:outputLabel value="#{idm.TC_CP48275}:" id="LCP48275"
								class="cont-inst-element" />
							<p:calendar locale="es" navigator="true" mask="true"
								pattern="dd/MM/yyyy" id="CP48275" widgetVar="CP48275"
								value="#{subAuxilioMControlador.registro.campos['PS_FECHRESODECR']}"
								label="LCP48275" style="float: left;" class="cont-inst-element">
							</p:calendar>
							<h:outputLabel value="#{idm.TG_VALOR4}:" id="LCP48276"
								class="cont-inst-element" />
							<pe:inputNumber id="CP48276" widgetVar="CP48276"
								value="#{subAuxilioMControlador.registro.campos['PS_VALOR']}"
								label="LCP48276" decimalPlaces="2" thousandSeparator=","
								decimalSeparator="." styleClass="inputTab"
								maxValue="99999999999999999999.99"
								minValue="-99999999999999999999.99"
								converter="convertidorDouble" style=" width: 95%;float: left;"

							</pe:inputNumber>
							<h:outputLabel value="#{idm.TG_OBSERVACIONES3}:" id="LCP48277"

								class="cont-inst-element">
							</p:inputText>
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"

										actionListener="#{subAuxilioMControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"

PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:confirmDialog global="true" showEffect="fade">

							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL2918" class="
"

							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{subAuxilioMControlador.permisos[4] }">
								<h:commandLink rendered="#{subAuxilioMControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1515" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{subAuxilioMControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1515" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR1515:alert,"
								listener="#{subAuxilioMControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{subAuxilioMControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{subAuxilioMControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{subAuxilioMControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{subAuxilioMControlador.titulo} - #{subAuxilioMControlador.nombre}
                            </f:facet>
							<p:column headerText="#{idm.TC_CB5025}"
								filterBy="#{reg.campos['TIPOACTOADTIVO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="120"
								rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['TIPOACTOADTIVO']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB5025" value="#{reg.campos['CODIGO']}"
											style="width:100%" onchange="">
											<f:selectItem />
											<f:selectItems
												value="#{subAuxilioMControlador.listaTipodocuacto}"
												var="regc" itemLabel="#{regc.campos['TIPOACTOADTIVO']}"
												itemValue="#{regc.campos['CODIGO']}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP48274}"
								filterBy="#{reg.campos['PS_NUME']}" filterStyle="width:100%"
								filterMatchMode="contains" width="120" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['PS_NUME']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP48274" styleClass="inputTab"
											value="#{reg.campos['PS_NUME']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP48275}"
								filterBy="#{reg.campos['PS_FECHRESODECR']}"
								filterStyle="width:100%" filterMatchMode="contains" width="115"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['PS_FECHRESODECR']}">
											<f:convertDateTime pattern="dd/MM/yyyy"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true" mask="true"
											pattern="dd/MM/yyyy" id="CP48275" widgetVar="CP48275"
											value="#{reg.campos['PS_FECHRESODECR']}" style="width:100%">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_VALOR4}"
								filterBy="#{reg.campos['PS_VALOR']}" filterStyle="width:100%"
								filterMatchMode="contains" width="100px" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['PS_VALOR']}"
											converter="convertidorDoubleContinuo"

									<f:facet name="input">
										<pe:inputNumber id="CP48276" styleClass="inputTab"
											value="#{reg.campos['PS_VALOR']}" decimalPlaces="2"
											thousandSeparator="," decimalSeparator="."
											maxValue="99999999999999999999.99"
											minValue="-99999999999999999999.99"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_OBSERVACIONES3}"
								filterBy="#{reg.campos['OBSERVACIONES']}"

								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['OBSERVACIONES']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP48277" styleClass="inputTab"
											value="#{reg.campos['OBSERVACIONES']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{subAuxilioMControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{subAuxilioMControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{subAuxilioMControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR1515:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1515" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1515" widgetVar="blockCarga"
							trigger="TBFR1515,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
