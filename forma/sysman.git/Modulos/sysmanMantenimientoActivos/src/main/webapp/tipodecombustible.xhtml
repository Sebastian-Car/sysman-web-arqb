<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR205}</title>
		<f:metadata>
			<f:viewParam name="rid" value="#{tipodecombustiblesControlador.rid}" />
			<f:viewParam name="opcion"
				value="#{tipodecombustiblesControlador.opcion}" />
		</f:metadata>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{tipodecombustiblesControlador.cargarForma}" />
			<div id="FR205" style="height: 610px;">
				<h:form style="height: 100%;" id="FRFR205">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL439" class="
"
						style="position: relative; height: 48px;">
						<h:outputLabel id="LB5160" value="#{idm.TT_LB5160}"
							style="position: absolute; width:323px; height: 27px; left: 130px;   top: 14px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{tipodecombustiblesControlador.permisos[0]}"
						onHide="restaurarCampos(['CP6747','CP6748','CP6749'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_CODIGO7}:" id="LCP6749"
								style="display:true;" class="cont-inst-element" />
							<p:inputText id="CP6749" widgetVar="CP6749" styleClass="inputTab"
								value="#{tipodecombustiblesControlador.registro.campos['TIPO_DE_COMBUSTIBLE']}"
								label="LCP6749" style="display:true; width: 95%; float: left;"
								class="cont-inst-element" maxlength="3">
								<pe:keyFilter mask="alphanum" />
							</p:inputText>
							<h:outputLabel value="#{idm.TG_NOMBRE3}:" id="LCP6747"
								class="cont-inst-element" />
							<p:inputText id="CP6747" widgetVar="CP6747" styleClass="inputTab"
								value="#{tipodecombustiblesControlador.registro.campos['NOMBRE']}"
								label="LCP6747" style=" width: 95%; float: left;"
								class="cont-inst-element" maxlength="20">
							</p:inputText>
							<h:outputLabel value="#{idm.TC_CP6748}:" id="LCP6748"
								class="cont-inst-element" />
							<pe:inputNumber id="CP6748" widgetVar="CP6748"
								value="#{tipodecombustiblesControlador.registro.campos['VALORUNITARIO']}"
								label="LCP6748" decimalPlaces="2" thousandSeparator=","
								decimalSeparator="." styleClass="inputTab"
								maxValue="999999999999999999.99"
								minValue="-999999999999999999.99" converter="convertidorDouble"
								style=" width: 95%;float: left;" class="cont-inst-element">
							</pe:inputNumber>
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"
										style="padding:10px;" update="FRFR205,"
										actionListener="#{tipodecombustiblesControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"
										onclick="     if (!validarVaciosModal(['CP6747','CP6748','CP6749'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL440" class="
"
						style="position: relative; height: 120px;">
						<p:remoteCommand name="refreshTab" update="TBFR205"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR205" var="reg"
							value="#{tipodecombustiblesControlador.listaInicial}"
							editable="true" widgetVar="TBFR205"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{tipodecombustiblesControlador.permisos[4] }">
								<h:commandLink
									rendered="#{tipodecombustiblesControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR205" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{tipodecombustiblesControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR205" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR205:alert,"
								listener="#{tipodecombustiblesControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{tipodecombustiblesControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{tipodecombustiblesControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<div class="acme">
										<h:outputLink
											value="#{request.contextPath}/#{tipodecombustiblesControlador.rid==null?'menu.sysman':'form/mantenimientoActivos/inventarioparqueautomotor.sysman'}"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
											<f:param name="rid"
												value="#{tipodecombustiblesControlador.rid}"
												disable="#{tipodecombustiblesControlador.rid==null}" />
											<f:param name="opcion"
												value="#{tipodecombustiblesControlador.opcion}"
												disable="#{tipodecombustiblesControlador.opcion==null}" />
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR205}
                            </f:facet>
							<p:column headerText="#{idm.TG_CODIGO7}"
								filterBy="#{reg.campos['TIPO_DE_COMBUSTIBLE']}"
								filterStyle="width:100%" filterMatchMode="contains" width="20%"
								style="display:true;" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['TIPO_DE_COMBUSTIBLE']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP6749" styleClass="inputTab"
											value="#{reg.campos['TIPO_DE_COMBUSTIBLE']}"
											style="width:100%" maxlength="3">
											<pe:keyFilter mask="alphanum" />
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_NOMBRE3}"
								filterBy="#{reg.campos['NOMBRE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="60%" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRE']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP6747" styleClass="inputTab"
											value="#{reg.campos['NOMBRE']}" style="width:100%"
											maxlength="20">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP6748}"
								filterBy="#{reg.campos['VALORUNITARIO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="20%"
								style="
" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['VALORUNITARIO']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP6748" styleClass="inputTab"
											value="#{reg.campos['VALORUNITARIO']}" decimalPlaces="2"
											thousandSeparator="," decimalSeparator="."
											maxValue="999999999999999999.99"
											minValue="-999999999999999999.99"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{tipodecombustiblesControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{tipodecombustiblesControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{tipodecombustiblesControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR205:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR205" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR205" widgetVar="blockCarga"
							trigger="TBFR205,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
