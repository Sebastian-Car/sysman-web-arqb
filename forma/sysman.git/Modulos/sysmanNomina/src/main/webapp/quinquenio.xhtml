<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
              asignarEventoContGrande();
validarCargaGrandes();
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{quinqueniosControlador.tituloForm}</title>
		<f:metadata>
			<f:viewParam name="idEmpleado"
				value="#{quinqueniosControlador.idEmpleado}" />
			<f:viewParam name="nombreEmpleado"
				value="#{quinqueniosControlador.nombreEmpleado}" />
			<f:viewParam name="cedula" value="#{quinqueniosControlador.cedula}" />
		</f:metadata>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{quinqueniosControlador.cargarForma}" />
			<div id="FR324" style="height: 400px;">
				<h:form style="height: 100%;" id="FRFR324">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL718" class="
"
						style="position: relative; height: 72px;">
						<center style="height: 0px">
							<p:inputText id="HCB1270" widgetVar="HCB1270"
								value="#{quinqueniosControlador.auxiliar}"
								style="width: 0px; height: 0px; border: #ffffff; background: #FFFFFF; box-shadow: none"
								disabled="true" />
						</center>
						<p:overlayPanel widgetVar="PLSCB1270" id="PLSCB1270"
							onShow="if(PF('TBSCB1270').nuevo){ PF('TBSCB1270').clearFilters(); PF('TBSCB1270').nuevo=false;}"
							onHide="if(document.activeElement.id=='' || document.activeElement.id.indexOf('filter')>-1){aux= aux.replace(':BT',':'); aux=aux.replace(/:/g,'\\:'); $('#'+aux).focus();}"
							for="HCB1270" hideEffect="fade" style="width:470px; ">
							<p:dataTable id="TBSCB1270" widgetVar="TBSCB1270" var="reg"
								value="#{quinqueniosControlador.listaFechaPagoE}"
								editable="true" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
								currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
								rows="11" rowIndexVar="rowIndex" selectionMode="single"
								rowKey="#{reg.campos['FECHAFINAL']}" paginator="true"
								lazy="true">
								<p:ajax event="rowSelect"
									listener="#{quinqueniosControlador.seleccionarFilaFechaPagoE}"
									update=":FRFR324:HCB1270"
									oncomplete="aux=aux.replace(/\\/g,''); aux= aux.replace(':BT',':'); aux=aux.replace(/:/g,'\\:'); $('#'+aux)[0].value=PF('HCB1270').jq[0].value;  PF('PLSCB1270').hide();  $('#'+aux).change(); ind=false; " />
								<p:column headerText="#{idm.TG_ANIO3}"
									style="text-align:center; " width="15%"
									filterBy="#{reg.campos['ANO']}" filterMatchMode="startsWith"
									filterStyle="width:100%;">
									<h:outputText value="#{reg.campos['ANO']}"
										style="float:left;  text-align:left;  min-height: 20px;" />
								</p:column>
								<p:column headerText="#{idm.TG_MES3}"
									style="text-align:center; " width="20%"
									filterBy="#{reg.campos['MES']}" filterMatchMode="startsWith"
									filterStyle="width:100%;">
									<h:outputText value="#{reg.campos['MES']}"
										style="float:left;  text-align:left;  min-height: 20px;" />
								</p:column>
								<p:column headerText="#{idm.TG_PERIODO3}"
									style="text-align:center; " width="35%"
									filterBy="#{reg.campos['PER']}" filterMatchMode="startsWith"
									filterStyle="width:100%;">
									<h:outputText value="#{reg.campos['PER']}"
										style="float:left;  text-align:left;  min-height: 20px;" />
								</p:column>
								<p:column headerText="#{idm.TG_FECHA4}"
									style="text-align:center; " width="30%"
									filterBy="#{reg.campos['FECHAFINAL']}"
									filterMatchMode="startsWith" filterStyle="width:100%;">
									<h:outputText value="#{reg.campos['FECHAFINAL']}"
										style="float:left;  text-align:left;  min-height: 20px;">
										<f:convertDateTime pattern="dd/MM/yyyy"
											timeZone="#{sessionBean.timeZone}" />
									</h:outputText>
								</p:column>
							</p:dataTable>
						</p:overlayPanel>
						<p:remoteCommand name="refreshTab" update="TBFR324"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR324" var="reg"
							value="#{quinqueniosControlador.listaInicial}" editable="true"
							widgetVar="TBFR324" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{quinqueniosControlador.permisos[4] }">
								<h:commandLink rendered="#{quinqueniosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR324" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{quinqueniosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR324" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR324:alert,"
								listener="#{quinqueniosControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{quinqueniosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px"></div>	 
                            #{quinqueniosControlador.tituloForm}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP10772}"
								filterBy="#{reg.campos['FECHAQUINQUENIO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="87"
								style="
" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHAQUINQUENIO']}">
											<f:convertDateTime pattern="dd/MM/yyyy"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true" mask="true"
											pattern="dd/MM/yyyy" id="CP10772" widgetVar="CP10772"
											value="#{reg.campos['FECHAQUINQUENIO']}" style="width:100%">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP10773}"
								filterBy="#{reg.campos['ACTOQUINQUENIO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="124"
								style="
" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['ACTOQUINQUENIO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP10773" styleClass="inputTab"
											value="#{reg.campos['ACTOQUINQUENIO']}" style="width:100%"
											maxlength="12">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_FECHA_ACTO}"
								filterBy="#{reg.campos['FECHADELACTOQUINQUENIO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="86"
								style="
" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHADELACTOQUINQUENIO']}">
											<f:convertDateTime pattern="dd/MM/yyyy"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true" mask="true"
											pattern="dd/MM/yyyy" id="CP10774" widgetVar="CP10774"
											value="#{reg.campos['FECHADELACTOQUINQUENIO']}"
											style="width:100%">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_FECHA_PAGO2}"
								filterBy="#{reg.campos['FECHAQLB']}" filterStyle="width:100%"
								filterMatchMode="contains" width="111" style="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHAQLB']}" />
									</f:facet>
									<f:facet name="input">
										<h:panelGroup>
											<p:inputText id="CB1270"
												onfocus="if(!false){onfocusCBG('#{component.clientId}');}"
												onchange="return ind;"
												value="#{reg.campos['FECHAPAGOQUINQUENIO']}"
												onclick="if(!false){ PF('PLSCB1270').show('#{component.clientId}');}  aux= '#{component.clientId}'; ind = true;"
												tabindex="-1" style="cursor:pointer; width: 75%;">
												<f:convertDateTime pattern="dd/MM/yyyy" />
											</p:inputText>
											<p:commandButton id="BTCB1270" type="button"
												icon="ui-icon ui-icon-triangle-1-s ui-c"
												onclick="PF('PLSCB1270').show('#{component.clientId}'); aux= '#{component.clientId}';  ind = true;"
												onblur="onblurBTCBG('#{component.clientId}');"
												onfocus="onfocusBTCBG('#{component.clientId}');"
												style="width:25px; height:  20px; top:4px; border-left-width: 0; " />
										</h:panelGroup>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_ELIMINAR}" exportable="false"
								width="60">
								<p:commandButton id="BT2637" widgetVar="BT2637"
									update="@form,@([id$=alert])" tabindex="5"
									value="#{idm.TG_ELIMINAR}"
									actionListener="#{quinqueniosControlador.oprimireliminar(reg,rowNun)}"
									style="width:100%;  height:20px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 8;   color:#0000FF; border:#AAAAAA solid 1px;">
								</p:commandButton>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{quinqueniosControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR324" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR324" widgetVar="blockCarga"
							trigger="TBFR324,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
