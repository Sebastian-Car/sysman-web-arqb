<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR105}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{actualizaparametrosretroactivosControlador.cargarForma}" />
			<div id="FR105" style="height: 400px;">
				<h:form style="height: 100%;" id="FRFR105">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL229" class="
"
						style="position: relative; height: 77px;">
						<p:remoteCommand name="refreshTab" update="TBFR105"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR105" var="reg"
							value="#{actualizaparametrosretroactivosControlador.listaInicial}"
							editable="true" widgetVar="TBFR105"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{actualizaparametrosretroactivosControlador.permisos[4] and false}">
								<h:commandLink
									rendered="#{actualizaparametrosretroactivosControlador.permisos[4] and false}"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR105" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{actualizaparametrosretroactivosControlador.permisos[4] and false}"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR105" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR105:alert,"
								listener="#{actualizaparametrosretroactivosControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{actualizaparametrosretroactivosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{actualizaparametrosretroactivosControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{idm.TT_FR105}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP4328}"
								filterBy="#{reg.campos['NOMBRE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="460" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRE']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP4328" styleClass="inputTab"
											value="#{reg.campos['NOMBRE']}" style="width:100%"
											readonly="true" maxlength="100">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CB4635}"
								filterBy="#{reg.campos['NOMBRETIPOPARAMETRO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="140"
								rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRETIPOPARAMETRO']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB4635"
											value="#{reg.campos['TIPOPARAMETRO']}" style="width:100%"
											disabled="true" onchange="">
											<f:selectItem />
											<f:selectItems
												value="#{actualizaparametrosretroactivosControlador.listaTipoParametro}"
												var="regc" itemLabel="#{regc.campos['NOMBRE']}"
												itemValue="#{regc.campos['CODIGO']}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_VALOR4}"
								filterBy="#{reg.campos['VALOR']}" filterStyle="width:100%"
								filterMatchMode="contains" width="130" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['VALOR']}"
											style="text-align:  rigth; float:  rigth" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP4329" styleClass="inputTab"
											value="#{reg.campos['VALOR']}" style="width:100%"
											maxlength="4000">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_FECHA_DE_INICIO}"
								filterBy="#{reg.campos['FECHA_INICIAL']}"
								filterStyle="width:100%" filterMatchMode="contains" width="140"
								style="
" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHA_INICIAL']}">
											<f:convertDateTime pattern="dd/MM/yyyy"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true" mask="true"
											pattern="dd/MM/yyyy" id="CP4330" widgetVar="CP4330"
											value="#{reg.campos['FECHA_INICIAL']}" style="width:100%">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{actualizaparametrosretroactivosControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR105" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR105" widgetVar="blockCarga"
							trigger="TBFR105,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
