<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html >
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:pt="http://java.sun.com/jsf/passthrough"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                template="/templateModal.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pe="http://primefaces.org/ui/extensions"
                >
    <ui:define name="titulo">
        <title>Establecer Periodo de Trabajo</title>
    </ui:define>
    <ui:define name="contenido">
        <section class="radiusModal" style="height: auto">
            <div id="panelModal" style="position: relative; height: auto">
                <h:form id="FR32_nuevo"    style="position: relative; width: 100%; height: 210px; margin: 0px">

                    <p:growl id="message" showDetail="true"  escape="false" />
                    <p:confirmDialog global="true" showEffect="fade"   id="confFR32" widgetVar="confFR32">
                        <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
                        <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
                    </p:confirmDialog>
                    <p:commandButton id="BT26"   widgetVar="BT26"  onclick="if (!validarVaciosViewModal(['CB48', 'CB49', 'CB50', 'CB51'])) {
                                PF('alert').renderMessage({'summary': 'Error de validación',
                                    'detail': 'Por favor ingrese los campos obligatorios',
                                    'severity': 'error'});
                                return false;
                            } else {
                                return true;
                            }"            tabindex="5"  value="Aceptar"   actionListener="#{periodoTrabajoControlador.oprimirAceptar}"  style="position: absolute; width:158px; height: 29px; left: 62px;   top: 170px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 16px; display:block;  color:#2F3699; border:#95B3D7  solid  1px ;" >
                    </p:commandButton>
                    <p:commandButton id="BT27"   widgetVar="BT27"              tabindex="6"  value="Cancelar"   actionListener="#{periodoTrabajoControlador.oprimirCancelar}"  style="position: absolute; width:158px; height: 29px; left: 222px;   top: 170px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 16px; display:block;  color:#ED1C24; border:#95B3D7  solid  1px ;" >
                    </p:commandButton>
                    <p:selectOneMenu filter="true"        effect="fade" id="CB48"   widgetVar="CB48"  value="#{periodoTrabajoControlador.proceso}"   tabindex="1"
                                     style="position: absolute; width:250px; height: 22px; left: 159px;   top: 19px; text-align: left; font-weight: normal; font-style: normal; font-family: MS Sans Serif; font-size: 13px; display:block; background:#FFFFFF; color:#000000; "
                                     >
                        <p:ajax listener="#{periodoTrabajoControlador.cambiarProceso}" update="CB49,CB50,CB51"   />
                        <f:selectItem/>
                        <f:selectItems value="#{periodoTrabajoControlador.listaProceso}" var="regc" itemLabel="#{regc.campos['NOMBRE_PROCESO']}" itemValue="#{regc.campos['ID_DE_PROCESO']}" /></p:selectOneMenu>
                    <p:selectOneMenu filter="true"        effect="fade" id="CB49"   widgetVar="CB49"  value="#{periodoTrabajoControlador.anio}"   tabindex="2"
                                     style="position: absolute; width:100px; height: 22px; left: 159px;   top: 56px; text-align: left; font-weight: normal; font-style: normal; font-family: MS Sans Serif; font-size: 13px; display:block; background:#FFFFFF; color:#000000; "
                                     >
                        <p:ajax listener="#{periodoTrabajoControlador.cambiarAno}" update="CB50,CB51"   />
                        <f:selectItem/>
                        <f:selectItems value="#{periodoTrabajoControlador.listaAno}" var="regc" itemLabel="#{regc.campos['ANO']}" itemValue="#{regc.campos['ANO']}" /></p:selectOneMenu>
                    <h:outputLabel id="LB173" value="Periodo:"       style="position: absolute; width:125px; height: 22px; left: 29px;   top: 131px; text-align: right; font-weight: normal; font-style: normal;text-decoration:none; font-family: MS Sans Serif; font-size: 13px; display:block; background:#FFFFFF; color:#000080; border:#000000  none  1px ;"   />
                    <p:selectOneMenu filter="true"        effect="fade" id="CB51"   widgetVar="CB51"  value="#{periodoTrabajoControlador.periodo}"   tabindex="4"
                                     style="position: absolute; width:188px; height: 22px; left: 159px;   top: 131px; text-align: left; font-weight: normal; font-style: normal; font-family: MS Sans Serif; font-size: 13px; display:block; background:#FFFFFF; color:#000000; "
                                     >
                        <f:selectItem/>
                        <f:selectItems value="#{periodoTrabajoControlador.listaPeriodo}" var="regc" itemLabel="#{regc.campos['NOM_PERIODO']}" itemValue="#{regc.campos['PERIODO']}" /></p:selectOneMenu>
                    <h:outputLabel id="LB170" value="Código del Proceso:"       style="position: absolute; width:125px; height: 22px; left: 29px;   top: 19px; text-align: right; font-weight: normal; font-style: normal;text-decoration:none; font-family: MS Sans Serif; font-size: 13px; display:block; background:#FFFFFF; color:#000080; border:#000000  none  1px ;"   />
                    <h:outputLabel id="LB171" value="Año de Trabajo:"       style="position: absolute; width:125px; height: 22px; left: 29px;   top: 56px; text-align: right; font-weight: normal; font-style: normal;text-decoration:none; font-family: MS Sans Serif; font-size: 13px; display:block; background:#FFFFFF; color:#000080; border:#000000  none  1px ;"   />
                    <h:outputLabel id="LB172" value="Mes de Trabajo:"       style="position: absolute; width:125px; height: 23px; left: 29px;   top: 93px; text-align: right; font-weight: normal; font-style: normal;text-decoration:none; font-family: MS Sans Serif; font-size: 13px; display:block; background:#FFFFFF; color:#000080; border:#000000  none  1px ;"   />
                    <p:selectOneMenu filter="true"        effect="fade" id="CB50"   widgetVar="CB50"  value="#{periodoTrabajoControlador.mes}"   tabindex="3"
                                     style="position: absolute; width:100px; height: 23px; left: 159px;   top: 93px; text-align: left; font-weight: normal; font-style: normal; font-family: MS Sans Serif; font-size: 13px; display:block; background:#FFFFFF; color:#000000; "
                                     >
                        <p:ajax listener="#{periodoTrabajoControlador.cambiarMes}" update="CB51"   />
                        <f:selectItem/>
                        <f:selectItems value="#{periodoTrabajoControlador.listaMes}" var="regc" itemLabel="#{regc.campos['NOMBRE_MES']}" itemValue="#{regc.campos['MES']}" /></p:selectOneMenu>
                    <p:blockUI block="FR32_nuevo" widgetVar="blockNuevo"  trigger="">
                        Cargando<br/>
                        <p:graphicImage name="/images/general/loading.gif"/>
                    </p:blockUI>
                </h:form>
            </div>
        </section>
    </ui:define>
</ui:composition>
