<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TT_FR498}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{tipoEventoReqControlador.cargarForma}" />
			<div id="FR498" style="height: 590px;">
				<h:form style="height: 100%;" id="FRFR498">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:commandButton id="BT1007" widgetVar="BT1007" tabindex="0"
						value=""
						actionListener="#{tipoEventoReqControlador.oprimirbotonOculto}"
						style="position: absolute; width:100px; height: 10px; left: 20px;   top: 10px; text-align: left; font-weight: normal; font-style: normal; font-family: ARIAL; font-size: 11; display:none;   border:none;">
						<p:ajax event="dialogReturn"
							listener="#{tipoEventoReqControlador.retornarFormulariobotonOculto}"
							update="FRFR498:CB1814,FRFR498:TBFR498" />
					</p:commandButton>
					<p:remoteCommand name="remotoModal"
						actionListener="#{tipoEventoReqControlador.ejecutarremotoModal}"
						oncomplete="PF('BT1007').jq.click();" />
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{tipoEventoReqControlador.permisos[0]}"
						onHide="restaurarCampos(['CB1814'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_TIPO_DE_EVENTO}:" id="LCP15709"
								style="display:none;" />
							<p:inputText id="CP15709" readonly="true" widgetVar="CP15709"
								styleClass="inputTab"
								value="#{tipoEventoReqControlador.registro.campos['NOMBRE_EVENTO']}"
								label="LCP15709" style="display:none; width: 95%; float: left;">
							</p:inputText>
							<h:outputLabel value="#{idm.TG_CODIGO7}:" id="LCP15708"
								style="display:none;" />
							<p:inputText id="CP15708" readonly="true" widgetVar="CP15708"
								styleClass="inputTab"
								value="#{tipoEventoReqControlador.registro.campos['REQUISITO']}"
								label="LCP15708" style="display:none; width: 95%; float: left;"
								maxlength="22">
							</p:inputText>
							<h:outputLabel value="#{idm.TG_REQUISITO}:" id="LCB1814" />
							<p:selectOneMenu filter="true" effect="fade" id="CB1814"
								editable="false" widgetVar="CB1814"
								value="#{tipoEventoReqControlador.registro.campos['REQUISITO']}"
								onchange="" style="
">
								<p:ajax listener="#{tipoEventoReqControlador.cambiarREQUISITO}"
									update="@this,FRFR498:alert" oncomplete="remotoModal();" />
								<f:selectItem />
								<f:selectItems
									value="#{tipoEventoReqControlador.listaREQUISITO}" var="regc"
									itemLabel="#{regc.campos['NOMBRE']}"
									itemValue="#{regc.campos['CODIGO']}" />
							</p:selectOneMenu>
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"
										style="padding:10px;" update="FRFR498,"
										actionListener="#{tipoEventoReqControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"
										onclick="     if (!validarVaciosModal(['CB1814'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL1080" class="
"
						style="position: relative; height: 33px;">
						<p:remoteCommand name="refreshTab" update="TBFR498"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR498" var="reg"
							value="#{tipoEventoReqControlador.listaInicial}" editable="true"
							widgetVar="TBFR498" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{tipoEventoReqControlador.permisos[4] }">
								<h:commandLink
									rendered="#{tipoEventoReqControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR498" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{tipoEventoReqControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR498" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR498:alert,"
								listener="#{tipoEventoReqControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{tipoEventoReqControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{tipoEventoReqControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<div class="acme">
										<h:outputLink
											value="#{request.contextPath}//frmtipoevento.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR498}
                            </f:facet>
							<p:column headerText="#{idm.TG_TIPO_DE_EVENTO}"
								filterBy="#{reg.campos['NOMBRE_EVENTO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="100"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRE_EVENTO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP15709" styleClass="inputTab"
											value="#{reg.campos['NOMBRE_EVENTO']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_CODIGO7}"
								filterBy="#{reg.campos['REQUISITO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="100" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['REQUISITO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP15708" styleClass="inputTab"
											value="#{reg.campos['REQUISITO']}" style="width:100%"
											readonly="true" maxlength="22">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_REQUISITO}"
								filterBy="#{reg.campos['NOMBRE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="463" rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRE']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB1814"
											value="#{reg.campos['REQUISITO']}" style="width:100%"
											onchange="">
											<p:ajax
												listener="#{tipoEventoReqControlador.cambiarREQUISITOC(rowNun)}"
												update="@this,FRFR498:alert" oncomplete="remotoModal();" />
											<f:selectItem />
											<f:selectItems
												value="#{tipoEventoReqControlador.listaREQUISITO}"
												var="regc" itemLabel="#{regc.campos['NOMBRE']}"
												itemValue="#{regc.campos['CODIGO']}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{tipoEventoReqControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{tipoEventoReqControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{tipoEventoReqControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR498:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR498" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR498" widgetVar="blockCarga"
							trigger="TBFR498,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
