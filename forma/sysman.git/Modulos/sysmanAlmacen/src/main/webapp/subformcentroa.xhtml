<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html >
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:pt="http://java.sun.com/jsf/passthrough"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                template="/templateModalDatos.xhtml"
                xmlns:p="http://primefaces.org/ui"
                xmlns:pe="http://primefaces.org/ui/extensions"
                >
    <ui:define name="titulo">   
        <title>#{subformcentroasControlador.titulo}</title>
        <f:metadata>
            <f:viewParam name="rid" value="#{subformcentroasControlador.rid}" />
            <f:viewParam name="anoQr" value="#{subformcentroasControlador.anoQr}" />
            <f:viewParam name="mesInicialQr" value="#{subformcentroasControlador.mesInicialQr}" />
            <f:viewParam name="mesFinalQr" value="#{subformcentroasControlador.mesFinalQr}" />
            <f:viewParam name="centroCosto" value="#{subformcentroasControlador.centroCosto}" />
            <f:viewParam name="nombreCentro" value="#{subformcentroasControlador.nombreCentro}" />
            <f:viewParam name="codAuxiliar" value="#{subformcentroasControlador.codAuxiliar}" />
            <f:viewParam name="nombreAux" value="#{subformcentroasControlador.nombreAux}" />
            <f:viewParam name="formulario" value="#{subformcentroasControlador.formulario}" />
            <f:viewParam name="codTercero" value="#{subformcentroasControlador.codTercero}" />
            <f:viewParam name="nombreTercero" value="#{subformcentroasControlador.nombreTercero}" />
            <f:viewParam name="sucursalTercero" value="#{subformcentroasControlador.sucursalTercero}" />
        </f:metadata>
    </ui:define>
    <ui:define name="contenido">
        <section class="radiusModal" >
            <f:event type="preRenderView" listener="#{subformcentroasControlador.cargarForma}" />
            <div  id="FR40"  style="height: 550px;">
                <h:form style="height: 100%;"   id="FRFR40"  >
                    <p:growl id="alert" showDetail="true" sticky="false" widgetVar="alert" life="5000"  autoUpdate="false" escape="false"/>
                    <div id="PL94" style="position: relative; height: 120px; ">
                        <p:inputText id="CP335"   widgetVar="CP335"
                                     styleClass="inputTab"
                                     value="#{subformcentroasControlador.codigo}"     readonly="true" tabindex="0"
                                     style="position: absolute; width:153px; height: 22px; text-decoration:none; left: 185px;   top: 60px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  solid  1px ; padding-bottom: 0; padding-left: 2px; padding-top: 0;"
                                     >
                        </p:inputText>
                        <p:inputText id="CP336"   widgetVar="CP336"
                                     styleClass="inputTab"
                                     value="#{subformcentroasControlador.nombre}"     readonly="true" tabindex="1"
                                     style="position: absolute; width:344px; height: 22px; text-decoration:none; left: 185px;   top: 88px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  solid  1px ; padding-bottom: 0; padding-left: 2px; padding-top: 0;"
                                     >
                        </p:inputText>
                        <h:outputLabel id="LB223" value="#{subformcentroasControlador.etiquetaNombre}"       style="position: absolute; width:131px; height: 22px; left: 48px;   top: 88px; text-align: right; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;"   />
                        <h:outputLabel id="LB222" value="#{subformcentroasControlador.etiquetaCodigo}"       style="position: absolute; width:131px; height: 22px; left: 48px;   top: 60px; text-align: right; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;"   />
                        <h:outputLabel id="LB224" value="#{subformcentroasControlador.lbTitulo}"       style="position: absolute; width:100%; height: 28px; left: 0px;   top: 10px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 16px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;"   />
                    </div>
                    <p:confirmDialog global="true" showEffect="fade" >
                        <p:commandButton value="Si" type="button" styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
                        <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
                    </p:confirmDialog>
                    <div id="PL95" style="position: relative; height: 27px; ">
                        <p:remoteCommand name="refreshTab" update="TBFR40"/>
                        <p:dataTable id="TBFR40" var="reg" value="#{subformcentroasControlador.listaInicial}" editable="true" widgetVar="TBFR40"
                                     emptyMessage="No se encontraron registros"
                                     paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
                                     currentPageReportTemplate="Registros: {startRecord} - {endRecord} de {totalRecords}, Página: {currentPage}/{totalPages}"
                                     rows="10"
                                     rowIndexVar="rowNun"
                                     paginator="true"
                                     scrollable="true" scrollWidth="100%"
                                     lazy="true">
                            <f:facet name="{Exporters}" rendered="#{subformcentroasControlador.permisos[4] }" >
                                <h:commandLink rendered="#{subformcentroasControlador.permisos[4] }" title="Ver en excel">
                                    <p:graphicImage name="/images/general/excel.png" width="24"/>
                                    <p:dataExporter type="xls" target="TBFR40" fileName="Datos"  encoding="ISO-8859-1"  />
                                </h:commandLink>
                                <h:commandLink rendered="#{subformcentroasControlador.permisos[4] }" title="Ver en pdf">
                                    <p:graphicImage name="/images/general/pdf.png" width="24"/>
                                    <p:dataExporter type="pdf" target="TBFR40" fileName="Datos"  encoding="ISO-8859-1"/>
                                </h:commandLink>
                            </f:facet>
                            <f:facet name="header">
                                <div style="position: relative; height: 50px">
                                    <h:panelGroup class="acme">
                                        <p:commandLink action="#{subformcentroasControlador.cerrarFormulario}"
                                                       title="Cerrar formulario" style="padding-top: 10px;"
                                                       id="btCerrar">
                                            <center><p:graphicImage name="/images/menus/32/close.png"/>
                                                <div>Cerrar</div>
                                            </center>
                                        </p:commandLink>
                                    </h:panelGroup>
                                </div>
                                #{subformcentroasControlador.titulo}
                            </f:facet>
                            <p:column headerText="Tipo de Movimiento"  filterBy="#{reg.campos['TIPOMOVIMIENTO']}"  filterStyle="width:100%"   filterMatchMode="contains" width="100"   style=""  styleClass="" >
                                <h:outputText value="#{reg.campos['TIPOMOVIMIENTO']}"   style="text-align:  left; float:  left"  />
                            </p:column>
                            <p:column headerText="Código de Movimiento"  filterBy="#{reg.campos['MOVIMIENTO']}"  filterStyle="width:100%"   filterMatchMode="contains" width="120"   style=""  styleClass="" >
                                <h:outputText value="#{reg.campos['MOVIMIENTO']}"   style="text-align:  left; float:  left"  />
                            </p:column>
                            <p:column headerText="Elemento"  filterBy="#{reg.campos['ELEMENTO']}"  filterStyle="width:100%"   filterMatchMode="contains" width="129"   style=""  styleClass="" >
                                <h:outputText value="#{reg.campos['ELEMENTO']}"   style="text-align:  left; float:  left"  />
                            </p:column>
                            <p:column headerText="Cantidad"  filterBy="#{reg.campos['CANTIDAD']}"  filterStyle="width:100%"   filterMatchMode="contains"  width="129"  style=""  styleClass="">
                                <h:outputText value="#{reg.campos['CANTIDAD']}" converter="convertidorDoubleContinuo"     style="text-align:  left; float:  left"     />
                            </p:column>
                            <p:column headerText="Valor Unitario"  filterBy="#{reg.campos['VALORUNITARIO']}"  filterStyle="width:100%"   filterMatchMode="contains"  width="129"  style=""  styleClass="">
                                <h:outputText value="#{reg.campos['VALORUNITARIO']}" converter="convertidorDoubleContinuo"     style="text-align:  right; float:  right"     />
                            </p:column>
                            <p:column headerText="Valor Total"  filterBy="#{reg.campos['VALORTOTAL']}"  filterStyle="width:100%"   filterMatchMode="contains"  width="129"  style=""  styleClass="">
                                <h:outputText value="#{reg.campos['VALORTOTAL']}" converter="convertidorDoubleContinuo"     style="text-align:  right; float:  right"     />
                            </p:column>
                            <p:column headerText="Descripción"  filterBy="#{reg.campos['DESCRIPCION']}"  filterStyle="width:100%"   filterMatchMode="contains" width="300"   style=""  styleClass="" >
                                <h:outputText value="#{reg.campos['DESCRIPCION']}"   style="text-align:  left; float:  left"  />
                            </p:column>
                            <p:column headerText="Identificación Tercero"  filterBy="#{reg.campos['ID_TERCERO']}"  filterStyle="width:100%"   filterMatchMode="contains" width="180" rendered="#{loginBean.modulo=='6'}"  style=""  styleClass="" >
                                <h:outputText value="#{reg.campos['ID_TERCERO']}"   style="text-align:  left; float:  left"  />
                            </p:column>
                            <p:column headerText="Nombre Tercero"  filterBy="#{reg.campos['NOMBRE_TERCERO']}"  filterStyle="width:100%"   filterMatchMode="contains" width="400" rendered="#{loginBean.modulo=='6'}"  style=""  styleClass="" >
                                <h:outputText value="#{reg.campos['NOMBRE_TERCERO']}"   style="text-align:  left; float:  left"  />
                            </p:column>
                            <p:column headerText="Cód. Auxiliar"  filterBy="#{reg.campos['AUXILIAR']}"  filterStyle="width:100%"   filterMatchMode="contains" width="180" rendered="#{loginBean.modulo=='6'}"  style=""  styleClass="" >
                                <h:outputText value="#{reg.campos['AUXILIAR']}"   style="text-align:  left; float:  left"  />
                            </p:column>
                            <p:column headerText="Nombre Auxiliar"  filterBy="#{reg.campos['NOMBRE_AUXILIAR']}"  filterStyle="width:100%"   filterMatchMode="contains" width="200" rendered="#{loginBean.modulo=='6'}"  style=""  styleClass="" >
                                <h:outputText value="#{reg.campos['NOMBRE_AUXILIAR']}"   style="text-align:  left; float:  left"  />
                            </p:column>
                            <p:column headerText="Nombre Elemento"  filterBy="#{reg.campos['NOM_ELEMENTO']}"  filterStyle="width:100%"   filterMatchMode="contains" width="200" rendered="#{loginBean.modulo=='10'}"  style="display:true;"  styleClass="" >
                                <h:outputText value="#{reg.campos['NOM_ELEMENTO']}"   style="text-align:  left; float:  left"  />
                            </p:column>
                            <p:column headerText="Nombre Dependencia"  filterBy="#{reg.campos['NOM_DEPENDENCIA']}"  filterStyle="width:100%"   filterMatchMode="contains" width="200" rendered="#{loginBean.modulo=='10'}"  style="display:true;"  styleClass="" >
                                <h:outputText value="#{reg.campos['NOM_DEPENDENCIA']}"   style="text-align:  left; float:  left"  />
                            </p:column>
                        </p:dataTable>
                        <p:blockUI block="FRFR40" widgetVar="blockGuardar">
                            Guardando cambios<br/>
                            <p:graphicImage name="/images/general/loading.gif"/>
                        </p:blockUI>
                        <p:blockUI block="FRFR40" widgetVar="blockCarga"  trigger="TBFR40,">
                            Cargando<br/>
                            <p:graphicImage name="/images/general/loading.gif"/>
                        </p:blockUI>
                    </div>
                </h:form>
            </div>
        </section>
    </ui:define>
</ui:composition>
