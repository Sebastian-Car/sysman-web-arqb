<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModal.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            	actMensajes();
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.EM_FR1772}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal" style="height: auto">
			<div id="panelModal" style="position: relative; height: auto"
				class="
">
				<h:form id="FR1772_nuevo"
					style="position: relative; width: 100%; height: 150px; margin: 0px">
					<p:remoteCommand name="actMensajes" update="FR1772_nuevo:alert"
						actionListener="#{movimientosInventarioInicialControlador.mensajesInicioModal}">
					</p:remoteCommand>
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:growl id="message" showDetail="true" escape="false" />
					<p:confirmDialog global="true" showEffect="fade" id="confFR1772"
						widgetVar="confFR1772">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<p:dialog dynamic="true" closable="false" closeOnEscape="false"
						header="#{sessionBean.tituloMensajes}" id="DG219"
						widgetVar="DG219" resizable="false" modal="true" width="500"
						visible="#{movimientosInventarioInicialControlador.visibleDialogo}">
						<h:outputLabel
							value="#{movimientosInventarioInicialControlador.etiquetaMensaje}"
							style="width: 100%;" escape="false" />
						<h:panelGrid columns="2" cellpadding="2" width="100%">
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TG_ACEPTAR}"
										style="padding:10px; width: 48%;" update="@([id$=alert])"
										oncomplete=" if(true){ PF('DG219').hide(); PF('blockNuevo').hide();}  "
										onclick="  if(true){ PF('blockNuevo').show(); }else{    PF('DG219').hide(); }  "
										actionListener="#{movimientosInventarioInicialControlador.aceptarDialogo}" />
									<p:button value="#{idm.TG_CANCELAR}"
										style="padding:10px; width: 48%;" href="#"
										onclick="PF('DG219').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<h:outputLabel id="LB45112" value="#{idm.TT_LB45112}"
						style="position: absolute; width:316px; height: 22px; left: 170px;   top: 10px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					<p:commandButton id="BT3101" widgetVar="BT3101"
						disabled="#{movimientosInventarioInicialControlador.bloqProceso}"
						update="@([id$=DG219]),alert" tabindex="1"
						value="#{idm.TG_GENERAR}"
						actionListener="#{movimientosInventarioInicialControlador.oprimirAceptar}"
						style="position: absolute; width:158px; height: 45px; left: 250px;   top: 60px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 15px; display:block;  color:#0000FF; border:#AAAAAA  solid  1px ;">
					</p:commandButton>
					<p:blockUI block="FR1772_nuevo" widgetVar="blockNuevo" trigger="">
#{idm.TI_CARGANDO}<br />
						<p:graphicImage name="/images/general/loading.gif" />
					</p:blockUI>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
