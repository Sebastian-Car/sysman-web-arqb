<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR451}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{transaccionesvalidasControlador.cargarForma}" />
			<div id="FR451" style="height: 600px;">
				<h:form style="height: 100%;" id="FRFR451">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL997" class="
"
						style="position: relative; height: 48px;">
						<h:outputLabel id="LB11612" value="#{idm.TT_LB11612}"
							style="position: absolute; width:990px; height: 36px; left: 120px;   top: 5px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 18px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL998" class="
"
						style="position: relative; height: 29px;">
						<p:remoteCommand name="refreshTab" update="TBFR451"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR451" var="reg"
							value="#{transaccionesvalidasControlador.listaInicial}"
							editable="true" widgetVar="TBFR451"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{transaccionesvalidasControlador.permisos[4] }">
								<h:commandLink
									rendered="#{transaccionesvalidasControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR451" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{transaccionesvalidasControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR451" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR451}
                            </f:facet>
							<p:column headerText="#{idm.TC_CB1664}"
								filterBy="#{reg.campos['ORIGEN']}" filterStyle="width:100%"
								filterMatchMode="contains" width="202" rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['ORIGEN']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB1664"
											value="#{reg.campos['CLASE_BODEGA_ORIGEN']}"
											style="width:100%" onchange="">
											<f:selectItem />
											<f:selectItems
												value="#{transaccionesvalidasControlador.listaCodigo}"
												var="regc" itemLabel="#{regc.campos['NOMBRE']}"
												itemValue="#{regc.campos['CODIGO']}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CB1665}"
								filterBy="#{reg.campos['DESTINO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="202" rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['DESTINO']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB1665"
											value="#{reg.campos['CLASE_BODEGA_DESTINO']}"
											style="width:100%" onchange="">
											<f:selectItem />
											<f:selectItems
												value="#{transaccionesvalidasControlador.listaClaseBodega}"
												var="regc" itemLabel="#{regc.campos['NOMBRE']}"
												itemValue="#{regc.campos['CODIGO']}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_CONCEPTO4}"
								filterBy="#{reg.campos['NOMBRECONCEPTO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="202"
								rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRECONCEPTO']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB1666" value="#{reg.campos['CONCEPTO']}"
											style="width:100%" onchange="">
											<f:selectItem />
											<f:selectItems
												value="#{transaccionesvalidasControlador.listaConcepto}"
												var="regc" itemLabel="#{regc.campos['NOMBRE']}"
												itemValue="#{regc.campos['CODIGO']}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_MOVIMIENTO2}"
								filterBy="#{reg.campos['NOMBRECLASE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="122" rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRECLASE']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB1668" value="#{reg.campos['CLASE']}"
											style="width:100%" onchange="">
											<f:selectItem />
											<f:selectItem itemValue="E" itemLabel="#{idm.OD_CB1668_0}" />
											<f:selectItem itemValue="S" itemLabel="#{idm.OD_CB1668_1}" />
											<f:selectItem itemValue="T" itemLabel="#{idm.OD_CB1668_2}" />
											<f:selectItem itemValue="D" itemLabel="#{idm.OD_CB1668_3}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_TIPO_ELEMENTO}"
								filterBy="#{reg.campos['NOMBRETIPOELEMENTO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="232"
								rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRETIPOELEMENTO']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB1667"
											value="#{reg.campos['TIPO_ELEMENTO']}" style="width:100%"
											onchange="">
											<f:selectItem />
											<f:selectItem itemValue="D" itemLabel="#{idm.OD_CB1667_0}" />
											<f:selectItem itemValue="N" itemLabel="#{idm.OD_CB1667_1}" />
											<f:selectItem itemValue="C" itemLabel="#{idm.OD_CB1667_2}" />
											<f:selectItem itemValue="S" itemLabel="#{idm.OD_CB1667_3}" />
											<f:selectItem itemValue="M" itemLabel="#{idm.OD_CB1667_4}" />
											<f:selectItem itemValue="E" itemLabel="#{idm.OD_CB1667_5}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR451" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR451" widgetVar="blockCarga"
							trigger="TBFR451,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
