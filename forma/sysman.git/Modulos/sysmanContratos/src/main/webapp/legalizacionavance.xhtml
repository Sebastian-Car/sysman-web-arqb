<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TT_FR341}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{legalizacionavancesControlador.cargarForma}" />
			<div id="FR341" style="height: 1200px;">
				<h:form style="height: 100%;" id="FRFR341">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL748" class="
"
						style="position: relative; height: 38px;">
						<h:outputLabel id="LB9500" value="#{idm.TT_LB9500}"
							style="position: absolute; width:653px; height: 25px; left: 11px;   top: 5px; text-align: center; font-weight: bold; font-style: normal;text-decoration:normal; font-family: Tahoma; font-size: 15px; display:true; background:#FFFFFF; color:#000000; border:none;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL749" class="
"
						style="position: relative; height: 240px;">
						<p:remoteCommand name="refreshTab" update="TBFR341"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR341" var="reg"
							value="#{legalizacionavancesControlador.listaInicial}"
							editable="true" widgetVar="TBFR341"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{legalizacionavancesControlador.permisos[4] }">
								<h:commandLink
									rendered="#{legalizacionavancesControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR341" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{legalizacionavancesControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR341" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR341:alert,"
								listener="#{legalizacionavancesControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{legalizacionavancesControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR341}
                            </f:facet>
							<p:column headerText="#{idm.TG_NUMERO7}"
								filterBy="#{reg.campos['NUMERO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="10%" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NUMERO']}"
											style="text-align:  right; float:  right" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP11313" styleClass="inputTab"
											value="#{reg.campos['NUMERO']}" style="width:100%"
											readonly="true" maxlength="15">
											<pe:keyFilter regEx="/[\d]/" />
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP11307}"
								filterBy="#{reg.campos['FECHA']}" filterStyle="width:100%"
								filterMatchMode="contains" width="10%" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHA']}">
											<f:convertDateTime pattern="dd/MM/yyyy"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true" mask="true"
											pattern="dd/MM/yyyy" id="CP11307" widgetVar="CP11307"
											value="#{reg.campos['FECHA']}" style="width:100%"
											disabled="true">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP11308}"
								filterBy="#{reg.campos['NOMBRE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="20%" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRE']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP11308" styleClass="inputTab"
											value="#{reg.campos['NOMBRE']}" style="width:100%"
											readonly="true" maxlength="4000">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_VLR_TOTAL}"
								filterBy="#{reg.campos['VALORTOTAL']}" filterStyle="width:100%"
								filterMatchMode="contains" width="10%" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['VALORTOTAL']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  right; float:  right" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP11312" styleClass="inputTab"
											readonly="true" value="#{reg.campos['VALORTOTAL']}"
											decimalPlaces="2" thousandSeparator="," decimalSeparator="."
											maxValue="999999999999999999.99"
											minValue="-999999999999999999.99"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_FECHA_DE_LEGALIZACION}"
								filterBy="#{reg.campos['FECHAFINALIZACION']}"
								filterStyle="width:100%" filterMatchMode="contains" width="10%"
								style="
" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHAFINALIZACION']}">
											<f:convertDateTime pattern="dd/MM/yyyy"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true" mask="true"
											pattern="dd/MM/yyyy" id="CP11309" widgetVar="CP11309"
											value="#{reg.campos['FECHAFINALIZACION']}" style="width:100%">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_VALOR4}"
								filterBy="#{reg.campos['VALORFINAL']}" filterStyle="width:100%"
								filterMatchMode="contains" width="144px" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['VALORFINAL']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  right; float:  right" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP11310" styleClass="inputTab"
											value="#{reg.campos['VALORFINAL']}" decimalPlaces="2"
											thousandSeparator="," decimalSeparator="."
											maxValue="999999999999999999.99"
											minValue="-999999999999999999.99"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_OBSERVACIONES3}"
								filterBy="#{reg.campos['DESCRIPCION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="30%" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['DESCRIPCION']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP11311" styleClass="inputTab"
											value="#{reg.campos['DESCRIPCION']}" style="width:100%"
											maxlength="4000">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{legalizacionavancesControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR341" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR341" widgetVar="blockCarga"
							trigger="TBFR341,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
