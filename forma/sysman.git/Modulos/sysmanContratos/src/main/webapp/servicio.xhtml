<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TT_FR189}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{serviciosControlador.cargarForma}" />
			<div id="FR189" style="height: 650px;">
				<h:form style="height: 100%;" id="FRFR189">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL407" class="
"
						style="position: relative; height: 38px;">
						<h:outputLabel id="LB5076" value="#{idm.TT_LB5076}"
							style="position: absolute; width:611px; height: 25px; left: 380px;   top: 6px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 16px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL408" class="
"
						style="position: relative; height: 260px;">
						<p:remoteCommand name="refreshTab" update="TBFR189"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR189" var="reg"
							value="#{serviciosControlador.listaInicial}" editable="true"
							widgetVar="TBFR189" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{serviciosControlador.permisos[4] }">
								<h:commandLink rendered="#{serviciosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR189" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{serviciosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR189" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR189:alert,"
								listener="#{serviciosControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{serviciosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR189}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP8050}"
								filterBy="#{reg.campos['CODIGOELEMENTO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="97"
								style="
" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGOELEMENTO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP8050" styleClass="inputTab"
											value="#{reg.campos['CODIGOELEMENTO']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_CODIGO_UNSPSC2}"
								filterBy="#{reg.campos['CODIGOCUBS']}" filterStyle="width:100%"
								filterMatchMode="contains" width="111" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGOCUBS']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP6714" styleClass="inputTab"
											value="#{reg.campos['CODIGOCUBS']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP6689}"
								filterBy="#{reg.campos['NOMBRECORTO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="433" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRECORTO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP6689" styleClass="inputTab"
											value="#{reg.campos['NOMBRECORTO']}" style="width:100%">
											<p:ajax event="change"
												listener="#{serviciosControlador.cambiarNombreCortoC(rowNun)}"
												update="CP6691" />
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_MOV}"
								filterBy="#{reg.campos['TIENEMOVIMIENTO']}"
								filterMatchMode="exact" width="90" style="
" styleClass="
">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR189').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText
											value="#{reg.campos['TIENEMOVIMIENTO']=='false'? 'No':'Si'}" />
									</f:facet>
									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK145"
												value="#{reg.campos['TIENEMOVIMIENTO']}" disabled="true">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_PREDECESOR}"
								filterBy="#{reg.campos['PREDECESOR']}" filterStyle="width:100%"
								filterMatchMode="contains" width="97" style="
" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['PREDECESOR']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP6690" styleClass="inputTab"
											value="#{reg.campos['PREDECESOR']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_UNIDAD2}"
								filterBy="#{reg.campos['UNIDAD']}" filterStyle="width:100%"
								filterMatchMode="contains" width="97" style="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['UNIDAD']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB673" value="#{reg.campos['UNIDAD']}"
											style="width:100%" disabled="true" onchange="">
											<f:selectItem />
											<f:selectItems value="#{serviciosControlador.listaUnidad}"
												var="regc" itemLabel="#{regc.campos['NOMBRE']}"
												itemValue="#{regc.campos['UNIDAD']}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP6691}"
								filterBy="#{reg.campos['NOMBRELARGO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="433" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRELARGO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP6691" styleClass="inputTab"
											value="#{reg.campos['NOMBRELARGO']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_DESCRIPCION7}"
								filterBy="#{reg.campos['DESCRIPCION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="433" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['DESCRIPCION']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP6692" styleClass="inputTab"
											value="#{reg.campos['DESCRIPCION']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{serviciosControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{serviciosControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{serviciosControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR189:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR189" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR189" widgetVar="blockCarga"
							trigger="TBFR189,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
