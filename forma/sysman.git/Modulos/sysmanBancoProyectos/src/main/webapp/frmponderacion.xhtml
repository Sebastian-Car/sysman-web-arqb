<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR214}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{frmponderacionsControlador.cargarForma}" />
			<div id="FR214" style="height: 600px;">
				<h:form style="height: 100%;" id="FRFR214">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL456" class="
"
						style="position: relative; height: 102px;">
						<p:selectOneMenu filter="true" editable="false" effect="fade"
							id="CB720" widgetVar="CB720"
							value="#{frmponderacionsControlador.vigencia}" tabindex="0"
							style="position: absolute; width:80px; height: 24px; left: 247px;   top: 48px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  solid  1px ;">
							<p:ajax listener="#{frmponderacionsControlador.cambiarVIGENCIA}"
								update="@form" />
							<f:selectItem />
							<f:selectItems
								value="#{frmponderacionsControlador.listaVIGENCIA}" var="regc"
								itemLabel="#{regc.campos['NUMERO']}"
								itemValue="#{regc.campos['NUMERO']}" />
						</p:selectOneMenu>
						<h:outputLabel id="LB5206"
							value="#{idm.TG_VIGENCIA_GUBERNAMENTAL}"
							style="position: absolute; width:193px; height: 24px; left: 48px;   top: 48px; text-align: right; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
						<h:outputLabel id="LB5205" value="#{idm.TT_LB5205}"
							style="position: absolute; width:410px; height: 24px; left: 447px;   top: 10px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 16px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL457" class="
"
						style="position: relative; height: 22px;">
						<p:remoteCommand name="refreshTab" update="TBFR214"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR214" var="reg"
							value="#{frmponderacionsControlador.listaInicial}"
							editable="true" widgetVar="TBFR214"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{frmponderacionsControlador.permisos[4] }">
								<h:commandLink
									rendered="#{frmponderacionsControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR214" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{frmponderacionsControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR214" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR214:alert,"
								listener="#{frmponderacionsControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{frmponderacionsControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR214}
                            </f:facet>
							<p:column headerText="#{idm.TG_INDICADOR}"
								filterBy="#{reg.campos['ID']}" filterStyle="width:100%"
								filterMatchMode="contains" width="150" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['ID']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP6812" styleClass="inputTab"
											value="#{reg.campos['ID']}" style="width:100%"
											readonly="true" maxlength="60">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_DESCRIPCION7}"
								filterBy="#{reg.campos['DESCRIPCION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="900" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['DESCRIPCION']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP6811" styleClass="inputTab"
											value="#{reg.campos['DESCRIPCION']}" style="width:100%"
											readonly="true" maxlength="200">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_PONDERACION2}"
								filterBy="#{reg.campos['PONDERACION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="160" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['PONDERACION']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  right; float:  right" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP6813" styleClass="inputTab"
											readonly="#{!reg.campos['META_PRODUC']}"
											value="#{reg.campos['PONDERACION']}" decimalPlaces="2"
											thousandSeparator="," decimalSeparator="."
											maxValue="9999999999999.99" minValue="-9999999999999.99"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CK150}"
								filterBy="#{reg.campos['META_PRODUC']}" filterMatchMode="exact"
								width="120" style="
" styleClass="text-center">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR214').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText
											value="#{reg.campos['META_PRODUC']=='false'? 'No':'Si'}" />
									</f:facet>
									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK150"
												value="#{reg.campos['META_PRODUC']}" disabled="true">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:columnGroup type="footer">
								<p:row style="height: 0px; border: none">
									<p:column style="border:1px solid transparent;" />
									<p:column style="border:1px solid transparent;" />
									<p:column style="border:1px solid transparent;" />
									<p:column style="border:1px solid transparent;" />
									<p:column style="border:1px solid transparent;" />
								</p:row>
								<p:row>
									<p:column id="LP10" footerText="#{idm.TT_LP10}" colspan="2"
										style="text-align: right; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 12px;  color:#333333; " />
									<p:column id="LP11"
										footerText="#{frmponderacionsControlador.totalPonderacion}"
										colspan="1"
										style="text-align: left; font-weight: normal; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 14px;  color:#333333; " />
								</p:row>
							</p:columnGroup>
							<p:column width="30" exportable="false"
								rendered="#{frmponderacionsControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR214" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR214" widgetVar="blockCarga"
							trigger="TBFR214,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
