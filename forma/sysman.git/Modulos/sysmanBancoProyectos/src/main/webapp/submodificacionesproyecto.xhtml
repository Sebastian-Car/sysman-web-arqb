<?xml version='1.0' encoding='UTF-8' ?>

            }

						position="center top"
						onHide="restaurarCampos(['CB708','CP45341'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_CONSECUTIVO}:" id="LCP45341"
								style="display:true;" class="cont-inst-element" />
							<p:inputText id="CP45341" readonly="true" widgetVar="CP45341"
								styleClass="inputTab"
								value="#{submodificacionesproyectosControlador.registro.campos['CONSECUTIVO']}"

							<h:outputLabel value="#{idm.TG_TIPO3}:" id="LCB708"
								class="cont-inst-element" />

								editable="false" widgetVar="CB708"
								value="#{submodificacionesproyectosControlador.registro.campos['TIPO']}"

								<p:ajax

								<f:selectItem itemValue="REG" itemLabel="#{idm.TI_REGISTRO}" />
								<f:selectItem itemValue="FMR" itemLabel="#{idm.OD_CB708_2}" />
								<f:selectItem itemValue="000" itemLabel="#{idm.OD_CB708_3}" />
							</p:selectOneMenu>
							<h:outputLabel value="#{idm.TG_FECHA4}:" id="LCP6774"
								class="cont-inst-element" />
							<p:calendar locale="es" navigator="true" mask="true"
								pattern="dd/MM/yyyy" id="CP6774" widgetVar="CP6774"
								value="#{submodificacionesproyectosControlador.registro.campos['FECHA']}"
								label="LCP6774" style="float: left;" class="cont-inst-element">

PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',

     return false;

									title="#{idm.TI_VER_EXCEL}">

									<p:dataExporter type="xls" target="TBFR211" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{submodificacionesproyectosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">

										encoding="ISO-8859-1" />
								</h:commandLink>

								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{submodificacionesproyectosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />

									<h:panelGroup class="acme"
										rendered="#{submodificacionesproyectosControlador.permisos[0] and submodificacionesproyectosControlador.muestraRegistro }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{submodificacionesproyectosControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>

                            #{idm.TT_FR211}

							<p:column headerText="#{idm.TG_CONSECUTIVO}"
								filterBy="#{reg.campos['CONSECUTIVO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="100" rendered="true"
								styleClass="
">

												listener="#{submodificacionesproyectosControlador.cambiarTIPOC(rowNun)}"

											<f:selectItem itemValue="ACT" itemLabel="#{idm.OD_CB708_0}" />
											<f:selectItem itemValue="REG" itemLabel="#{idm.TI_REGISTRO}" />
											<f:selectItem itemValue="FMR" itemLabel="#{idm.OD_CB708_2}" />
											<f:selectItem itemValue="000" itemLabel="#{idm.OD_CB708_3}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_FECHA4}"
								filterBy="#{reg.campos['FECHA']}" filterStyle="width:100%"
								filterMatchMode="contains" width="100" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHA']}">
											<f:convertDateTime pattern="dd/MM/yyyy"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true" mask="true"
											pattern="dd/MM/yyyy" id="CP6774" widgetVar="CP6774"
											value="#{reg.campos['FECHA']}" style="width:100%">

">

										<h:outputText value="#{reg.campos['TEXTO']}"
											style="text-align:  left; float:  left" />

										<p:inputText id="CP6773" styleClass="inputTab"

									</f:facet>
								</p:cellEditor>
							</p:column>

										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
