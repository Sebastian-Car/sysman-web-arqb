<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR210}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{preguntasControlador.cargarForma}" />
			<div id="FR210" style="height: 615px;">
				<h:form style="height: 100%;" id="FRFR210">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL449" class="
"
						style="position: relative; height: 48px;">
						<h:outputLabel id="LB5184" value="#{idm.TT_LB5184}"
							style="position: absolute; width:400px; height: 25px; left: 442px;   top: 5px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{preguntasControlador.permisos[0]}"
						onHide="restaurarCampos(['CP6771'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_CODIGO7}:" id="LCP6770"
								style="display:none;" class="cont-inst-element" />
							<p:inputText id="CP6770" readonly="true" widgetVar="CP6770"
								styleClass="inputTab"
								value="#{preguntasControlador.registro.campos['CODIGO']}"
								label="LCP6770" style="display:none; width: 95%; float: left;"
								class="cont-inst-element">
							</p:inputText>
							<h:outputLabel value="#{idm.TG_NOMBRE3}:" id="LCP6771"
								class="cont-inst-element" />
							<p:inputText id="CP6771" widgetVar="CP6771" styleClass="inputTab"
								value="#{preguntasControlador.registro.campos['NOMBRE']}"
								label="LCP6771" style=" width: 95%; float: left;"
								class="cont-inst-element">
							</p:inputText>
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"
										style="padding:10px;" update="FRFR210,"
										actionListener="#{preguntasControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"
										onclick="     if (!validarVaciosModal(['CP6771'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL450" class="
"
						style="position: relative; height: 29px;">
						<p:remoteCommand name="refreshTab" update="TBFR210"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR210" var="reg"
							value="#{preguntasControlador.listaInicial}" editable="true"
							widgetVar="TBFR210" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{preguntasControlador.permisos[4] }">
								<h:commandLink rendered="#{preguntasControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR210" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{preguntasControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR210" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR210:alert,"
								listener="#{preguntasControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{preguntasControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{preguntasControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR210}
                            </f:facet>
							<p:column headerText="#{idm.TG_CODIGO7}"
								filterBy="#{reg.campos['CODIGO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="85" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP6770" styleClass="inputTab"
											value="#{reg.campos['CODIGO']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_NOMBRE3}"
								filterBy="#{reg.campos['NOMBRE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="601" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRE']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP6771" styleClass="inputTab"
											value="#{reg.campos['NOMBRE']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{preguntasControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{preguntasControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{preguntasControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR210:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR210" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR210" widgetVar="blockCarga"
							trigger="TBFR210,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
