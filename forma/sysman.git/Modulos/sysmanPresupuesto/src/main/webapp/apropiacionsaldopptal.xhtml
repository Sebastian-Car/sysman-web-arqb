<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TT_FR917}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{apropiacionsaldopptalsControlador.cargarForma}" />
			<div id="FR917" style="height: 800px;">
				<h:form style="height: 100%;" id="FRFR917">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL1811" style="position: relative; height: 63px;">
						<h:outputLabel id="LB21531"
							value="#{apropiacionsaldopptalsControlador.titulo}"
							style="position: absolute; width:938px; height: 43px; left: 5px;   top: 9px; text-align: left; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL1812" style="position: relative; height: 22px;">
						<p:remoteCommand name="refreshTab" update="TBFR917" />
						<p:dataTable id="TBFR917" var="reg"
							value="#{apropiacionsaldopptalsControlador.listaInicial}"
							editable="true" widgetVar="TBFR917"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{apropiacionsaldopptalsControlador.permisos[4] }">
								<h:commandLink
									rendered="#{apropiacionsaldopptalsControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR917" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{apropiacionsaldopptalsControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR917" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink title="Volver al menú"
											style="padding-top: 10px;" value="javascript:void(0)"
											onclick="rcCerrar();">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
									<p:remoteCommand name="rcCerrar"
										actionListener="#{apropiacionsaldopptalsControlador.ejecutarrcCerrar}" />
								</div>	 
                            #{idm.TT_FR917}
                            </f:facet>
							<p:column headerText="#{idm.TG_MES3}"
								filterBy="#{reg.campos['MES']}" filterStyle="width:100%"
								filterMatchMode="contains" width="96" rendered="true">
								<h:outputText value="#{reg.campos['MES']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_APROPIACION}"
								filterBy="#{reg.campos['APROPIACION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="164px" rendered="true">
								<h:outputText value="#{reg.campos['APROPIACION']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
							<p:column headerText="#{idm.TG_ADICION}"
								filterBy="#{reg.campos['ADICION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="164px" rendered="true">
								<h:outputText value="#{reg.campos['ADICION']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
							<p:column headerText="#{idm.TG_REDUCCION}"
								filterBy="#{reg.campos['REDUCCION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="164px" rendered="true">
								<h:outputText value="#{reg.campos['REDUCCION']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
							<p:column headerText="#{idm.TC_CP26582}"
								filterBy="#{reg.campos['TRASLADO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="164px" rendered="true">
								<h:outputText value="#{reg.campos['TRASLADO']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
							<p:column headerText="#{idm.TC_CP26584}"
								filterBy="#{reg.campos['APLAZAMIENTO']}"
								filterStyle="width:100%" filterMatchMode="contains"
								width="164px" rendered="true">
								<h:outputText value="#{reg.campos['APLAZAMIENTO']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR917" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR917" widgetVar="blockCarga"
							trigger="TBFR917,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
