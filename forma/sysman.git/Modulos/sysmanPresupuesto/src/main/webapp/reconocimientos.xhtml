<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TT_FR927}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{reconocimientosControlador.cargarForma}" />
			<div id="FR927" style="height: 620px;">
				<h:form style="height: 100%;" id="FRFR927">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL1829" style="position: relative; height: 82px;">
						<h:outputLabel id="LB21779"
							value="#{reconocimientosControlador.titulo}"
							style="position: absolute; width:1000px; height: 60px; left: 3px;   top: 8px; text-align: left; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL1830" style="position: relative; height: auto;">
						<p:remoteCommand name="refreshTab" update="TBFR927" />
						<p:dataTable id="TBFR927" var="reg"
							value="#{reconocimientosControlador.listaInicial}"
							editable="true" widgetVar="TBFR927"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{reconocimientosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{reconocimientosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR927" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{reconocimientosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR927" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink title="Volver al menú"
											style="padding-top: 10px;" value="javascript:void(0)"
											onclick="rcCerrar();">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
									<p:remoteCommand name="rcCerrar"
										actionListener="#{reconocimientosControlador.ejecutarrcCerrar}" />
								</div>	 
                            #{idm.TT_FR927}
                            </f:facet>
							<p:column headerText="#{idm.TG_MES3}"
								filterBy="#{reg.campos['MES']}" filterStyle="width:100%"
								filterMatchMode="contains" width="35%" rendered="true">
								<h:outputText value="#{reg.campos['MES']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_RECONOCIMIENTOS}"
								filterBy="#{reg.campos['RECONOCIMIENTOS']}"
								filterStyle="width:100%" filterMatchMode="contains" width="75%"
								rendered="true">
								<h:outputText value="#{reg.campos['RECONOCIMIENTOS']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
							<p:columnGroup type="footer">
								<p:row style="height: 0px; border: none">
									<p:column style="border:1px solid transparent;" rendered="true" />
									<p:column style="border:1px solid transparent;" rendered="true" />
								</p:row>
								<p:row>
									<p:column id="LP124" footerText="#{idm.TG_TOTAL6}" colspan="1"
										style="text-align: right; font-weight: bold; font-style: normal;text-decoration:normal; font-family: Tahoma; font-size: 13px;  color:#000000; " />
									<p:column id="LP125"
										footerText="#{reconocimientosControlador.valorTotal}"
										style="text-align: right; font-weight: bold; font-style: normal;text-decoration:normal; font-family: Tahoma; font-size: 13px;  color:#000000; " />
								</p:row>
							</p:columnGroup>
						</p:dataTable>
						<p:blockUI block="FRFR927" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR927" widgetVar="blockCarga"
							trigger="TBFR927,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
