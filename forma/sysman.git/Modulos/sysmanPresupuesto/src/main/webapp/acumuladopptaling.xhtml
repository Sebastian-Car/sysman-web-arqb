<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TG_ACUMULADOS_PLAN_PRESUPUESTAL}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{acumuladopptalingControlador.cargarForma}" />
			<div id="FR945" style="height: auto;">
				<h:form style="height: 100%;" id="FRFR945">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL1856" class="
"
						style="position: relative; height: 72px;">
						<h:outputLabel id="LB22124"
							value="#{acumuladopptalingControlador.titulo}"
							style="position: absolute; width:752px; height: 42px; left: 8px;   top: 6px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL1857" class="
"
						style="position: relative; height: auto;">
						<p:remoteCommand name="refreshTab" update="TBFR945"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR945" var="reg"
							value="#{acumuladopptalingControlador.listaInicial}"
							editable="true" widgetVar="TBFR945"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{acumuladopptalingControlador.permisos[4] }">
								<h:commandLink
									rendered="#{acumuladopptalingControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR945" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{acumuladopptalingControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR945" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink title="Volver al menú"
											style="padding-top: 10px;" value="javascript:void(0)"
											onclick="rcCerrar();">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
									<p:remoteCommand name="rcCerrar"
										actionListener="#{acumuladopptalingControlador.ejecutarrcCerrar}" />
								</div>	 
                            #{idm.TG_ACUMULADOS_PLAN_PRESUPUESTAL}
                            </f:facet>
							<p:column headerText="#{idm.TG_MES3}"
								filterBy="#{reg.campos['MES']}" filterStyle="width:100%"
								filterMatchMode="startsWith" width="25%" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['MES']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_CAUSACION}"
								filterBy="#{reg.campos['CAUSACION']}" filterStyle="width:100%"
								filterMatchMode="startsWith" width="25%" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['CAUSACION']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
							<p:column headerText="#{idm.TC_CP27359}"
								filterBy="#{reg.campos['RECAUDOPPTAL']}"
								filterStyle="width:100%" filterMatchMode="startsWith"
								width="25%" rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['RECAUDOPPTAL']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
							<p:column headerText="#{idm.TC_CP27360}"
								filterBy="#{reg.campos['RECAUDOCONTABLE']}"
								filterStyle="width:100%" filterMatchMode="startsWith"
								width="25%" rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['RECAUDOCONTABLE']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
							<p:columnGroup type="footer">
								<p:row style="height: 0px; border: none">
									<p:column style="border:1px solid transparent;" rendered="true" />
									<p:column style="border:1px solid transparent;" rendered="true" />
									<p:column style="border:1px solid transparent;" rendered="true" />
									<p:column style="border:1px solid transparent;" rendered="true" />
								</p:row>
								<p:row>
									<p:column id="LP143" footerText="#{idm.TG_TOTALES5}"
										colspan="1"
										style="text-align: right; font-weight: bold; font-style: normal;text-decoration:normal; font-family: Tahoma; font-size: 13px;  color:#000000; " />
									<p:column id="LP144"
										footerText="#{acumuladopptalingControlador.cusacionTotal}"
										colspan="1"
										style="text-align: right; font-weight: bold; font-style: normal;text-decoration:normal; font-family: Tahoma; font-size: 13px;  color:#000000; " />
									<p:column id="LP145"
										footerText="#{acumuladopptalingControlador.recaudoTotal}"
										colspan="1"
										style="text-align: right; font-weight: bold; font-style: normal;text-decoration:normal; font-family: Tahoma; font-size: 13px;  color:#000000; " />
									<p:column id="LP146"
										footerText="#{acumuladopptalingControlador.recaudoConTotal}"
										colspan="1"
										style="text-align: right; font-weight: bold; font-style: normal;text-decoration:normal; font-family: Tahoma; font-size: 13px;  color:#000000; " />
								</p:row>
							</p:columnGroup>
						</p:dataTable>
						<p:blockUI block="FRFR945" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR945" widgetVar="blockCarga"
							trigger="TBFR945,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
