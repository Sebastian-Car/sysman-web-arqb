<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TG_REGISTRO_PRESUPUESTAL2}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{registrosaldopptalsControlador.cargarForma}" />
			<div id="FR919" style="height: 800px;">
				<h:form style="height: 100%;" id="FRFR919">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL1814" style="position: relative; height: 38px;">
						<h:outputLabel id="LB21537"
							value="#{registrosaldopptalsControlador.titulo}"
							style="position: absolute; width:938px; height: 24px; left: 5px;   top: 5px; text-align: left; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL1815" style="position: relative; height: 20px;">
						<p:remoteCommand name="refreshTab" update="TBFR919" />
						<p:dataTable id="TBFR919" var="reg"
							value="#{registrosaldopptalsControlador.listaInicial}"
							editable="true" widgetVar="TBFR919"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{registrosaldopptalsControlador.permisos[4] }">
								<h:commandLink
									rendered="#{registrosaldopptalsControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR919" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{registrosaldopptalsControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR919" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink title="Volver al menú"
											style="padding-top: 10px;" value="javascript:void(0)"
											onclick="rcCerrar();">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
									<p:remoteCommand name="rcCerrar"
										actionListener="#{registrosaldopptalsControlador.ejecutarrcCerrar}" />
								</div>	 
                            #{idm.TG_REGISTRO_PRESUPUESTAL2}
                            </f:facet>
							<p:column headerText="#{idm.TG_MES3}"
								filterBy="#{reg.campos['MES']}" filterStyle="width:100%"
								filterMatchMode="contains" width="25%" rendered="true">
								<h:outputText value="#{reg.campos['MES']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_SALDO_DISPONIBILIDADES}"
								filterBy="#{reg.campos['SALDODISPONIBILIDAD']}"
								filterStyle="width:100%" filterMatchMode="contains" width="25%"
								rendered="true">
								<h:outputText value="#{reg.campos['SALDODISPONIBILIDAD']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
							<p:column headerText="#{idm.TC_CP26590}"
								filterBy="#{reg.campos['SALDOREGISTROS']}"
								filterStyle="width:100%" filterMatchMode="contains" width="25%"
								rendered="true">
								<h:outputText value="#{reg.campos['SALDOREGISTROS']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
							<p:column headerText="#{idm.TC_CP26591}"
								filterBy="#{reg.campos['SALDOREGOBLIGACION']}"
								filterStyle="width:100%" filterMatchMode="contains" width="25%"
								rendered="true">
								<h:outputText value="#{reg.campos['SALDOREGOBLIGACION']}"
									converter="convertidorDoubleContinuo"
									style="text-align:  right; float:  right" />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR919" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR919" widgetVar="blockCarga"
							trigger="TBFR919,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
