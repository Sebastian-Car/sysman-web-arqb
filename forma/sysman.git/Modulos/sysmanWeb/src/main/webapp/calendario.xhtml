<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
<h:head></h:head>
<h:body>
	<!-- Define el componente que va a ser reutilizado en otra página -->
	<ui:composition>
		<p:schedule id="calendario" slotDuration="00:15:00" allDaySlot="false"
			widgetVar="calendario" value="#{calendarioBean.modeloCalendario}"
			locale="es" timeZone="#{calendarioBean.zonaHoraria}"
			resizable="false" draggable="false">
			<p:ajax event="eventSelect"
				listener="#{calendarioBean.seleccionarEvento}"
				update="detallesEvento" oncomplete="PF('dialogoEventos').show();" />
		</p:schedule>

		<p:dialog id="dialogoEventos" widgetVar="dialogoEventos"
			header="Detalles del Evento" showEffect="clip" hideEffect="clip"
			resizable="false">
			<h:panelGrid id="detallesEvento" columns="2">
				<p:outputLabel for="title" value="Texto:" />
				<p:inputTextarea id="title"
					value="#{calendarioBean.eventoCalendario.description}"
					readonly="true" />

				<p:outputLabel for="from" value="Desde:" />
				<p:calendar id="from" locale="es"
					value="#{calendarioBean.eventoCalendario.startDate}"
					timeZone="#{calendarioBean.zonaHoraria}" pattern="dd/MM/yyyy HH:mm"
					mask="true" stepMinute="15" readonlyInput="true" showOn="none" />

				<p:outputLabel for="to" value="Hasta:" />
				<p:calendar id="to" locale="es"
					value="#{calendarioBean.eventoCalendario.endDate}"
					timeZone="#{calendarioBean.zonaHoraria}" pattern="dd/MM/yyyy HH:mm"
					mask="true" stepMinute="15" readonlyInput="true" showOn="none" />
			</h:panelGrid>
		</p:dialog>
	</ui:composition>
</h:body>
</html>
