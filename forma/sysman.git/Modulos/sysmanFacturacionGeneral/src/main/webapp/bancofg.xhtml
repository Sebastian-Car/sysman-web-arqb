<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TG_BANCOS}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{bancofgsControlador.cargarForma}" />
			<div id="FR1451" style="height: auto;">
				<h:form style="height: 100%;" id="FRFR1451">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div
						style="position: relative; height: 50px; padding-bottom: 80px;">
						<div class="acme">
							<h:outputLink value="#{request.contextPath}/menu.sysman"
								title="#{idm.TI_VOLVER}" style="padding-top: 10px;">
								<center>
									<p:graphicImage name="/images/menus/32/close.png" />
									<div>#{idm.TI_CERRAR}</div>
								</center>
							</h:outputLink>
						</div>
					</div>
					<div id="PL2799" class="
"
						style="position: relative; height: 60px;">
						<h:outputLabel id="LB37850" value="#{idm.TT_LB37850}"
							style="position: absolute; width:100%; height: 15px; left: 0px;   top: -15px; text-align: center; font-weight: bolder; font-style: normal;text-decoration:normal; font-family: tahoma; font-size: 15px; display:true; background:#FFFFFF; color:#000000; border:none;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL2800" class="
"
						style="position: relative; height: auto;">
						<p:remoteCommand name="refreshTab" update="TBFR1451"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR1451" var="reg"
							value="#{bancofgsControlador.listaInicial}" editable="true"
							widgetVar="TBFR1451" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{bancofgsControlador.permisos[4] }">
								<h:commandLink rendered="#{bancofgsControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR1451" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{bancofgsControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR1451" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header"> 
                            #{idm.TG_BANCOS}
                            </f:facet>
							<p:column headerText="#{idm.TG_CODIGO7}"
								filterBy="#{reg.campos['BANCO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="56" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['BANCO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_NOMBRE3}"
								filterBy="#{reg.campos['NOMBREBANCO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="360" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['NOMBREBANCO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#TITULOCONTINUO#"
								filterBy="#{reg.campos['COMPANIA']}" filterStyle="width:100%"
								filterMatchMode="contains" width="0" rendered="false"
								styleClass="
">
								<h:outputText value="#{reg.campos['COMPANIA']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_CUENTA_CONTABLE}"
								filterBy="#{reg.campos['IDCONTABLE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="222" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['IDCONTABLE']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_CUENTA_BANCARIA}"
								filterBy="#{reg.campos['CUENTANUMERO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="224"
								rendered="true" styleClass="
">
								<h:outputText value="#{reg.campos['CUENTANUMERO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#TITULOCONTINUO#"
								filterBy="#{reg.campos['BANCOASOBANCARIA']}"
								filterStyle="width:100%" filterMatchMode="contains" width="264"
								rendered="false" styleClass="
">
								<h:outputText value="#{reg.campos['BANCOASOBANCARIA']}"
									style="text-align:  left; float:  left" />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR1451" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR1451" widgetVar="blockCarga"
							trigger="TBFR1451,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
