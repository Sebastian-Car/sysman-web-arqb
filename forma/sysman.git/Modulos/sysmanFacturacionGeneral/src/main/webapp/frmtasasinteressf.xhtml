<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>

            }

								label="LCP70348" style="float: left;" class="cont-inst-element">

PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',

     return false;

								oncomplete="  mostarEditor();" />

											onclick="
		PF('dlg').show();
		"

												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>

								rendered="true" styleClass="
">

									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHA_INICIAL']}">
											<f:convertDateTime pattern="dd/MM/yyyy"

									<f:facet name="input">

											pattern="dd/MM/yyyy" id="CP70348" widgetVar="CP70348"
											value="#{reg.campos['FECHA_INICIAL']}" style="width:100%">

									</f:facet>
