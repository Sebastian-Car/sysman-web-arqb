<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR2220}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{confCertificadoDianControlador.cargarForma}" />
			<div id="FR2220" style="height: 504px;">
				<h:form style="height: 100%;" id="FRFR2220">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div
						style="position: relative; height: 50px; padding-bottom: 80px;">
						<div class="acme">
							<h:outputLink value="#{request.contextPath}/menu.sysman"
								title="#{idm.TI_VOLVER}" style="padding-top: 10px;">
								<center>
									<p:graphicImage name="/images/menus/32/close.png" />
									<div>#{idm.TI_CERRAR}</div>
								</center>
							</h:outputLink>
						</div>
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL4287" class="
"
						style="position: relative; height: 404px;">
						<p:remoteCommand name="refreshTab" update="TBFR2220"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR2220" var="reg"
							value="#{confCertificadoDianControlador.listaInicial}"
							editable="true" widgetVar="TBFR2220"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{confCertificadoDianControlador.permisos[4] }">
								<h:commandLink
									rendered="#{confCertificadoDianControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR2220" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{confCertificadoDianControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR2220" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR2220:alert,"
								listener="#{confCertificadoDianControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{confCertificadoDianControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header"> 
                            #{idm.TT_FR2220}
                            </f:facet>
							<p:column headerText="#{idm.TG_ID2}"
								filterBy="#{reg.campos['ID']}" filterStyle="width:100%"
								filterMatchMode="contains" width="20%" rendered="true"
								style="display:none;" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['ID']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP67850" styleClass="inputTab"
											value="#{reg.campos['ID']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP67851}"
								filterBy="#{reg.campos['RUTA_CERTIFICADO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="130%"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['RUTA_CERTIFICADO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP67851" styleClass="inputTab"
											value="#{reg.campos['RUTA_CERTIFICADO']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP67852}"
								filterBy="#{reg.campos['CONTRA_CERTIFICADO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="90%"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<p:password value="#{reg.campos['CONTRA_CERTIFICADO']}"
											redisplay="true" disabled="true"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP67852" styleClass="inputTab"
											value="#{reg.campos['CONTRA_CERTIFICADO']}"
											style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP67854}"
								filterBy="#{reg.campos['TES_ID']}" filterStyle="width:100%"
								filterMatchMode="contains" width="130%" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['TES_ID']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP67854" styleClass="inputTab"
											value="#{reg.campos['TES_ID']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP67853}"
								filterBy="#{reg.campos['RUTA_FACTURAS']}"
								filterStyle="width:100%" filterMatchMode="contains" width="100%"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['RUTA_FACTURAS']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP67853" styleClass="inputTab"
											value="#{reg.campos['RUTA_FACTURAS']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP67855}"
								filterBy="#{reg.campos['ID_SOFTWARE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="80%" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['ID_SOFTWARE']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP67855" styleClass="inputTab"
											value="#{reg.campos['ID_SOFTWARE']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP67856}"
								filterBy="#{reg.campos['PIN_SOFTWARE']}"
								filterStyle="width:100%" filterMatchMode="contains" width="80%"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<p:password value="#{reg.campos['PIN_SOFTWARE']}"
											redisplay="true" disabled="true"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP67856" styleClass="inputTab"
											value="#{reg.campos['PIN_SOFTWARE']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP71725}"
								filterBy="#{reg.campos['FECHA_VENCIMIENTO']}"
								filterStyle="width:100%" filterMatchMode="contains" width="80%"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FECHA_VENCIMIENTO']}">
											<f:convertDateTime pattern="dd/MM/yyyy"
												timeZone="#{sessionBean.timeZone}" />
										</h:outputText>
									</f:facet>
									<f:facet name="input">
										<p:calendar locale="es" navigator="true" mask="true"
											pattern="dd/MM/yyyy" id="CP71725" widgetVar="CP71725"
											value="#{reg.campos['FECHA_VENCIMIENTO']}" style="width:100%">
										</p:calendar>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP71726}"
								filterBy="#{reg.campos['DIAS_NOTIFICA']}"
								filterStyle="width:100%" filterMatchMode="contains" width="50%"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['DIAS_NOTIFICA']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP71726" styleClass="inputTab"
											value="#{reg.campos['DIAS_NOTIFICA']}" decimalPlaces="0"
											thousandSeparator="," decimalSeparator="."  converter="convertidorDouble"
											style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{confCertificadoDianControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR2220" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR2220" widgetVar="blockCarga"
							trigger="TBFR2220,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
