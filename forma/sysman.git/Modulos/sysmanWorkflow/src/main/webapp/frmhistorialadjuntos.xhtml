<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>

								</h:commandLink>
								<h:commandLink
									rendered="#{frmHistorialAdjuntosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">

								rendered="true" styleClass="
">

">

									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK1989"

											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP68818}"

								styleClass="

							trigger="TBFR2237,">

							<p:graphicImage name="/images/general/loading.gif" />
