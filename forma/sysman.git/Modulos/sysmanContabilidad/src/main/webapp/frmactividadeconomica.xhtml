<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR2501}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{frmActividadEconomicaControlador.cargarForma}" />
			<div id="FR2501" style="height: 650px;">
				<h:form style="height: 100%;" id="FRFR2501">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL4823" class="
"
						style="position: relative; height: 48px;">
						<h:outputLabel id="LB57833" value="#{idm.TT_LB57833}"
							style="position: absolute; width:574px; height: 28px; left: 100px;   top: 10px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{frmActividadEconomicaControlador.permisos[0]}"
						onHide="restaurarCampos(['CP72733'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_CODIGO7}:" id="LCP72733"
								class="cont-inst-element" />
							<pe:inputNumber id="CP72733" widgetVar="CP72733"
								value="#{frmActividadEconomicaControlador.registro.campos['COD_ACTIVIDAD']}"
								label="LCP72733" decimalPlaces="0" thousandSeparator=""
								decimalSeparator="" styleClass="inputTab" maxValue="99999999999"
								minValue="-99999999999" converter="convertidorDouble"
								style=" width: 95%;float: left;" class="cont-inst-element">
							</pe:inputNumber>
							<h:outputLabel value="#{idm.TG_DESCRIPCION7}:" id="LCP72734"
								class="cont-inst-element" />
							<p:inputText id="CP72734" widgetVar="CP72734"
								styleClass="inputTab"
								value="#{frmActividadEconomicaControlador.registro.campos['DESCRIPCION']}"
								label="LCP72734" style=" width: 95%; float: left;"
								class="cont-inst-element">
							</p:inputText>
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"
										style="padding:10px;" update="FRFR2501,"
										actionListener="#{frmActividadEconomicaControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"
										onclick="     if (!validarVaciosModal(['CP72733'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL4824" class="
"

							value="#{frmActividadEconomicaControlador.listaInicial}"
							editable="true" widgetVar="TBFR2501"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{frmActividadEconomicaControlador.permisos[4] }">
								<h:commandLink
									rendered="#{frmActividadEconomicaControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR2501" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{frmActividadEconomicaControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR2501" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR2501:alert,"
								listener="#{frmActividadEconomicaControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{frmActividadEconomicaControlador.cancelarEdicion}"
								oncomplete="refreshTab();  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{frmActividadEconomicaControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR2501}
                            </f:facet>
							<p:column headerText="#{idm.TG_CODIGO7}"
								filterBy="#{reg.campos['COD_ACTIVIDAD']}"
								filterStyle="width:100%" filterMatchMode="contains" width="15%"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['COD_ACTIVIDAD']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP72733" styleClass="inputTab"
											value="#{reg.campos['COD_ACTIVIDAD']}" decimalPlaces="0"
											thousandSeparator="" decimalSeparator=""
											maxValue="99999999999" minValue="-99999999999"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_DESCRIPCION7}"
								filterBy="#{reg.campos['DESCRIPCION']}" filterStyle="width:100%"
								filterMatchMode="contains" width="85%" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['DESCRIPCION']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP72734" styleClass="inputTab"
											value="#{reg.campos['DESCRIPCION']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{frmActividadEconomicaControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{frmActividadEconomicaControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{frmActividadEconomicaControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR2501:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR2501" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR2501" widgetVar="blockCarga"
							trigger="TBFR2501,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
