<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModal.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TG_REFLEJAR_SALDOS}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal" style="height: auto">
			<div id="panelModal" style="position: relative; height: auto">
				<h:form id="FR710_nuevo"
					style="position: relative; width: 100%; height: 200px; margin: 0px">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:growl id="message" showDetail="true" escape="false" />
					<p:confirmDialog global="true" showEffect="fade" id="confFR710"
						widgetVar="confFR710">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<p:commandButton id="BT1352" widgetVar="BT1352"
						onclick="if (!validarVaciosViewModal(['CB2483'])) {
                                PF('alert').renderMessage({'summary': '#{idm.TI_TT_ERROR_VALIDACION}',
                                    'detail': '#{idm.TI_MS_ERROR_VALIDACION}',
                                    'severity': 'error'});
                                return false;
                            }else{
PrimeFaces.monitorDownload(mostrarEspera, ocultarEspera);
}"
						update="@([id$=alert])" tabindex="1" value="#{idm.TG_INICIAR}"
						actionListener="#{reflejarsaldosControlador.oprimirAceptar}"
						style="position: absolute; width:96px; height: 34px; left: 92px;   top: 121px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:block;  color:#0000FF; border:#000000  solid  1px ;">
					</p:commandButton>
					<h:outputLabel id="LB18222" value="#{idm.TG_ANIO4}"
						style="position: absolute; width:38px; height: 20px; left: 87px;   top: 73px; text-align: right; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					<h:outputLabel id="LB18221" value="#{idm.TT_LB18221}"
						style="position: absolute; width:257px; height: 25px; left: 25px;   top: 10px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 16px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					<p:selectOneMenu filter="true" editable="false" effect="fade"
						id="CB2483" widgetVar="CB2483"
						value="#{reflejarsaldosControlador.anio}" tabindex="2"
						style="position: absolute; width:72px; height: 20px; left: 135px;   top: 73px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  solid  1px ;">
						<f:selectItem />
						<f:selectItems value="#{reflejarsaldosControlador.listaAno}"
							var="regc" itemLabel="#{regc.campos['ANO']}"
							itemValue="#{regc.campos['ANO']}" />
					</p:selectOneMenu>
					<p:blockUI block="FR710_nuevo" widgetVar="blockNuevo"
						trigger="BT1352">
#{idm.TI_CARGANDO}<br />
						<p:graphicImage name="/images/general/loading.gif" />
					</p:blockUI>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
