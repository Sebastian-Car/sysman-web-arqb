<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModalDatos.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
              asignarFileUnico();
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR944}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal">
			<f:event type="preRenderView"
				listener="#{anexosestudiospreviosControlador.cargarForma}" />
			<div id="FR944" style="height: 560px;">
				<h:form style="height: 100%;" id="FRFR944">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL1854" class="
"
						style="position: relative; height: 87px;">
						<p:fileUpload id="LA16" widgetVar="LA16" styleClass="funico"
							label="#{idm.EB_LA16}"
							invalidSizeMessage="#{idm.LA_TAMANO_NO_VALIDO}"
							invalidFileMessage="#{idm.LA_ARCHIVO_NO_VALIDO}" mode="advanced"
							auto="true"
							accept="pdf,Excel.xls,aplication/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
							fileUploadListener="#{anexosestudiospreviosControlador.cargarArchivolector}"
							style="position: absolute; width:150px; height: 30px; left: 417px;   top: 55px; text-align: left; font-weight: none; font-style: none; font-family: Tahoma; font-size: 13px; display:true; background:#FFFFFF; color:#000000;"
							rendered="#{anexosestudiospreviosControlador.esCreador ? 'false' : 'true'}"
							update="@form">
						</p:fileUpload>
						<p:inputText id="CP27296" widgetVar="CP27296"
							styleClass="inputTab"
							value="#{anexosestudiospreviosControlador.codigoEstudio}"
							readonly="true" tabindex="1" rendered="true"
							style="position: absolute; width:121px; height: 20px; text-decoration:none; left: 125px;   top: 59px; text-align: right; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  solid  1px ; padding-bottom: 0; padding-left: 2px; padding-top: 0;">
						</p:inputText>
						<h:outputLabel id="LB22111" value="#{idm.TG_CODIGO8}"
							style="position: absolute; width:115px; height: 18px; left: 0px;   top: 59px; text-align: right; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
						<h:outputLabel id="LB22110"
							value="#{anexosestudiospreviosControlador.titulo}"
							style="position: absolute; width:279px; height: 29px; left: 150px;   top: 14px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 16px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL1855" class="scrollModalContinuo"
						style="position: relative; height: 469px;">
						<p:remoteCommand name="refreshTab" update="TBFR944"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR944" var="reg"
							value="#{anexosestudiospreviosControlador.listaInicial}"
							editable="true" widgetVar="TBFR944"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{anexosestudiospreviosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{anexosestudiospreviosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR944" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{anexosestudiospreviosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR944" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme">
										<p:commandLink
											action="#{anexosestudiospreviosControlador.cerrarFormulario}"
											title="#{idm.TI_CERRAR_FORMULARIO}"
											style="padding-top: 10px;" id="btCerrar">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</p:commandLink>
									</h:panelGroup>
								</div>	 
                            #{idm.TT_FR944}
                            </f:facet>
							<p:column headerText="#{idm.TC_CP27297}"
								filterBy="#{reg.campos['ARCHIVO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="80%" rendered="true"
								styleClass="
">
								<h:outputText value="#{reg.campos['ARCHIVO']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_DESCARGAR}" exportable="false"
								width="20%" rendered="true">
								<p:commandButton id="BT1760" widgetVar="BT1760" rendered="true"
									ajax="false" tabindex="2" value="#{idm.TG_DESCARGAR}"
									actionListener="#{anexosestudiospreviosControlador.oprimirdescargar(reg,rowNun)}"
									style="width:100%; height:28px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px;   color:#0000FF; border:#000000  solid  1px ;">
									<p:fileDownload
										value="#{anexosestudiospreviosControlador.archivoDescarga}" />
								</p:commandButton>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{anexosestudiospreviosControlador.permisos[1] and !anexosestudiospreviosControlador.esCreador}">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{anexosestudiospreviosControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR944:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR944" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR944" widgetVar="blockCarga"
							trigger="TBFR944,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
