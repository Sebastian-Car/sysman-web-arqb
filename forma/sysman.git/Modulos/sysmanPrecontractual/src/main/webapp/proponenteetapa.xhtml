							<p:column headerText="#{idm.TC_BT1164}" exportable="false"

								<p:commandButton id="BT1164" widgetVar="BT1164"

									rendered="true" tabindex="10" value="#{idm.TT_BT1164}"
									actionListener="#{proponenteetapasControlador.oprimirCotizaInventario(reg,rowNun)}"

							<p:column width="30" exportable="false"

						</p:dataTable>

						<p:blockUI block="FRFR588" widgetVar="blockCarga"
							trigger="TBFR588,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
