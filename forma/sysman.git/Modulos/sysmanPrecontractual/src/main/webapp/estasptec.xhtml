<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"

            }

					</div>
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{estasptecsControlador.permisos[0]}"

						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_CODIGO7}:" id="LCP12173"
								class="cont-inst-element" />

								value="#{estasptecsControlador.registro.campos['COD_T_ASPTEC']}"

								decimalSeparator="." styleClass="inputTab" maxValue="99999"

										onclick="     if (!validarVaciosModal(['CP12172','CP12173'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',

                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />

										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{estasptecsControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR387" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>

								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{estasptecsControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />

								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{estasptecsControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR387}

								style="
" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['COD_T_ASPTEC']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP12173" styleClass="inputTab"
											value="#{reg.campos['COD_T_ASPTEC']}" decimalPlaces="0"
											thousandSeparator="," decimalSeparator="." maxValue="99999"
											minValue="-99999" converter="convertidorDouble"
											style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_DESCRIPCION7}"
								filterBy="#{reg.campos['NOMBRE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="90%" style="
"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBRE']}"
											style="text-align:  left; float:  left" />

									<f:facet name="input">
										<p:inputText id="CP12172" styleClass="inputTab"

											maxlength="255">
										</p:inputText>
									</f:facet>

										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR387" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />

							<p:graphicImage name="/images/general/loading.gif" />
