<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR514}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{frmmodalidadprecontratosControlador.cargarForma}" />
			<div id="FR514" style="height: 700px;">
				<h:form style="height: 100%;" id="FRFR514">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL1104" class="
"
						style="position: relative; height: 97px;">
						<p:remoteCommand name="refreshTab" update="TBFR514"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR514" var="reg"
							value="#{frmmodalidadprecontratosControlador.listaInicial}"
							editable="true" widgetVar="TBFR514"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{frmmodalidadprecontratosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{frmmodalidadprecontratosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR514" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{frmmodalidadprecontratosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR514" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR514:alert,"
								listener="#{frmmodalidadprecontratosControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{frmmodalidadprecontratosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink title="Volver al menú"
											style="padding-top: 10px;" value="javascript:void(0)"
											onclick="rcCerrar();">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
									<p:remoteCommand name="rcCerrar"
										actionListener="#{frmmodalidadprecontratosControlador.ejecutarrcCerrar}" />
								</div>	 
                            #{idm.TT_FR514}
                            </f:facet>
							<p:column headerText="#{idm.TG_MODALIDAD2}"
								filterBy="#{reg.campos['MODALIDAD']}" filterStyle="width:100%"
								filterMatchMode="contains" width="25%" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['MODALIDAD']}"
											style="text-align:  center; float:  center" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP16058" styleClass="inputTab"
											value="#{reg.campos['MODALIDAD']}" style="width:100%"
											readonly="true">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP16059}"
								filterBy="#{reg.campos['FUNDAMENTACION']}"
								filterStyle="width:100%" filterMatchMode="contains" width="75%"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FUNDAMENTACION']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP16059" styleClass="inputTab"
											value="#{reg.campos['FUNDAMENTACION']}" style="width:100%"
											maxlength="4000">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{frmmodalidadprecontratosControlador.permisos[2] and frmmodalidadprecontratosControlador.esCreador}">
								<p:rowEditor />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR514" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR514" widgetVar="blockCarga"
							trigger="TBFR514,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
