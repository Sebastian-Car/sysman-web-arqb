<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="script">
		<script>
            function loadDetalle() {
            }
            window.onload = loadDetalle;
        </script>
	</ui:define>
	<ui:define name="titulo">
		<title>#{idm.TT_FR727}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{bancosdepagosControlador.cargarForma}" />
			<div id="FR727" style="height: 650px;">
				<h:form style="height: 100%;" id="FRFR727">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{bancosdepagosControlador.permisos[0]}"
						onHide="restaurarCampos(['CP22302','CP22303'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_CODIGO7}:" id="LCP22303" />
							<p:inputText id="CP22303" widgetVar="CP22303"
								styleClass="inputTab"
								value="#{bancosdepagosControlador.registro.campos['CODIGOBANCO']}"
								label="LCP22303" style=" width: 95%; float: left;" maxlength="3">
							</p:inputText>
							<h:outputLabel value="#{idm.TC_CP22302}:" id="LCP22302" />
							<p:inputText id="CP22302" widgetVar="CP22302"
								styleClass="inputTab"
								value="#{bancosdepagosControlador.registro.campos['NOMBREBANCO']}"
								label="LCP22302" style=" width: 95%; float: left;">
							</p:inputText>
							<h:outputLabel value="#{idm.TC_CP22301}:" id="LCP22301" />
							<p:inputText id="CP22301" widgetVar="CP22301"
								styleClass="inputTab"
								value="#{bancosdepagosControlador.registro.campos['CODIGOCONTABLE']}"
								label="LCP22301" style=" width: 95%; float: left;">
							</p:inputText>
							<h:outputLabel value="#{idm.TC_CK577}:" id="LCK577"
								style="display:block" />
							<p:selectBooleanCheckbox id="CK577" widgetVar="CK577"
								value="#{bancosdepagosControlador.registro.campos['ESCAJA']}"
								label="LCK577" style="min-width: 80px; display:block">
							</p:selectBooleanCheckbox>
							<h:outputLabel value="#{idm.TC_CP22300}:" id="LCP22300" />
							<p:inputText id="CP22300" widgetVar="CP22300"
								styleClass="inputTab"
								value="#{bancosdepagosControlador.registro.campos['COD_ASBC']}"
								label="LCP22300" style=" width: 95%; float: left;" maxlength="3">
							</p:inputText>
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"
										style="padding:10px;" update="FRFR727,"
										actionListener="#{bancosdepagosControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"
										onclick="     if (!validarVaciosModal(['CP22302','CP22303'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL1499" class="
"
						style="position: relative; height: 25px;">
						<p:remoteCommand name="refreshTab" update="TBFR727"
							oncomplete="PF('blockGuardar').hide();" />
						<p:dataTable id="TBFR727" var="reg"
							value="#{bancosdepagosControlador.listaInicial}" editable="true"
							widgetVar="TBFR727" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{bancosdepagosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{bancosdepagosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR727" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{bancosdepagosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR727" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR727:alert,"
								listener="#{bancosdepagosControlador.editar}"
								oncomplete="refreshTab(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{bancosdepagosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{bancosdepagosControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR727}
                            </f:facet>
							<p:column headerText="#{idm.TG_CODIGO7}"
								filterBy="#{reg.campos['CODIGOBANCO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="71" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGOBANCO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP22303" styleClass="inputTab"
											value="#{reg.campos['CODIGOBANCO']}" style="width:100%"
											maxlength="3">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP22302}"
								filterBy="#{reg.campos['NOMBREBANCO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="300" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NOMBREBANCO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP22302" styleClass="inputTab"
											value="#{reg.campos['NOMBREBANCO']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP22301}"
								filterBy="#{reg.campos['CODIGOCONTABLE']}"
								filterStyle="width:100%" filterMatchMode="contains" width="131"
								rendered="true" styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGOCONTABLE']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP22301" styleClass="inputTab"
											value="#{reg.campos['CODIGOCONTABLE']}" style="width:100%">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CK577}"
								filterBy="#{reg.campos['ESCAJA']}" filterMatchMode="exact"
								width="55" rendered="true" styleClass="
">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR727').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText
											value="#{reg.campos['ESCAJA']=='false'? 'No':'Si'}" />
									</f:facet>
									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK577"
												value="#{reg.campos['ESCAJA']}">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP22300}"
								filterBy="#{reg.campos['COD_ASBC']}" filterStyle="width:100%"
								filterMatchMode="contains" width="122" rendered="true"
								styleClass="
">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['COD_ASBC']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP22300" styleClass="inputTab"
											value="#{reg.campos['COD_ASBC']}" style="width:100%"
											maxlength="3">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{bancosdepagosControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{bancosdepagosControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{bancosdepagosControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR727:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR727" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR727" widgetVar="blockCarga"
							trigger="TBFR727,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
