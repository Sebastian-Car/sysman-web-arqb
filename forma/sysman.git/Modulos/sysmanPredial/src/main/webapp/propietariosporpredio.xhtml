<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"

	xmlns:f="http://java.sun.com/jsf/core"

	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"

	<ui:define name="titulo">

							value="#{propietariosporprediosControlador.direccionPredio}"

						</p:inputText>

							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{propietariosporprediosControlador.permisos[4] }">

									title="#{idm.TI_VER_EXCEL}">

									<p:dataExporter type="xls" target="TBFR860" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{propietariosporprediosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR860" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>

											onclick="rcCerrar();">

												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
									<p:remoteCommand name="rcCerrar"
										actionListener="#{propietariosporprediosControlador.ejecutarrcCerrar}" />

                            #{idm.TG_COPROPIETARIOS}

								rendered="true">
								<h:outputText value="#{reg.campos['NUMERO_ORDEN']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_NOMBRE3}"
								filterBy="#{reg.campos['NOMBRE']}" filterStyle="width:100%"
								filterMatchMode="contains" width="292" rendered="true">
								<h:outputText value="#{reg.campos['NOMBRE']}"
									style="text-align:  left; float:  left" />
							</p:column>
							<p:column headerText="#{idm.TG_DIRECCION_CORRESPONDENCIA}"

								rendered="true">

									style="text-align:  left; float:  left" />

								filterMatchMode="contains" width="41" rendered="true">
								<h:outputText value="#{reg.campos['TIPO_NIT']}"

							</p:column>
							<p:column headerText="#{idm.TG_NITCC}"
								filterBy="#{reg.campos['NIT']}" filterStyle="width:100%"
								filterMatchMode="contains" width="114" rendered="true">
								<h:outputText value="#{reg.campos['NIT']}"
									style="text-align:  left; float:  left" />
							</p:column>

							<p:graphicImage name="/images/general/loading.gif" />

						<p:blockUI block="FRFR860" widgetVar="blockCarga"
							trigger="TBFR860,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
