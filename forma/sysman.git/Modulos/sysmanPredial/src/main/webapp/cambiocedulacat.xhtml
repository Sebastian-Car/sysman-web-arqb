<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	template="/templateModal.xhtml" xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TG_CAMBIO_DE_CEDULA_CATASTRAL}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radiusModal" style="height: auto">
			<div id="panelModal" style="position: relative; height: auto">
				<h:form id="FR788_nuevo"
					style="position: relative; width: 100%; height: 300px; margin: 0px">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<p:growl id="message" showDetail="true" escape="false" />
					<p:confirmDialog global="true" showEffect="fade" id="confFR788"
						widgetVar="confFR788">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<p:dialog dynamic="true" closable="false" closeOnEscape="false"
						header="#{cambiocedulacatControlador.tituloMensajes}" id="DG103"
						widgetVar="DG103" resizable="false" modal="true" width="400"
						visible="#{cambiocedulacatControlador.visibleDialogo}">
						<h:outputLabel
							value="#{cambiocedulacatControlador.etiquetaMensajes}"
							style="width: 100%;" escape="false" />
						<h:panelGrid columns="2" cellpadding="2" width="100%">
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TG_ACEPTAR}"
										style="padding:10px; width: 48%;"
										update="@form,@([id$=alert])" ajax="false"
										oncomplete="if(false){ PF('DG103').hide(); PF('blockNuevo').hide();}"
										onclick="  if(false){ PF('blockNuevo').show(); }else{    PF('DG103').hide(); }  "
										actionListener="#{cambiocedulacatControlador.aceptardialogo1}">
										<p:fileDownload
											value="#{cambiocedulacatControlador.archivoDescarga}" />
									</p:commandButton>
									<p:commandButton value="#{idm.TG_CANCELAR}"
										style="padding:10px; width: 48%;"
										update="@form,@([id$=alert])" ajax="false"
										oncomplete="if(false){ PF('DG103').hide(); PF('blockNuevo').hide();}"
										onclick=" if(false){ PF('blockNuevo').show(); }else{    PF('DG103').hide(); }  "
										actionListener="#{cambiocedulacatControlador.cancelardialogo1}">
										<p:fileDownload
											value="#{cambiocedulacatControlador.archivoDescarga}" />
									</p:commandButton>
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:commandButton id="BT1466" widgetVar="BT1466"
						onclick="if (!validarVaciosViewModal(['CP23060', 'CP23061'])) {
                                PF('alert').renderMessage({'summary': '#{idm.TI_TT_ERROR_VALIDACION}',
                                    'detail': '#{idm.TI_MS_ERROR_VALIDACION}',
                                    'severity': 'error'});
                                return false;
                            }"
						update="@([id$=DG103]),@([id$=alert])" ajax="false" tabindex="3"
						value="#{idm.TG_INICIAR_PROCESO}"
						actionListener="#{cambiocedulacatControlador.oprimirCmdIniciar}"
						style="position: absolute; width:135px; height: 28px; left: 135px;   top: 230px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:block;  color:#0000FF; border:#000000  solid  1px ;">
						<p:fileDownload
							value="#{cambiocedulacatControlador.archivoDescarga}" />
					</p:commandButton>
					<h:outputLabel id="LB19043" value="#{idm.TT_LB19043}"
						style="position: absolute; width:412px; height: 29px; left: 17px;   top: 13px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					<h:outputLabel id="LB19044" value="#{idm.TT_LB19044}"
						style="position: absolute; width:414px; height: 134px; left: 17px;   top: 59px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#FF0000; border:#000000  none  1px ;" />
					<p:inputText id="CP23061" widgetVar="CP23061" styleClass="inputTab"
						value="#{cambiocedulacatControlador.predioNuevo}" tabindex="2"
						style="position: absolute; width:228px; height: 24px; text-decoration:none; left: 201px;   top: 180px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  solid  1px ; padding-bottom: 0; padding-left: 2px; padding-top: 0;">
					</p:inputText>
					<h:outputLabel id="LB19046" value="#{idm.TT_LB19046}"
						style="position: absolute; width:177px; height: 24px; left: 14px;   top: 180px; text-align: right; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px;" />
					<p:inputText id="CP23060" widgetVar="CP23060" styleClass="inputTab"
						value="#{cambiocedulacatControlador.predioAnterior}" tabindex="1"
						style="position: absolute; width:228px; height: 24px; text-decoration:none; left: 201px;   top: 149px; text-align: left; font-weight: normal; font-style: normal; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  solid  1px ; padding-bottom: 0; padding-left: 2px; padding-top: 0;">
					</p:inputText>
					<h:outputLabel id="LB19045" value="#{idm.TT_LB19045}"
						style="position: absolute; width:177px; height: 24px; left: 14px;   top: 149px; text-align: right; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 13px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px;" />
					<p:blockUI block="FR788_nuevo" widgetVar="blockNuevo"
						trigger="BT1466">
#{idm.TI_CARGANDO}<br />
						<p:graphicImage name="/images/general/loading.gif" />
					</p:blockUI>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
