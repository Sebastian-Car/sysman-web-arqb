<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TT_FR765}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{frmincrementosautoavaluosControlador.cargarForma}" />
			<div id="FR765" style="height: 645px;">
				<h:form style="height: 100%;" id="FRFR765">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL1559" style="position: relative; height: 53px;">
						<p:commandButton id="BT1435" widgetVar="BT1435"
							update="FRFR765:alert,@form" tabindex="2"
							value="#{idm.TT_BT1435}"
							actionListener="#{frmincrementosautoavaluosControlador.oprimirbtngenerar}"
							style="position: absolute; width:120px; height: 39px; left: 443px;   top: 5px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:block;  color:#0000FF; border:#AAAAAA  solid  1px ;">
						</p:commandButton>
						<p:commandButton id="BT1434" widgetVar="BT1434"
							update="FRFR765:alert,@form" tabindex="1"
							value="#{idm.TG_ACTUALIZAR}"
							actionListener="#{frmincrementosautoavaluosControlador.oprimirbtnactualizar}"
							style="position: absolute; width:120px; height: 39px; left: 251px;   top: 5px; text-align: left; font-weight: bold; font-style: normal; font-family: Tahoma; font-size: 13px; display:block;  color:#0000FF; border:#AAAAAA  solid  1px ;">
						</p:commandButton>
					</div>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL1560" style="position: relative; height: 25px;">
						<p:remoteCommand name="refreshTab" update="TBFR765" />
						<p:dataTable id="TBFR765" var="reg"
							value="#{frmincrementosautoavaluosControlador.listaInicial}"
							editable="true" widgetVar="TBFR765"
							emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{frmincrementosautoavaluosControlador.permisos[4] }">
								<h:commandLink
									rendered="#{frmincrementosautoavaluosControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR765" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink
									rendered="#{frmincrementosautoavaluosControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR765" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR765:alert,"
								listener="#{frmincrementosautoavaluosControlador.editar}"
								oncomplete="refreshTab(); PF('blockGuardar').hide(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{frmincrementosautoavaluosControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR765}
                            </f:facet>
							<p:column headerText="#{idm.TG_CODIGO7}"
								filterBy="#{reg.campos['CODIGO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="20%" rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['CODIGO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP22831" styleClass="inputTab"
											value="#{reg.campos['CODIGO']}" style="width:100%"
											readonly="true" maxlength="50">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_ANIO3}"
								filterBy="#{reg.campos['ANO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="10%" rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['ANO']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP22832" styleClass="inputTab"
											readonly="true" value="#{reg.campos['ANO']}"
											decimalPlaces="0" thousandSeparator="" decimalSeparator=""
											maxValue="9999" minValue="-9999"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP22833}"
								filterBy="#{reg.campos['AUTOAVAL']}" filterStyle="width:100%"
								filterMatchMode="contains" width="15%" rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['AUTOAVAL']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP22833" styleClass="inputTab"
											value="#{reg.campos['AUTOAVAL']}" style="width:100%"
											readonly="true" maxlength="5">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_AVALUO4}"
								filterBy="#{reg.campos['AVALUO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="15%" rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['AVALUO']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  right; float:  right" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP22834" styleClass="inputTab"
											readonly="true" value="#{reg.campos['AVALUO']}"
											decimalPlaces="2" thousandSeparator="," decimalSeparator="."
											maxValue="999999999999999999.99"
											minValue="-999999999999999999.99"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TG_AVALUO_ANTERIOR}"
								filterBy="#{reg.campos['AVALUO_ANT']}" filterStyle="width:100%"
								filterMatchMode="contains" width="15%" rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['AVALUO_ANT']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  right; float:  right" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP22835" styleClass="inputTab"
											readonly="true" value="#{reg.campos['AVALUO_ANT']}"
											decimalPlaces="2" thousandSeparator="," decimalSeparator="."
											maxValue="999999999999999999.99"
											minValue="-999999999999999999.99"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP22836}"
								filterBy="#{reg.campos['NUM_RADICACION']}"
								filterStyle="width:100%" filterMatchMode="contains" width="15%"
								rendered="true">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['NUM_RADICACION']}"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<p:inputText id="CP22836" styleClass="inputTab"
											value="#{reg.campos['NUM_RADICACION']}" style="width:100%"
											readonly="true" maxlength="10">
										</p:inputText>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CK630}"
								filterBy="#{reg.campos['INCRE_AUTOAVALUO']}"
								filterMatchMode="exact" width="10%" rendered="true">
								<f:facet name="filter">
									<p:selectOneMenu onchange="PF('TBFR765').filter()">
										<f:selectItem itemLabel="#{idm.TI_TODOS}" itemValue="" />
										<f:selectItem itemLabel="#{idm.TI_SI}" itemValue="true" />
										<f:selectItem itemLabel="#{idm.TI_NO}" itemValue="false" />
									</p:selectOneMenu>
								</f:facet>
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText
											value="#{reg.campos['INCRE_AUTOAVALUO']=='false'? 'No':'Si'}" />
									</f:facet>
									<f:facet name="input">
										<center>
											<h:selectBooleanCheckbox id="CK630"
												value="#{reg.campos['INCRE_AUTOAVALUO']}">
											</h:selectBooleanCheckbox>
										</center>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{frmincrementosautoavaluosControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR765" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR765" widgetVar="blockCarga"
							trigger="TBFR765,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
