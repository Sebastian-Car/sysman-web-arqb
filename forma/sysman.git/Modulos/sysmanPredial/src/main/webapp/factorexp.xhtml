<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:pt="http://java.sun.com/jsf/passthrough"
	xmlns:ui="http://java.sun.com/jsf/facelets" template="/template.xhtml"
	xmlns:p="http://primefaces.org/ui"
	xmlns:pe="http://primefaces.org/ui/extensions">
	<ui:define name="titulo">
		<title>#{idm.TT_FR768}</title>
	</ui:define>
	<ui:define name="contenido">
		<section class="radius">
			<f:event type="preRenderView"
				listener="#{factorexpsControlador.cargarForma}" />
			<div id="FR768" style="height: 700px;">
				<h:form style="height: 100%;" id="FRFR768">
					<p:growl id="alert" showDetail="true" sticky="false"
						widgetVar="alert" life="5000" autoUpdate="false" escape="false" />
					<div id="PL1563" style="position: relative; height: 58px;">
						<h:outputLabel id="LB18874" value="#{idm.TT_LB18874}"
							style="position: absolute; width:365px; height: 24px; left: 450px;   top: 24px; text-align: center; font-weight: bold; font-style: normal;text-decoration:none; font-family: Tahoma; font-size: 15px; display:block; background:#FFFFFF; color:#000000; border:#000000  none  1px ;" />
					</div>
					<p:dialog dynamic="true" header="#{idm.TI_NUEVO_REGISTRO}" id="dlg"
						widgetVar="dlg" resizable="false" modal="true"
						rendered="#{factorexpsControlador.permisos[0]}"
						onHide="restaurarCampos(['CB2586','CP22842','CP22843'])">
						<h:panelGrid columns="2" cellpadding="2">
							<h:outputLabel value="#{idm.TG_ANIO3}:" id="LCB2586" />
							<p:selectOneMenu filter="true" effect="fade" id="CB2586"
								editable="false" widgetVar="CB2586"
								value="#{factorexpsControlador.registro.campos['ANO']}"
								onchange="" style="">
								<f:selectItem />
								<f:selectItems value="#{factorexpsControlador.listaAno}"
									var="regc" itemLabel="#{regc.campos['NUMERO']}"
									itemValue="#{regc.campos['NUMERO']}" />
							</p:selectOneMenu>
							<h:outputLabel value="#{idm.TC_CP22842}:" id="LCP22842" />
							<pe:inputNumber id="CP22842" widgetVar="CP22842"
								value="#{factorexpsControlador.registro.campos['FACTOR']}"
								label="LCP22842" decimalPlaces="2" thousandSeparator=","
								decimalSeparator="." styleClass="inputTab"
								maxValue="99999999999999999999999.99"
								minValue="-99999999999999999999999.99"
								converter="convertidorDouble" style=" width: 95%;float: left;">
							</pe:inputNumber>
							<h:outputLabel value="#{idm.TC_CP22843}:" id="LCP22843" />
							<pe:inputNumber id="CP22843" widgetVar="CP22843"
								value="#{factorexpsControlador.registro.campos['INCREMENTO']}"
								label="LCP22843" decimalPlaces="2" thousandSeparator=","
								decimalSeparator="." styleClass="inputTab"
								maxValue="99999999999999999999999.99"
								minValue="-99999999999999999999999.99"
								converter="convertidorDouble" style=" width: 95%;float: left;">
							</pe:inputNumber>
							<f:facet name="footer">
								<center>
									<p:commandButton value="#{idm.TI_GUARDAR}"
										style="padding:10px;" update="FRFR768,"
										actionListener="#{factorexpsControlador.agregarRegistroNuevo}"
										oncomplete="PF('dlg').hide(); PF('blockGuardar').hide();"
										onclick="     if (!validarVaciosModal(['CB2586','CP22842','CP22843'])) {
PF('alert').renderMessage({'summary':'#{idm.TI_TT_ERROR_VALIDACION}',
                             'detail':'#{idm.TI_MS_ERROR_VALIDACION}',
                             'severity':'error'});
     return false;
         } PF('blockGuardar').show();" />
									<p:button value="#{idm.TG_CANCELAR}" style="padding:10px;"
										href="#" onclick="PF('dlg').hide();" />
								</center>
							</f:facet>
						</h:panelGrid>
					</p:dialog>
					<p:confirmDialog global="true" showEffect="fade">
						<p:commandButton value="#{idm.TI_SI}" type="button"
							styleClass="ui-confirmdialog-yes" icon="ui-icon-check" />
						<p:commandButton value="#{idm.TI_NO}" type="button"
							styleClass="ui-confirmdialog-no" icon="ui-icon-close" />
					</p:confirmDialog>
					<div id="PL1564" style="position: relative; height: 20px;">
						<p:remoteCommand name="refreshTab" update="TBFR768" />
						<p:dataTable id="TBFR768" var="reg"
							value="#{factorexpsControlador.listaInicial}" editable="true"
							widgetVar="TBFR768" emptyMessage="#{idm.TI_EMPTY_MESSAGE}"
							paginatorTemplate="{CurrentPageReport}  {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {Exporters}"
							currentPageReportTemplate="#{idm.TI_REGISTROS}: {startRecord} - {endRecord} de {totalRecords}, #{idm.TI_PAGINA}: {currentPage}/{totalPages}"
							rows="10" rowIndexVar="rowNun" paginator="true" scrollable="true"
							scrollWidth="100%" lazy="true">
							<f:facet name="{Exporters}"
								rendered="#{factorexpsControlador.permisos[4] }">
								<h:commandLink rendered="#{factorexpsControlador.permisos[4] }"
									title="#{idm.TI_VER_EXCEL}">
									<p:graphicImage name="/images/general/excel.png" width="24" />
									<p:dataExporter type="xls" target="TBFR768" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
								<h:commandLink rendered="#{factorexpsControlador.permisos[4] }"
									title="#{idm.TI_VER_PDF}">
									<p:graphicImage name="/images/general/pdf.png" width="24" />
									<p:dataExporter type="pdf" target="TBFR768" fileName="Datos"
										encoding="ISO-8859-1" />
								</h:commandLink>
							</f:facet>
							<p:ajax event="rowEdit" update=":FRFR768:alert,"
								listener="#{factorexpsControlador.editar}"
								oncomplete="refreshTab(); PF('blockGuardar').hide(); mostarEditor();"
								onstart="PF('blockGuardar').show();" />
							<p:ajax event="rowEditCancel"
								listener="#{factorexpsControlador.cancelarEdicion}"
								oncomplete="  mostarEditor();" />
							<p:ajax event="rowEditInit" oncomplete="ocultarEditor(); " />
							<f:facet name="header">
								<div style="position: relative; height: 50px">
									<h:panelGroup class="acme"
										rendered="#{factorexpsControlador.permisos[0]  }">
										<h:outputLink value="javascript:void(0)"
											onclick="
		PF('dlg').show();
		"
											title="#{idm.TI_NUEVO_REGISTRO}" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/add.png" />
												<div>#{idm.TI_NUEVO}</div>
											</center>
										</h:outputLink>
									</h:panelGroup>
									<div class="acme">
										<h:outputLink value="#{request.contextPath}/menu.sysman"
											title="Volver al menú" style="padding-top: 10px;">
											<center>
												<p:graphicImage name="/images/menus/32/close.png" />
												<div>#{idm.TI_CERRAR}</div>
											</center>
										</h:outputLink>
									</div>
								</div>	 
                            #{idm.TT_FR768}
                            </f:facet>
							<p:column headerText="#{idm.TG_ANIO3}"
								filterBy="#{reg.campos['ANO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="10%" rendered="true" style="">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['ANO']}" />
									</f:facet>
									<f:facet name="input">
										<h:selectOneMenu id="CB2586" value="#{reg.campos['ANO']}"
											style="width:100%" onchange="">
											<f:selectItem />
											<f:selectItems value="#{factorexpsControlador.listaAno}"
												var="regc" itemLabel="#{regc.campos['NUMERO']}"
												itemValue="#{regc.campos['NUMERO']}" />
										</h:selectOneMenu>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP22842}"
								filterBy="#{reg.campos['FACTOR']}" filterStyle="width:100%"
								filterMatchMode="contains" width="40%" rendered="true" style="">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['FACTOR']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP22842" styleClass="inputTab"
											value="#{reg.campos['FACTOR']}" decimalPlaces="2"
											thousandSeparator="," decimalSeparator="."
											maxValue="99999999999999999999999.99"
											minValue="-99999999999999999999999.99"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column headerText="#{idm.TC_CP22843}"
								filterBy="#{reg.campos['INCREMENTO']}" filterStyle="width:100%"
								filterMatchMode="contains" width="40%" rendered="true" style="">
								<p:cellEditor>
									<f:facet name="output">
										<h:outputText value="#{reg.campos['INCREMENTO']}"
											converter="convertidorDoubleContinuo"
											style="text-align:  left; float:  left" />
									</f:facet>
									<f:facet name="input">
										<pe:inputNumber id="CP22843" styleClass="inputTab"
											value="#{reg.campos['INCREMENTO']}" decimalPlaces="2"
											thousandSeparator="," decimalSeparator="."
											maxValue="99999999999999999999999.99"
											minValue="-99999999999999999999999.99"
											converter="convertidorDouble" style="width: 95%">
										</pe:inputNumber>
									</f:facet>
								</p:cellEditor>
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{factorexpsControlador.permisos[2] }">
								<p:rowEditor />
							</p:column>
							<p:column width="30" exportable="false"
								rendered="#{factorexpsControlador.permisos[1] }">
								<p:commandButton icon="ui-icon-trash"
									title="#{idm.TI_ELIMINAR_REGISTRO}"
									onclick="PF('blockGuardar').show()"
									action="#{factorexpsControlador.eliminarReg(reg)}"
									oncomplete="refreshTab(); PF('blockGuardar').hide();"
									update=":FRFR768:alert,"
									style="background: none; border: none;  width: 10px; height: 13px; margin-top:8px ;">
									<p:confirm header="#{sessionBean.tituloMensajes}"
										message="#{idm.TI_MSM_ELIMINAR}" icon="ui-icon-alert" />
								</p:commandButton>
							</p:column>
						</p:dataTable>
						<p:blockUI block="FRFR768" widgetVar="blockGuardar">
                        #{idm.TI_GUARDANDO_CAMBIOS}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
						<p:blockUI block="FRFR768" widgetVar="blockCarga"
							trigger="TBFR768,">
                        #{idm.TI_CARGANDO}<br />
							<p:graphicImage name="/images/general/loading.gif" />
						</p:blockUI>
					</div>
				</h:form>
			</div>
		</section>
	</ui:define>
</ui:composition>
